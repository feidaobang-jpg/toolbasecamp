name: Deploy Tool Basecamp

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DO_HOST: ${{ secrets.DO_HOST }}
      DO_USER: ${{ secrets.DO_USER }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            public:
              - 'public/**'
            server:
              - 'server/**'
            deploy:
              - 'deploy/**'
            portal_dev:
              - 'deploy/next-tools.ref'
            portal_chef:
              - 'deploy/cyberchef.ref'
            workflow:
              - '.github/workflows/deploy.yml'

      - name: Set full deploy
        id: full
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "yes=1" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.changes.outputs.workflow }}" == "true" ]]; then
            echo "yes=1" >> $GITHUB_OUTPUT
          fi

      - name: Print deploy scope
        run: |
          echo "event=${{ github.event_name }}"
          echo "full=${{ steps.full.outputs.yes }}"
          echo "public=${{ steps.changes.outputs.public }}"
          echo "server=${{ steps.changes.outputs.server }}"
          echo "deploy=${{ steps.changes.outputs.deploy }}"
          echo "portal_dev=${{ steps.changes.outputs.portal_dev }}"
          echo "portal_chef=${{ steps.changes.outputs.portal_chef }}"
          if [[ "${{ steps.full.outputs.yes }}" == "1" ]]; then
            echo "Full deploy → all steps enabled."
          elif [[ "${{ steps.changes.outputs.public }}" == "true" \
             && "${{ steps.changes.outputs.server }}" != "true" \
             && "${{ steps.changes.outputs.deploy }}" != "true" \
             && "${{ steps.changes.outputs.portal_dev }}" != "true" \
             && "${{ steps.changes.outputs.portal_chef }}" != "true" ]]; then
            echo "Static-only change → skip next-tools / CyberChef / API restart."
          fi

      - name: Validate secrets
        run: |
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          DO_HOST="$(trim "$DO_HOST")"
          DO_USER="$(trim "$DO_USER")"
          if [[ -z "$DO_HOST" || -z "$DO_USER" ]]; then
            echo "::error::DO_HOST and DO_USER must be set (no extra blank lines)."
            exit 1
          fi
          echo "DO_HOST=$DO_HOST" >> "$GITHUB_ENV"
          echo "DO_USER=$DO_USER" >> "$GITHUB_ENV"
          echo "Deploy target: ${DO_USER}@${DO_HOST}"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DO_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync static site
        if: steps.full.outputs.yes == '1' || steps.changes.outputs.public == 'true'
        run: |
          VER="$(git rev-parse --short HEAD)"
          while IFS= read -r -d '' f; do
            perl -pi -e "s/(href=\"[^\"]*\\.css)(?:\\?[^\"]*)?\"/\$1?v=${VER}\"/g; s/(src=\"[^\"]*\\.js)(?:\\?[^\"]*)?\"/\$1?v=${VER}\"/g" "$f"
          done < <(find public -type f -name '*.html' -print0)
          grep -q 'recipe-ingredient-tags' public/html/life/ai-recipe.html
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            public/ \
            "${DO_USER}@${DO_HOST}:/var/www/toolbasecamp/"

      - name: Rsync API server
        if: steps.full.outputs.yes == '1' || steps.changes.outputs.server == 'true'
        run: |
          git rev-parse HEAD > server/DEPLOY_SHA
          rsync -avz --delete --exclude venv \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            server/ \
            "${DO_USER}@${DO_HOST}:/opt/toolbasecamp-api/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${DO_USER}@${DO_HOST}" \
            'test -f /opt/toolbasecamp-api/user_records.py && test -f /opt/toolbasecamp-api/DEPLOY_SHA && echo "API files OK $(cat /opt/toolbasecamp-api/DEPLOY_SHA)"'

      - name: Rsync deploy scripts
        if: steps.full.outputs.yes == '1' || steps.changes.outputs.deploy == 'true'
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            deploy/ \
            "${DO_USER}@${DO_HOST}:/opt/toolbasecamp-deploy/"

      - name: Build next-tools dev portal
        if: steps.full.outputs.yes == '1' || steps.changes.outputs.portal_dev == 'true'
        run: |
          NEXT_TOOLS_REF="$(tr -d '\r\n' < deploy/next-tools.ref)"
          echo "Building next-tools ref: ${NEXT_TOOLS_REF}"
          git clone --depth 1 --branch "${NEXT_TOOLS_REF}" \
            https://github.com/willjayyyy/next-tools.git /tmp/next-tools
          cd /tmp/next-tools
          corepack enable
          corepack prepare pnpm@10.28.1 --activate
          pnpm install --frozen-lockfile
          pnpm build

      - name: Download CyberChef release
        if: steps.full.outputs.yes == '1' || steps.changes.outputs.portal_chef == 'true'
        run: |
          CHEF_REF="$(tr -d '\r\n' < deploy/cyberchef.ref)"
          echo "Downloading CyberChef release: ${CHEF_REF}"
          mkdir -p /tmp/cyberchef-bundle
          ASSET_URL="$(curl -fsSL "https://api.github.com/repos/gchq/CyberChef/releases/tags/${CHEF_REF}" \
            | jq -r '.assets[0].browser_download_url')"
          if [[ -z "$ASSET_URL" || "$ASSET_URL" == "null" ]]; then
            echo "::error:: No release asset for ${CHEF_REF}"
            exit 1
          fi
          curl -fsSL -o /tmp/cyberchef-bundle.zip "$ASSET_URL"
          unzip -q /tmp/cyberchef-bundle.zip -d /tmp/cyberchef-bundle
          CHEF_INDEX="$(find /tmp/cyberchef-bundle -type f \( -name index.html -o -name index.html.gz \) | head -1)"
          CHEF_DIR="$(dirname "$CHEF_INDEX")"
          if [[ -z "$CHEF_DIR" || ! -f "$CHEF_DIR/index.html" && ! -f "$CHEF_DIR/index.html.gz" ]]; then
            echo "::error:: index.html / index.html.gz not found in release zip"
            find /tmp/cyberchef-bundle -maxdepth 3 -type f | head -20 || true
            exit 1
          fi
          if [[ -f "$CHEF_DIR/index.html.gz" && ! -f "$CHEF_DIR/index.html" ]]; then
            gunzip -f "$CHEF_DIR/index.html.gz"
          fi
          echo "CHEF_DIR=$CHEF_DIR" >> "$GITHUB_ENV"

      - name: Rsync dev portal
        if: steps.full.outputs.yes == '1' || steps.changes.outputs.portal_dev == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${DO_USER}@${DO_HOST}" "mkdir -p /var/www/toolbasecamp-dev"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            /tmp/next-tools/dist/ \
            "${DO_USER}@${DO_HOST}:/var/www/toolbasecamp-dev/"
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            deploy/dev-portal-SOURCE.txt \
            "${DO_USER}@${DO_HOST}:/var/www/toolbasecamp-dev/SOURCE.txt"
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            /tmp/next-tools/LICENSE \
            "${DO_USER}@${DO_HOST}:/var/www/toolbasecamp-dev/LICENSE"

      - name: Rsync chef portal
        if: steps.full.outputs.yes == '1' || steps.changes.outputs.portal_chef == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${DO_USER}@${DO_HOST}" "mkdir -p /var/www/toolbasecamp-chef"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            "${CHEF_DIR}/" \
            "${DO_USER}@${DO_HOST}:/var/www/toolbasecamp-chef/"
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            deploy/chef-portal-SOURCE.txt \
            "${DO_USER}@${DO_HOST}:/var/www/toolbasecamp-chef/SOURCE.txt"

      - name: Install API deps and restart
        if: steps.full.outputs.yes == '1' || steps.changes.outputs.server == 'true' || steps.changes.outputs.deploy == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${DO_USER}@${DO_HOST}" 'bash -s' << 'REMOTE'
          set -euo pipefail
          apt-get update -qq
          apt-get install -y python3 python3-venv python3-pip libreoffice-writer rsync >/dev/null 2>&1 || true
          if ! command -v mysql >/dev/null 2>&1; then
            DEBIAN_FRONTEND=noninteractive apt-get install -y mysql-server >/dev/null 2>&1 || true
          fi
          systemctl start mysql 2>/dev/null || systemctl start mariadb 2>/dev/null || true
          if [[ ! -f /etc/toolbasecamp-api.env && -f /opt/toolbasecamp-deploy/install-mysql.sh ]]; then
            bash /opt/toolbasecamp-deploy/install-mysql.sh
          fi
          APP_DIR=/opt/toolbasecamp-api
          mkdir -p "$APP_DIR"
          [[ -d "$APP_DIR/venv" ]] || python3 -m venv "$APP_DIR/venv"
          "$APP_DIR/venv/bin/pip" install -q -U pip
          "$APP_DIR/venv/bin/pip" install -q -r "$APP_DIR/requirements.txt"
          # rembg is optional (large); install best-effort so core API still deploys
          if [[ -f "$APP_DIR/requirements-general-cutout.txt" ]]; then
            "$APP_DIR/venv/bin/pip" install -q -r "$APP_DIR/requirements-general-cutout.txt" \
              || echo "WARN: rembg install failed — general cutout will return 503 until installed"
          fi
          "$APP_DIR/venv/bin/pip" uninstall -y passlib 2>/dev/null || true
          rm -rf "$APP_DIR/__pycache__"
          (
            cd "$APP_DIR"
            "$APP_DIR/venv/bin/python" -c "from main import hash_password, verify_password; h=hash_password('deploy_check'); assert verify_password('deploy_check', h)"
            "$APP_DIR/venv/bin/python" -c "from main import app; paths=[getattr(r,'path','') for r in app.routes]; assert '/recipe/generate' in paths and '/recipe/detect' in paths, 'missing recipe routes: ' + str(paths); assert '/records/days' in paths, 'missing records routes: ' + str(paths); assert '/records/todos' in paths, 'missing todos routes: ' + str([p for p in paths if 'todo' in p or 'record' in p]); assert '/records/clocks/{clock_id}/reset' in paths, 'missing clock reset route: ' + str([p for p in paths if 'clock' in p]); assert '/records/clocks/{clock_id}/logs' in paths, 'missing clock logs route: ' + str([p for p in paths if 'clock' in p]); assert '/watermark/image/process' in paths, 'missing watermark routes: ' + str([p for p in paths if 'water' in p]); assert '/wan/i2v/submit' in paths and '/wan/status' in paths, 'missing wan i2v routes: ' + str([p for p in paths if 'wan' in p]); assert '/image/general-cutout/segment' in paths, 'missing general cutout route: ' + str([p for p in paths if 'image' in p or 'cutout' in p]); import wan_video; assert wan_video.wan_configured or True"
          )
          cp /opt/toolbasecamp-deploy/toolbasecamp-api.service /etc/systemd/system/toolbasecamp-api.service
          systemctl daemon-reload
          systemctl enable toolbasecamp-api
          bash /opt/toolbasecamp-deploy/patch-nginx-api.sh
          bash /opt/toolbasecamp-deploy/patch-nginx-main-cache.sh
          bash /opt/toolbasecamp-deploy/patch-nginx-main.sh
          bash /opt/toolbasecamp-deploy/install-portal-home-bar-dev.sh
          bash /opt/toolbasecamp-deploy/patch-nginx-dev.sh
          bash /opt/toolbasecamp-deploy/install-stirling-tessdata.sh
          bash /opt/toolbasecamp-deploy/patch-stirling-config.sh
          if [[ ! -f /opt/toolbasecamp-deploy/pdf-on-nas.flag ]]; then
            bash /opt/toolbasecamp-deploy/install-stirling-pdf.sh
            bash /opt/toolbasecamp-deploy/install-stirling-warmup-cron.sh
            bash /opt/toolbasecamp-deploy/patch-nginx-pdf.sh
          else
            echo "pdf-on-nas.flag set — skip Stirling PDF on VPS"
            bash /opt/toolbasecamp-deploy/stop-vps-pdf-after-nas-migration.sh || true
          fi
          if [[ ! -f /var/www/toolbasecamp-chef/index.html ]]; then
            bash /opt/toolbasecamp-deploy/install-cyberchef-release.sh
          fi
          bash /opt/toolbasecamp-deploy/patch-nginx-chef.sh
          bash /opt/toolbasecamp-deploy/install-hoppscotch.sh
          bash /opt/toolbasecamp-deploy/patch-nginx-hoppscotch.sh
          if [[ ! -f /opt/toolbasecamp-deploy/translate-on-nas.flag ]]; then
            bash /opt/toolbasecamp-deploy/install-libretranslate.sh
            bash /opt/toolbasecamp-deploy/build-libretranslate-app-patch.sh || true
            bash /opt/toolbasecamp-deploy/patch-nginx-translate.sh
          else
            echo "translate-on-nas.flag set — skip LibreTranslate on VPS"
            bash /opt/toolbasecamp-deploy/stop-vps-translate-after-nas-migration.sh || true
          fi
          bash /opt/toolbasecamp-deploy/ensure-api-db.sh
          echo "=== Nuclear restart before start ==="
          systemctl stop toolbasecamp-api 2>/dev/null || true
          sleep 1
          fuser -k 8001/tcp 2>/dev/null || true
          pkill -9 -f '/opt/toolbasecamp-api/venv/bin/python' 2>/dev/null || true
          pkill -9 -f 'run.py' 2>/dev/null || true
          sleep 2
          # Port must be free before start, otherwise systemd may leave an old orphan listening.
          for _ in 1 2 3 4 5; do
            if ss -lnt 2>/dev/null | grep -q ':8001'; then
              echo "port 8001 still busy — killing again"
              fuser -k -9 8001/tcp 2>/dev/null || true
              pkill -9 -f '/opt/toolbasecamp-api/venv/bin/python' 2>/dev/null || true
              sleep 2
            else
              break
            fi
          done
          rm -rf /opt/toolbasecamp-api/__pycache__ /opt/toolbasecamp-api/*/__pycache__ 2>/dev/null || true
          find /opt/toolbasecamp-api -name '*.pyc' -delete 2>/dev/null || true
          systemctl reset-failed toolbasecamp-api 2>/dev/null || true
          systemctl start toolbasecamp-api
          sleep 2
          systemctl is-active toolbasecamp-api
          ss -lntp 2>/dev/null | grep 8001 || netstat -lntp 2>/dev/null | grep 8001 || true
          # Prove the *listening* process is the new code (not a stale orphan)
          HEALTH_JSON="$(curl -sf http://127.0.0.1:8001/health || true)"
          echo "health immediately after start: $HEALTH_JSON"
          if ! echo "$HEALTH_JSON" | grep -F '"general_cutout_api":true' >/dev/null; then
            echo "stale process detected right after start — running fix-general-cutout-api.sh"
            bash /opt/toolbasecamp-deploy/fix-general-cutout-api.sh
          fi
          HEALTH_OK=0
          for i in 1 2 3 4 5 6 7 8; do
            HEALTH_JSON="$(curl -sf http://127.0.0.1:8001/health || true)"
            echo "health try $i: $HEALTH_JSON"
            if echo "$HEALTH_JSON" | grep -F '"recipe_api":true' >/dev/null \
              && echo "$HEALTH_JSON" | grep -F '"records_api":true' >/dev/null \
              && echo "$HEALTH_JSON" | grep -F '"records_todos":true' >/dev/null \
              && echo "$HEALTH_JSON" | grep -F '"records_clock_reset":true' >/dev/null \
              && echo "$HEALTH_JSON" | grep -F '"records_clock_logs":true' >/dev/null \
              && echo "$HEALTH_JSON" | grep -F '"watermark_api":true' >/dev/null \
              && echo "$HEALTH_JSON" | grep -F '"wan_i2v_api":true' >/dev/null \
              && echo "$HEALTH_JSON" | grep -F '"general_cutout_api":true' >/dev/null; then
              echo "health OK with recipe/records/todos/reset/logs/watermark/wan/general_cutout"
              HEALTH_OK=1
              break
            fi
            sleep 2
          done
          if [[ "$HEALTH_OK" != "1" ]]; then
            echo "=== toolbasecamp-api status ==="
            systemctl status toolbasecamp-api --no-pager || true
            journalctl -u toolbasecamp-api -n 80 --no-pager || true
            bash /opt/toolbasecamp-deploy/fix-records-api.sh
            bash /opt/toolbasecamp-deploy/fix-watermark-api.sh
            bash /opt/toolbasecamp-deploy/fix-wan-api.sh || true
            bash /opt/toolbasecamp-deploy/fix-general-cutout-api.sh
            HEALTH_JSON="$(curl -sf http://127.0.0.1:8001/health || true)"
            echo "health after fix: $HEALTH_JSON"
            echo "$HEALTH_JSON" | grep -F '"records_api":true' >/dev/null || exit 1
            echo "$HEALTH_JSON" | grep -F '"records_clock_reset":true' >/dev/null || exit 1
            echo "$HEALTH_JSON" | grep -F '"records_clock_logs":true' >/dev/null || exit 1
            echo "$HEALTH_JSON" | grep -F '"watermark_api":true' >/dev/null || exit 1
            echo "$HEALTH_JSON" | grep -F '"wan_i2v_api":true' >/dev/null || exit 1
            echo "$HEALTH_JSON" | grep -F '"general_cutout_api":true' >/dev/null || exit 1
          fi
          curl -sf http://127.0.0.1:8001/openapi.json | grep -F '/records/days' >/dev/null || {
            echo "=== openapi missing /records/days ==="
            journalctl -u toolbasecamp-api -n 40 --no-pager || true
            exit 1
          }
          curl -sf http://127.0.0.1:8001/openapi.json | grep -F '/records/todos' >/dev/null || {
            echo "=== openapi missing /records/todos — restarting records API ==="
            journalctl -u toolbasecamp-api -n 40 --no-pager || true
            bash /opt/toolbasecamp-deploy/fix-records-api.sh
            curl -sf http://127.0.0.1:8001/openapi.json | grep -F '/records/todos' >/dev/null || exit 1
          }
          curl -sf http://127.0.0.1:8001/openapi.json | grep -F '/wan/i2v/submit' >/dev/null || {
            echo "=== openapi missing /wan/i2v/submit — killing orphans and restarting ==="
            journalctl -u toolbasecamp-api -n 40 --no-pager || true
            bash /opt/toolbasecamp-deploy/fix-wan-api.sh
            curl -sf http://127.0.0.1:8001/openapi.json | grep -F '/wan/i2v/submit' >/dev/null || exit 1
          }
          curl -sf http://127.0.0.1:8001/openapi.json | grep -F '/watermark/image/process' >/dev/null || {
            echo "=== openapi missing /watermark/image/process ==="
            journalctl -u toolbasecamp-api -n 40 --no-pager || true
            bash /opt/toolbasecamp-deploy/fix-watermark-api.sh
            curl -sf http://127.0.0.1:8001/openapi.json | grep -F '/watermark/image/process' >/dev/null || exit 1
          }
          curl -sf http://127.0.0.1:8001/openapi.json | grep -F '/image/general-cutout/segment' >/dev/null || {
            echo "=== openapi missing /image/general-cutout/segment — forcing restart ==="
            journalctl -u toolbasecamp-api -n 40 --no-pager || true
            bash /opt/toolbasecamp-deploy/fix-general-cutout-api.sh
            curl -sf http://127.0.0.1:8001/openapi.json | grep -F '/image/general-cutout/segment' >/dev/null || exit 1
          }
          curl -sf http://127.0.0.1:8001/openapi.json | grep -F '/records/clocks/{clock_id}/reset' >/dev/null || {
            echo "=== openapi missing clock reset route ==="
            journalctl -u toolbasecamp-api -n 40 --no-pager || true
            exit 1
          }
          curl -sf http://127.0.0.1:8001/openapi.json | grep -F '/records/clocks/{clock_id}/logs' >/dev/null || {
            echo "=== openapi missing clock logs route ==="
            journalctl -u toolbasecamp-api -n 40 --no-pager || true
            exit 1
          }
          DAYS_CODE="$(curl -s -o /tmp/records-days-local.txt -w '%{http_code}' http://127.0.0.1:8001/records/days || echo 000)"
          echo "local GET /records/days -> $DAYS_CODE"
          if [[ "$DAYS_CODE" == "404" ]]; then
            echo "=== local /records/days still 404 ==="
            exit 1
          fi
          RECIPE_HTTP="$(curl -s -o /tmp/recipe-local.txt -w '%{http_code}' -X POST http://127.0.0.1:8001/recipe/generate -H 'Content-Type: application/json' -d '{"ingredients":["tomato"],"locale":"en"}' || echo '000')"
          echo "local recipe/generate POST $RECIPE_HTTP"
          head -c 200 /tmp/recipe-local.txt || true
          echo ""
          if [[ "$RECIPE_HTTP" == "404" ]]; then
            echo "=== recipe route still 404 on localhost ==="
            journalctl -u toolbasecamp-api -n 40 --no-pager || true
            exit 1
          fi
          DETECT_HTTP="$(curl -s -o /tmp/recipe-detect-local.txt -w '%{http_code}' -X POST http://127.0.0.1:8001/recipe/detect -F 'ingredients_text=tomato' -F 'locale=en' || echo '000')"
          echo "local recipe/detect POST $DETECT_HTTP"
          head -c 200 /tmp/recipe-detect-local.txt || true
          echo ""
          if [[ "$DETECT_HTTP" == "404" ]]; then
            echo "=== recipe/detect still 404 on localhost ==="
            journalctl -u toolbasecamp-api -n 40 --no-pager || true
            exit 1
          fi
          REMOTE

      - name: Verify main site assets (public URL)
        if: steps.full.outputs.yes == '1' || steps.changes.outputs.public == 'true'
        run: |
          sleep 3
          HTTP_CODE="$(curl -s -o /tmp/main-base.js -w '%{http_code}' \
            'https://toolbasecamp.com/js/base.js' || echo '000')"
          echo "base.js HTTPS $HTTP_CODE"
          if [[ "$HTTP_CODE" == "200" ]] && ! grep -q 'sidebar-footer-nav' /tmp/main-base.js; then
            echo "::warning:: base.js missing sidebar navigation — Cloudflare may still serve stale cache; HTML uses ?v= query bust."
          else
            echo "Main site base.js OK."
          fi
          HTTP_CODE="$(curl -s -o /tmp/main-vti.html -w '%{http_code}' \
            'https://toolbasecamp.com/html/media/video-to-images.html' || echo '000')"
          if [[ "$HTTP_CODE" == "200" ]] && grep -q 'base.js?v=' /tmp/main-vti.html; then
            echo "Tool page asset cache-bust OK."
          fi
          RECIPE_HTML_CODE="$(curl -s -o /tmp/ai-recipe.html -w '%{http_code}' \
            'https://toolbasecamp.com/html/life/ai-recipe.html' || echo '000')"
          echo "ai-recipe.html HTTPS $RECIPE_HTML_CODE"
          if [[ "$RECIPE_HTML_CODE" == "200" ]] && ! grep -q 'recipe-ingredient-tags' /tmp/ai-recipe.html; then
            echo "::error:: ai-recipe.html is stale (missing tag UI) — purge Cloudflare cache or check rsync deploy."
            exit 1
          fi
          if [[ "$RECIPE_HTML_CODE" == "200" ]] && ! grep -q 'ai-recipe.js?v=' /tmp/ai-recipe.html; then
            echo "::error:: ai-recipe.html missing JS cache-bust query — deploy sed may have failed."
            exit 1
          fi
          echo "AI recipe static page OK."

      - name: Verify guestbook API (public URL)
        if: steps.full.outputs.yes == '1' || steps.changes.outputs.server == 'true'
        run: |
          sleep 3
          HTTP_CODE="$(curl -s -o /tmp/gb-api.json -w '%{http_code}' \
            'https://toolbasecamp.com/api/guestbook/messages?limit=1' || echo '000')"
          echo "guestbook API HTTPS $HTTP_CODE"
          head -c 200 /tmp/gb-api.json || true
          echo ""
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::warning:: guestbook API returned $HTTP_CODE — check MySQL and ensure-api-db.sh on server."
            exit 0
          fi
          echo "Guestbook API OK."

      - name: Verify recipe API route (public URL)
        if: steps.full.outputs.yes == '1' || steps.changes.outputs.server == 'true'
        run: |
          sleep 2
          HTTP_CODE="$(curl -s -o /tmp/recipe-api.txt -w '%{http_code}' \
