name: Deploy Tool Basecamp

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DO_HOST: ${{ secrets.DO_HOST }}
      DO_USER: ${{ secrets.DO_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          DO_HOST="$(trim "$DO_HOST")"
          DO_USER="$(trim "$DO_USER")"
          if [[ -z "$DO_HOST" || -z "$DO_USER" ]]; then
            echo "::error::DO_HOST and DO_USER must be set (no extra blank lines)."
            exit 1
          fi
          echo "DO_HOST=$DO_HOST" >> "$GITHUB_ENV"
          echo "DO_USER=$DO_USER" >> "$GITHUB_ENV"
          echo "Deploy target: ${DO_USER}@${DO_HOST}"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DO_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync static site
        run: |
          VER="$(git rev-parse --short HEAD)"
          while IFS= read -r -d '' f; do
            sed -i \
              -e "s|js/config.js\"|js/config.js?v=${VER}\"|g" \
              -e "s|js/base.js\"|js/base.js?v=${VER}\"|g" \
              -e "s|js/tools-hub.js\"|js/tools-hub.js?v=${VER}\"|g" \
              -e "s|js/i18n.js\"|js/i18n.js?v=${VER}\"|g" \
              -e "s|js/locales/en.js\"|js/locales/en.js?v=${VER}\"|g" \
              -e "s|js/locales/zh-CN.js\"|js/locales/zh-CN.js?v=${VER}\"|g" \
              "$f"
          done < <(find public -type f -name '*.html' -print0)
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            public/ \
            "${DO_USER}@${DO_HOST}:/var/www/toolbasecamp/"

      - name: Rsync API server
        run: |
          rsync -avz --delete --exclude venv \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            server/ \
            "${DO_USER}@${DO_HOST}:/opt/toolbasecamp-api/"

      - name: Rsync deploy scripts
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            deploy/ \
            "${DO_USER}@${DO_HOST}:/opt/toolbasecamp-deploy/"

      - name: Build next-tools dev portal
        run: |
          NEXT_TOOLS_REF="$(tr -d '\r\n' < deploy/next-tools.ref)"
          echo "Building next-tools ref: ${NEXT_TOOLS_REF}"
          git clone --depth 1 --branch "${NEXT_TOOLS_REF}" \
            https://github.com/willjayyyy/next-tools.git /tmp/next-tools
          cd /tmp/next-tools
          corepack enable
          corepack prepare pnpm@10.28.1 --activate
          pnpm install --frozen-lockfile
          pnpm build

      - name: Download CyberChef release
        run: |
          CHEF_REF="$(tr -d '\r\n' < deploy/cyberchef.ref)"
          echo "Downloading CyberChef release: ${CHEF_REF}"
          mkdir -p /tmp/cyberchef-bundle
          ASSET_URL="$(curl -fsSL "https://api.github.com/repos/gchq/CyberChef/releases/tags/${CHEF_REF}" \
            | jq -r '.assets[0].browser_download_url')"
          if [[ -z "$ASSET_URL" || "$ASSET_URL" == "null" ]]; then
            echo "::error:: No release asset for ${CHEF_REF}"
            exit 1
          fi
          curl -fsSL -o /tmp/cyberchef-bundle.zip "$ASSET_URL"
          unzip -q /tmp/cyberchef-bundle.zip -d /tmp/cyberchef-bundle
          CHEF_INDEX="$(find /tmp/cyberchef-bundle -type f \( -name index.html -o -name index.html.gz \) | head -1)"
          CHEF_DIR="$(dirname "$CHEF_INDEX")"
          if [[ -z "$CHEF_DIR" || ! -f "$CHEF_DIR/index.html" && ! -f "$CHEF_DIR/index.html.gz" ]]; then
            echo "::error:: index.html / index.html.gz not found in release zip"
            find /tmp/cyberchef-bundle -maxdepth 3 -type f | head -20 || true
            exit 1
          fi
          if [[ -f "$CHEF_DIR/index.html.gz" && ! -f "$CHEF_DIR/index.html" ]]; then
            gunzip -f "$CHEF_DIR/index.html.gz"
          fi
          echo "CHEF_DIR=$CHEF_DIR" >> "$GITHUB_ENV"

      - name: Rsync dev portal
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${DO_USER}@${DO_HOST}" "mkdir -p /var/www/toolbasecamp-dev"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            /tmp/next-tools/dist/ \
            "${DO_USER}@${DO_HOST}:/var/www/toolbasecamp-dev/"
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            deploy/dev-portal-SOURCE.txt \
            "${DO_USER}@${DO_HOST}:/var/www/toolbasecamp-dev/SOURCE.txt"
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            /tmp/next-tools/LICENSE \
            "${DO_USER}@${DO_HOST}:/var/www/toolbasecamp-dev/LICENSE"

      - name: Rsync chef portal
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${DO_USER}@${DO_HOST}" "mkdir -p /var/www/toolbasecamp-chef"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            "${CHEF_DIR}/" \
            "${DO_USER}@${DO_HOST}:/var/www/toolbasecamp-chef/"
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            deploy/chef-portal-SOURCE.txt \
            "${DO_USER}@${DO_HOST}:/var/www/toolbasecamp-chef/SOURCE.txt"

      - name: Install API deps and restart
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${DO_USER}@${DO_HOST}" 'bash -s' << 'REMOTE'
          set -euo pipefail
          apt-get update -qq
          apt-get install -y python3 python3-venv python3-pip libreoffice-writer rsync >/dev/null 2>&1 || true
          if ! command -v mysql >/dev/null 2>&1; then
            DEBIAN_FRONTEND=noninteractive apt-get install -y mysql-server >/dev/null 2>&1 || true
          fi
          systemctl start mysql 2>/dev/null || systemctl start mariadb 2>/dev/null || true
          if [[ ! -f /etc/toolbasecamp-api.env && -f /opt/toolbasecamp-deploy/install-mysql.sh ]]; then
            bash /opt/toolbasecamp-deploy/install-mysql.sh
          fi
          APP_DIR=/opt/toolbasecamp-api
          mkdir -p "$APP_DIR"
          [[ -d "$APP_DIR/venv" ]] || python3 -m venv "$APP_DIR/venv"
          "$APP_DIR/venv/bin/pip" install -q -U pip
          "$APP_DIR/venv/bin/pip" install -q -r "$APP_DIR/requirements.txt"
          "$APP_DIR/venv/bin/pip" uninstall -y passlib 2>/dev/null || true
          (
            cd "$APP_DIR"
            "$APP_DIR/venv/bin/python" -c "from main import hash_password, verify_password; h=hash_password('deploy_check'); assert verify_password('deploy_check', h)"
          )
          cp /opt/toolbasecamp-deploy/toolbasecamp-api.service /etc/systemd/system/toolbasecamp-api.service
          systemctl daemon-reload
          systemctl enable toolbasecamp-api
          bash /opt/toolbasecamp-deploy/patch-nginx-api.sh
          bash /opt/toolbasecamp-deploy/patch-nginx-main-cache.sh
          bash /opt/toolbasecamp-deploy/patch-nginx-main.sh
          bash /opt/toolbasecamp-deploy/install-portal-home-bar-dev.sh
          bash /opt/toolbasecamp-deploy/patch-nginx-dev.sh
          bash /opt/toolbasecamp-deploy/install-stirling-tessdata.sh
          bash /opt/toolbasecamp-deploy/patch-stirling-config.sh
          if [[ ! -f /opt/toolbasecamp-deploy/pdf-on-nas.flag ]]; then
            bash /opt/toolbasecamp-deploy/install-stirling-pdf.sh
            bash /opt/toolbasecamp-deploy/install-stirling-warmup-cron.sh
            bash /opt/toolbasecamp-deploy/patch-nginx-pdf.sh
          else
            echo "pdf-on-nas.flag set — skip Stirling PDF on VPS"
            bash /opt/toolbasecamp-deploy/stop-vps-pdf-after-nas-migration.sh || true
          fi
          if [[ ! -f /var/www/toolbasecamp-chef/index.html ]]; then
            bash /opt/toolbasecamp-deploy/install-cyberchef-release.sh
          fi
          bash /opt/toolbasecamp-deploy/patch-nginx-chef.sh
          bash /opt/toolbasecamp-deploy/install-hoppscotch.sh
          bash /opt/toolbasecamp-deploy/patch-nginx-hoppscotch.sh
          if [[ ! -f /opt/toolbasecamp-deploy/translate-on-nas.flag ]]; then
            bash /opt/toolbasecamp-deploy/install-libretranslate.sh
            bash /opt/toolbasecamp-deploy/build-libretranslate-app-patch.sh || true
            bash /opt/toolbasecamp-deploy/patch-nginx-translate.sh
          else
            echo "translate-on-nas.flag set — skip LibreTranslate on VPS"
            bash /opt/toolbasecamp-deploy/stop-vps-translate-after-nas-migration.sh || true
          fi
          bash /opt/toolbasecamp-deploy/ensure-api-db.sh
          systemctl restart toolbasecamp-api
          for i in 1 2 3 4 5; do
            if curl -sf http://127.0.0.1:8001/health; then
              echo ""
              break
            fi
            sleep 2
            if [[ "$i" -eq 5 ]]; then
              echo "=== toolbasecamp-api status ==="
              systemctl status toolbasecamp-api --no-pager || true
              journalctl -u toolbasecamp-api -n 40 --no-pager || true
              exit 1
            fi
          done
          REMOTE

      - name: Verify main site assets (public URL)
        run: |
          sleep 3
          HTTP_CODE="$(curl -s -o /tmp/main-base.js -w '%{http_code}' \
            'https://toolbasecamp.com/js/base.js' || echo '000')"
          echo "base.js HTTPS $HTTP_CODE"
          if [[ "$HTTP_CODE" == "200" ]] && ! grep -q 'sidebar-footer-nav' /tmp/main-base.js; then
            echo "::warning:: base.js missing sidebar navigation — Cloudflare may still serve stale cache; HTML uses ?v= query bust."
          else
            echo "Main site base.js OK."
          fi
          HTTP_CODE="$(curl -s -o /tmp/main-vti.html -w '%{http_code}' \
            'https://toolbasecamp.com/html/media/video-to-images.html' || echo '000')"
          if [[ "$HTTP_CODE" == "200" ]] && grep -q 'base.js?v=' /tmp/main-vti.html; then
            echo "Tool page asset cache-bust OK."
          fi

      - name: Verify guestbook API (public URL)
        run: |
          sleep 3
          HTTP_CODE="$(curl -s -o /tmp/gb-api.json -w '%{http_code}' \
            'https://toolbasecamp.com/api/guestbook/messages?limit=1' || echo '000')"
          echo "guestbook API HTTPS $HTTP_CODE"
          head -c 200 /tmp/gb-api.json || true
          echo ""
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::warning:: guestbook API returned $HTTP_CODE — check MySQL and ensure-api-db.sh on server."
            exit 0
          fi
          echo "Guestbook API OK."

      - name: Verify recipe API route (public URL)
        run: |
          sleep 2
          HTTP_CODE="$(curl -s -o /tmp/recipe-api.txt -w '%{http_code}' \
            -X POST 'https://toolbasecamp.com/api/recipe/generate' || echo '000')"
          echo "recipe/generate POST HTTPS $HTTP_CODE"
          head -c 200 /tmp/recipe-api.txt || true
          echo ""
          if [[ "$HTTP_CODE" == "404" ]]; then
            echo "::error:: recipe API route missing — server main.py may not be deployed; check toolbasecamp-api restart."
            exit 1
          fi
          if [[ "$HTTP_CODE" != "422" && "$HTTP_CODE" != "400" && "$HTTP_CODE" != "503" ]]; then
            echo "::warning:: recipe API returned $HTTP_CODE (expected 400/422 without body, or 503 if Qwen key missing)."
          fi
          echo "Recipe API route OK."

      - name: Verify dev portal (public URL)
        run: |
          sleep 3
          HTTP_CODE="$(curl -s -o /tmp/dev-public.html -w '%{http_code}' \
            'https://dev.toolbasecamp.com/' || echo '000')"
          echo "HTTPS $HTTP_CODE"
          head -c 800 /tmp/dev-public.html || true
          echo ""
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::warning:: dev portal HTTPS returned $HTTP_CODE (nginx on server may still be OK)."
            exit 0
          fi
          if grep -q 'Tool Basecamp — Productivity Tools Hub' /tmp/dev-public.html; then
            echo "::warning:: Public URL still shows main site — purge Cloudflare cache or check Origin Rules."
            exit 0
          fi
          if ! grep -qi 'next tools' /tmp/dev-public.html; then
            echo "::warning:: Public URL did not return next-tools HTML."
            exit 0
          fi
          if ! grep -q 'portal-has-home-bar' /tmp/dev-public.html; then
            echo "::warning:: dev portal missing inline portal bar — run patch-nginx-dev.sh"
            exit 0
          fi
          if grep -q 'portal-home-bar.js' /tmp/dev-public.html; then
            echo "::warning:: dev still uses external portal-home-bar.js — run patch-nginx-dev.sh"
          fi
          echo "Dev portal OK."

      - name: Verify pdf portal (public URL)
        run: |
          sleep 3
          HTTP_CODE="$(curl -s -o /tmp/pdf-public.html -w '%{http_code}' \
            'https://pdf.toolbasecamp.com/' || echo '000')"
          echo "HTTPS $HTTP_CODE"
          head -c 600 /tmp/pdf-public.html || true
          echo ""
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::warning:: pdf portal HTTPS returned $HTTP_CODE — add Cloudflare DNS: pdf A record, then re-run deploy."
            exit 0
          fi
          if grep -q 'Tool Basecamp — Productivity Tools Hub' /tmp/pdf-public.html; then
            echo "::warning:: pdf URL shows main site — check nginx 443 vhost for pdf.toolbasecamp.com."
            exit 0
          fi
          if ! grep -q 'portal-home-bar.js' /tmp/pdf-public.html; then
            echo "::warning:: pdf portal missing portal-home-bar injection (nginx sub_filter)."
            exit 0
          fi
          echo "Pdf portal OK."

      - name: Verify chef portal (public URL)
        run: |
          sleep 3
          HTTP_CODE="$(curl -s -o /tmp/chef-public.html -w '%{http_code}' \
            'https://chef.toolbasecamp.com/' || echo '000')"
          echo "HTTPS $HTTP_CODE"
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::warning:: chef portal HTTPS returned $HTTP_CODE — add Cloudflare DNS: chef A record, then re-run deploy."
            exit 0
          fi
          if ! grep -qi 'cyberchef' /tmp/chef-public.html; then
            echo "::warning:: chef URL did not return CyberChef HTML."
            exit 0
          fi
          if grep -q 'portal-home-bar.js' /tmp/chef-public.html; then
            echo "::warning:: chef still loads external portal-home-bar.js — run patch-nginx-chef.sh"
          fi
          if ! grep -q 'portal-home-bar' /tmp/chef-public.html; then
            echo "::warning:: chef missing inline portal-home-bar — run patch-nginx-chef.sh"
          fi
          echo "Chef portal OK."

      - name: Verify hoppscotch portal (public URL)
        run: |
          sleep 3
          HTTP_CODE="$(curl -s -o /tmp/hop-public.html -w '%{http_code}' \
            'https://hoppscotch.toolbasecamp.com/' || echo '000')"
          echo "HTTPS $HTTP_CODE"
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::warning:: hoppscotch portal HTTPS returned $HTTP_CODE — add Cloudflare DNS: hoppscotch A record, then re-run deploy."
            exit 0
          fi
          echo "Hoppscotch portal OK."

      - name: Verify translate portal (public URL)
        run: |
          sleep 3
          HTTP_CODE="$(curl -s -o /tmp/tr-public.html -w '%{http_code}' \
            'https://translate.toolbasecamp.com/' || echo '000')"
          echo "HTTPS $HTTP_CODE"
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::warning:: translate portal HTTPS returned $HTTP_CODE — add Cloudflare DNS: translate A record, then re-run deploy."
            exit 0
          fi
          echo "Translate portal OK."
