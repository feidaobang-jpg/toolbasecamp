services:
  stirling-pdf:
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf
    container_name: tbc-stirling-pdf
    restart: unless-stopped
    mem_limit: 2048m
    memswap_limit: 2560m
    expose:
      - "8080"
    volumes:
      - stirling-data:/configs
      - ./tessdata:/usr/share/tessdata:ro
    environment:
      DISABLE_ADDITIONAL_FEATURES: "false"
      SECURITY_ENABLELOGIN: "false"
      SECURITY_CSRFDISABLED: "true"
      SYSTEM_ENABLEONBOARDING: "false"
      SYSTEM_ENABLEDESKTOPINSTALLSLIDE: "false"
      SYSTEM_GOOGLEVISIBILITY: "false"
      TESSERACT_LANGS: eng,chi_sim
      SYSTEM_MAXFILESIZE: "100"
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx1536m"
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      UI_APPNAME: PDF Toolkit
      UI_APPNAMENAVBAR: PDF Toolkit
    # No healthcheck — Stirling image often lacks wget/curl; JVM may take 3–5 min on first boot

  pdf-proxy:
    image: nginx:1.27-alpine
    container_name: tbc-pdf-proxy
    restart: unless-stopped
    depends_on:
      stirling-pdf:
        condition: service_started
    volumes:
      - ./nginx-pdf.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tbc-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - .env
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - pdf-proxy
      - translate-proxy

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: tbc-libretranslate
    restart: unless-stopped
    mem_limit: 3072m
    expose:
      - "5000"
    environment:
      LT_LOAD_ONLY: en,zh
      LT_DISABLE_WEB_UI: "false"
      LT_HIDE_API: "true"
      LT_SUGGESTIONS: "false"
      LT_REQ_LIMIT: "30"

  translate-proxy:
    image: nginx:1.27-alpine
    container_name: tbc-translate-proxy
    restart: unless-stopped
    depends_on:
      - libretranslate
    volumes:
      - ./nginx-translate.conf:/etc/nginx/conf.d/default.conf:ro
      - ../translate-ui-patch.js:/etc/nginx/portal/translate-ui-patch.js:ro
    expose:
      - "80"

volumes:
  stirling-data:
