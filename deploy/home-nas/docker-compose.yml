services:
  stirling-pdf:
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf
    container_name: tbc-stirling-pdf
    restart: unless-stopped
    mem_limit: 2048m
    memswap_limit: 2560m
    expose:
      - "8080"
    volumes:
      - stirling-data:/configs
      - ./tessdata:/usr/share/tessdata:ro
    environment:
      DISABLE_ADDITIONAL_FEATURES: "false"
      SECURITY_ENABLELOGIN: "false"
      SECURITY_CSRFDISABLED: "true"
      SYSTEM_ENABLEONBOARDING: "false"
      SYSTEM_ENABLEDESKTOPINSTALLSLIDE: "false"
      SYSTEM_GOOGLEVISIBILITY: "false"
      TESSERACT_LANGS: eng,chi_sim
      SYSTEM_MAXFILESIZE: "100"
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx1536m"
      UI_APPNAME: PDF Toolkit
      UI_APPNAMENAVBAR: PDF Toolkit
    healthcheck:
      # First JVM boot on NAS can take 3–5 min; wget may be missing — try curl too
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ 2>/dev/null || curl -sf http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 12
      start_period: 300s

  pdf-proxy:
    image: nginx:1.27-alpine
    container_name: tbc-pdf-proxy
    restart: unless-stopped
    depends_on:
      stirling-pdf:
        condition: service_healthy
    volumes:
      - ./nginx-pdf.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tbc-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - .env
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - pdf-proxy

volumes:
  stirling-data:
