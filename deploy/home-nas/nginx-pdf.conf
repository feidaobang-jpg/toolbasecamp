server {
    listen 80;
    server_name _;

    client_max_body_size 200m;

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|map|webp|ttf|eot)$ {
        proxy_pass http://stirling-pdf:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location / {
        proxy_pass http://stirling-pdf:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept-Encoding "";
        proxy_request_buffering off;
        proxy_read_timeout 1800s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 1800s;
        proxy_buffering off;
        sub_filter '</head>' '<script>(function(){try{var LANG_KEY="i18nextLng",SOURCE_KEY="i18nextLng-source",src=localStorage.getItem(SOURCE_KEY),lang=localStorage.getItem(LANG_KEY)||"",nav=(navigator.language||navigator.userLanguage||"").toLowerCase(),isZh=nav.indexOf("zh")===0;if(lang.indexOf("en")===0&&(src==="2"||(src==="1"&&isZh))){localStorage.removeItem(LANG_KEY);localStorage.removeItem(SOURCE_KEY);src=null;lang=""}if(src==="3"||src)return;var pick=/^zh-(tw|hk|hant|mo)/.test(nav)?"zh-TW":isZh?"zh-CN":nav.indexOf("en")===0?"en-GB":null;if(pick){localStorage.setItem(LANG_KEY,pick);localStorage.setItem(SOURCE_KEY,"1")}}catch(e){}})();</script><style>body.portal-has-home-bar{padding-top:36px!important}#portal-home-bar{position:fixed;top:0;left:0;right:0;z-index:99999;height:36px;display:flex;align-items:center;padding:0 16px;background:#1e293b;border-bottom:1px solid #334155;box-sizing:border-box;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}#portal-home-bar a{color:#e2e8f0;text-decoration:none;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px}#portal-home-bar a:hover{color:#fff}</style><script defer>(function(){function i(){if(document.getElementById("portal-home-bar")||!document.body)return;var b=document.createElement("div");b.id="portal-home-bar";b.setAttribute("role","navigation");b.innerHTML="<a href=\"https://toolbasecamp.com/\">&#8592; Tool Basecamp</a>";document.body.classList.add("portal-has-home-bar");document.body.insertBefore(b,document.body.firstChild)}document.readyState==="loading"?document.addEventListener("DOMContentLoaded",i):i()})();</script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
