map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      https;
}

map $http_referer $lt_portal_referer {
    default 0;
    "~^https://translate\.toolbasecamp\.com" 1;
    "~^http://translate\.toolbasecamp\.com" 1;
}

map "$request_method:$lt_portal_referer" $lt_block_api_post {
    default 0;
    "POST:0" 1;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    location = /translate-ui-patch.js {
        alias /etc/nginx/portal/translate-ui-patch.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    # Static assets: skip sub_filter, keep upstream gzip, long cache for CF edge
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|map|webp|ttf|eot)$ {
        proxy_pass http://libretranslate:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    location ~ ^/(translate|translate_file|detect|suggest)$ {
        if ($lt_block_api_post) { return 403; }
        proxy_pass http://libretranslate:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://libretranslate:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 300s;
        sub_filter '</head>' '<style>body.portal-has-home-bar{padding-top:36px!important}#portal-home-bar{position:fixed;top:0;left:0;right:0;z-index:99999;height:36px;display:flex;align-items:center;padding:0 16px;background:#1e293b;border-bottom:1px solid #334155;box-sizing:border-box;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}#portal-home-bar a{color:#e2e8f0;text-decoration:none;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px}#portal-home-bar a:hover{color:#fff}</style><script defer>(function(){function i(){if(document.getElementById("portal-home-bar")||!document.body)return;var b=document.createElement("div");b.id="portal-home-bar";b.setAttribute("role","navigation");var a=document.createElement("a");a.href="https://toolbasecamp.com/";a.textContent="\u2190 Tool Basecamp";b.appendChild(a);document.body.classList.add("portal-has-home-bar");document.body.insertBefore(b,document.body.firstChild)}document.readyState==="loading"?document.addEventListener("DOMContentLoaded",i):i()})();</script></head>';
        sub_filter '</body>' '<script src="/translate-ui-patch.js?v=13"></script></body>';
        sub_filter_once off;
        sub_filter_types text/html;
        gzip on;
        gzip_types text/html;
        gzip_min_length 256;
    }
}
