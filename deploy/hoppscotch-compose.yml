# Hoppscotch Community Edition (postgres + AIO app)
# Usage: cd /opt/toolbasecamp-deploy && docker compose -f hoppscotch-compose.yml up -d
name: toolbasecamp-hoppscotch

services:
  hoppscotch-db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - hoppscotch-compose.env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${HOPPSCOTCH_DB_PASSWORD}
      POSTGRES_DB: hoppscotch
    volumes:
      - hoppscotch-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d hoppscotch']
      interval: 5s
      timeout: 5s
      retries: 12

  hoppscotch:
    image: hoppscotch/hoppscotch:${HOPPSCOTCH_IMAGE_TAG:-2026.6.0}
    restart: unless-stopped
    depends_on:
      hoppscotch-db:
        condition: service_healthy
    env_file:
      - hoppscotch.env
    ports:
      - '127.0.0.1:3000:3000'
      - '127.0.0.1:3100:3100'
      - '127.0.0.1:3170:3170'

volumes:
  hoppscotch-pgdata:
