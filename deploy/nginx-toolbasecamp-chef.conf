server {
    listen 80;
    listen [::]:80;
    server_name chef.toolbasecamp.com;

    root /var/www/toolbasecamp-chef;
    index index.html;

    location = /portal-home-bar.css {
        alias /opt/toolbasecamp-deploy/portal-home-bar.css;
        default_type text/css;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /portal-home-bar.js {
        alias /opt/toolbasecamp-deploy/portal-home-bar.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ /index.html;
        gzip off;
        sub_filter '</head>' '<link rel="stylesheet" href="/portal-home-bar.css"><script defer src="/portal-home-bar.js"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    error_page 403 404 = @chef_missing;
    location @chef_missing {
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>CyberChef not deployed</title></head><body><h1>CyberChef not installed yet</h1><p>On the server run:<br><code>sudo bash /opt/toolbasecamp-deploy/install-cyberchef-release.sh</code></p></body></html>';
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name chef.toolbasecamp.com;

    ssl_certificate /etc/letsencrypt/live/toolbasecamp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toolbasecamp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/toolbasecamp-chef;
    index index.html;

    location = /portal-home-bar.css {
        alias /opt/toolbasecamp-deploy/portal-home-bar.css;
        default_type text/css;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /portal-home-bar.js {
        alias /opt/toolbasecamp-deploy/portal-home-bar.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ /index.html;
        gzip off;
        sub_filter '</head>' '<link rel="stylesheet" href="/portal-home-bar.css"><script defer src="/portal-home-bar.js"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    error_page 403 404 = @chef_missing;
    location @chef_missing {
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>CyberChef not deployed</title></head><body><h1>CyberChef not installed yet</h1><p>On the server run:<br><code>sudo bash /opt/toolbasecamp-deploy/install-cyberchef-release.sh</code></p></body></html>';
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
