server {
    listen 80;
    listen [::]:80;
    server_name dev.toolbasecamp.com;

    root /var/www/toolbasecamp-dev;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript text/html application/json;
}

# HTTPS — required when Cloudflare SSL mode is Full/Full (strict).
# Cert must include dev.toolbasecamp.com (patch-nginx-dev.sh runs certbot --expand).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dev.toolbasecamp.com;

    ssl_certificate /etc/letsencrypt/live/toolbasecamp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toolbasecamp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/toolbasecamp-dev;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript text/html application/json;
}
