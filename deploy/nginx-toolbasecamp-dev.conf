server {
    listen 80;
    listen [::]:80;
    server_name dev.toolbasecamp.com;

    root /var/www/toolbasecamp-dev;
    index index.html;

    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|map|webp|ttf|eot|webmanifest)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        gzip off;
        sub_filter '</head>' 'DEV_HEAD_INJECT</head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}

# HTTPS — required when Cloudflare SSL mode is Full/Full (strict).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dev.toolbasecamp.com;

    ssl_certificate /etc/letsencrypt/live/toolbasecamp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toolbasecamp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/toolbasecamp-dev;
    index index.html;

    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|map|webp|ttf|eot|webmanifest)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        gzip off;
        sub_filter '</head>' 'DEV_HEAD_INJECT</head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
