server {
    listen 80;
    listen [::]:80;
    server_name dev.toolbasecamp.com;

    root /var/www/toolbasecamp-dev;
    index index.html;

    location = /portal-home-bar.css {
        alias /opt/toolbasecamp-deploy/portal-home-bar.css;
        default_type text/css;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /portal-home-bar.js {
        alias /opt/toolbasecamp-deploy/portal-home-bar.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=3600";
    }

    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        gzip off;
        sub_filter '</head>' '<link rel="stylesheet" href="/portal-home-bar.css"><script defer src="/portal-home-bar.js"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}

# HTTPS — required when Cloudflare SSL mode is Full/Full (strict).
# Cert must include dev.toolbasecamp.com (patch-nginx-dev.sh runs certbot --expand).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dev.toolbasecamp.com;

    ssl_certificate /etc/letsencrypt/live/toolbasecamp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toolbasecamp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/toolbasecamp-dev;
    index index.html;

    location = /portal-home-bar.css {
        alias /opt/toolbasecamp-deploy/portal-home-bar.css;
        default_type text/css;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /portal-home-bar.js {
        alias /opt/toolbasecamp-deploy/portal-home-bar.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=3600";
    }

    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        gzip off;
        sub_filter '</head>' '<link rel="stylesheet" href="/portal-home-bar.css"><script defer src="/portal-home-bar.js"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
