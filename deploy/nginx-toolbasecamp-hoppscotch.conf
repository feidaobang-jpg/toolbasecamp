server {
    listen 80;
    listen [::]:80;
    server_name hoppscotch.toolbasecamp.com;

    client_max_body_size 50m;

    location = /portal-home-bar.css {
        alias /opt/toolbasecamp-deploy/portal-home-bar.css;
        default_type text/css;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /portal-home-bar.js {
        alias /opt/toolbasecamp-deploy/portal-home-bar.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=3600";
    }

    location /graphql {
        proxy_pass http://127.0.0.1:3170/graphql;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location /v1 {
        proxy_pass http://127.0.0.1:3170/v1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /admin {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '<link rel="stylesheet" href="/portal-home-bar.css"><script src="/portal-home-bar.js"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 300s;
        sub_filter '</head>' '<link rel="stylesheet" href="/portal-home-bar.css"><script src="/portal-home-bar.js"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name hoppscotch.toolbasecamp.com;

    ssl_certificate /etc/letsencrypt/live/toolbasecamp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toolbasecamp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

