server {
    listen 80;
    listen [::]:80;
    server_name translate.toolbasecamp.com;

    client_max_body_size 20m;

    location = /portal-home-bar.css {
        alias /opt/toolbasecamp-deploy/portal-home-bar.css;
        default_type text/css;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /portal-home-bar.js {
        alias /opt/toolbasecamp-deploy/portal-home-bar.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /translate-ui-patch.js {
        alias /opt/toolbasecamp-deploy/translate-ui-patch.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~ ^/js/app\.js {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
        gzip off;
        sub_filter_types application/javascript text/javascript *;
        sub_filter 'if (tgtLang.targets.indexOf(this.sourceLang) === -1) return;' 'if (!tgtLang || !tgtLang.targets) return; if (this.sourceLang === "auto") { try { var _tb = JSON.parse(this.output); if (_tb && _tb.detectedLanguage) this.sourceLang = _tb.detectedLanguage.language; } catch (e) {} } if (this.sourceLang === "auto") { this.sourceLang = this.targetLang; this.targetLang = this.targetLang === "zh" ? "en" : "zh"; this.detectedLangText = ""; this.inputText = this.translatedText; this.translatedText = ""; this.handleInput(e); return; } if (tgtLang.targets.indexOf(this.sourceLang) === -1) return;';
        sub_filter_once on;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 300s;
        sub_filter '</head>' '<link rel="stylesheet" href="/portal-home-bar.css"><script src="/portal-home-bar.js"></script><script src="/translate-ui-patch.js?v=4"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name translate.toolbasecamp.com;

    ssl_certificate /etc/letsencrypt/live/toolbasecamp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toolbasecamp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

