server {
    listen 80;
    listen [::]:80;
    server_name translate.toolbasecamp.com;

    client_max_body_size 20m;

    location = /portal-home-bar.css {
        alias /opt/toolbasecamp-deploy/portal-home-bar.css;
        default_type text/css;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /portal-home-bar.js {
        alias /opt/toolbasecamp-deploy/portal-home-bar.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /translate-ui-patch.js {
        alias /opt/toolbasecamp-deploy/translate-ui-patch.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /js/app.js {
        alias /opt/toolbasecamp-deploy/libretranslate-app.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=300";
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 300s;
        sub_filter '</head>' '<link rel="stylesheet" href="/portal-home-bar.css"><script src="/portal-home-bar.js"></script></head>';
        sub_filter '</body>' '<script src="/translate-ui-patch.js?v=9"></script></body>';
        sub_filter_once off;
        sub_filter_types text/html;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name translate.toolbasecamp.com;

    ssl_certificate /etc/letsencrypt/live/toolbasecamp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toolbasecamp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location = /portal-home-bar.css {
