server {
    listen 80;
    listen [::]:80;
    server_name toolbasecamp.com www.toolbasecamp.com;

    root /var/www/toolbasecamp;
    index index.html;

    location = /tools/pdf-to-word.html {
        return 301 /html/docs/pdf-to-word.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_types text/css application/javascript text/html application/json;
}
