# Stirling-PDF overrides (mounted into /configs/customConfigs/)
security:
  enableLogin: false
  csrfDisabled: true

system:
  # Empty = auto-detect UI language from browser, fallback en-US
  defaultLocale: ""
  googlevisibility: false
  enableOnboarding: false
  enableDesktopInstallSlide: false
  showUpdate: false
  maxFileSize: 100
  tessdataDir: /usr/share/tessdata

ui:
  appName: PDF Toolkit
  appNameNavbar: PDF Toolkit
