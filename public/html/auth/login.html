<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - Tool Basecamp</title>
    <meta name="description" content="Log in to your Tool Basecamp account.">
    <script src="../../vendor/tailwindcss.js"></script>
    <link rel="stylesheet" href="../../css/base.css?v=5">
    <link rel="stylesheet" href="../../css/site-mobile-nav.css">
    <link href="../../vendor/font-awesome/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col font-sans">
    <header class="bg-white border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between gap-3">
            <a href="../../index.html" class="flex items-center gap-2 flex-shrink-0 group">
                <div class="logo-text w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-md group-hover:bg-blue-700 transition-colors">TB</div>
                <h1 class="site-name text-xl font-bold text-gray-900 tracking-tight">Tool Basecamp</h1>
            </a>
            <a href="../../index.html" class="text-sm text-gray-500 hover:text-blue-600 transition-colors whitespace-nowrap">
                <i class="fas fa-arrow-left mr-1"></i> <span data-i18n="auth.backHome">Back to home</span>
            </a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
            <div class="p-8">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold text-gray-900" data-i18n="auth.welcomeBack">Welcome back</h2>
                    <p class="text-gray-500 mt-2 text-sm" data-i18n="auth.loginSubtitle">Log in to access your profile</p>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5" data-i18n="auth.email">Email</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-envelope text-gray-400"></i>
                            </div>
                            <input id="email" type="email" class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all bg-gray-50 focus:bg-white" data-i18n-placeholder="auth.emailPlaceholder" placeholder="you@example.com" />
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5" data-i18n="auth.password">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400"></i>
                            </div>
                            <input id="password" type="password" class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all bg-gray-50 focus:bg-white" data-i18n-placeholder="auth.passwordPlaceholder" placeholder="Your password" />
                        </div>
                    </div>

                    <div id="status" class="hidden rounded-lg p-3 text-sm flex items-start gap-2"></div>

                    <button id="btn-login" type="button" class="tb-btn w-full" data-i18n="auth.loginBtn">Log in</button>

                    <div class="text-center text-sm text-gray-500 mt-6">
                        <span data-i18n="auth.noAccount">Don't have an account?</span>
                        <a href="register.html" class="text-blue-600 font-semibold hover:underline" data-i18n="auth.signup">Sign up</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../../js/locales/en.js?v=auth2"></script>
    <script src="../../js/locales/zh-CN.js?v=auth2"></script>
    <script src="../../js/i18n.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/common_ui.js"></script>
    <script src="../../js/auth/auth.js?v=2"></script>
</body>
</html>
