<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Tool Basecamp</title>
    <meta name="description" content="Manage your Tool Basecamp account.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/base.css?v=5">
    <link rel="stylesheet" href="../../css/site-mobile-nav.css">
    <script src="../../js/locales/en.js"></script>
    <script src="../../js/locales/zh-CN.js"></script>
    <script src="../../js/i18n.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/common_ui.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col font-sans">
    <header class="bg-white border-b border-gray-100 sticky top-0 z-50 backdrop-blur-md bg-opacity-90">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center gap-3 md:gap-8 min-w-0">
            <a href="../../index.html" class="flex items-center gap-2 flex-shrink-0 min-w-0 max-w-[58vw] sm:max-w-none group">
                <div class="logo-text w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-md group-hover:bg-blue-700 transition-colors">TB</div>
                <h1 class="site-name text-base sm:text-xl font-bold text-gray-900 tracking-tight truncate">Tool Basecamp</h1>
            </a>
            <nav data-nav="main" data-base-path="../../" class="hidden md:flex items-center gap-8 text-[15px] font-medium text-gray-600"></nav>
            <div id="site-header-mobile-slot" class="flex items-center gap-1 flex-shrink-0 md:hidden ml-auto">
                <a href="../../index.html" class="text-sm text-gray-600 whitespace-nowrap" data-i18n="auth.home">Home</a>
            </div>
        </div>
    </header>

    <main class="flex-1 w-full max-w-lg mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-8 flex flex-col items-center text-center border-b border-gray-50">
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center text-blue-500 text-3xl mb-4">
                    <i class="fas fa-user"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-900 mb-1" id="profile-email" data-i18n="auth.loading">Loading...</h2>
                <span class="text-xs text-gray-400">UID: <span id="profile-uid">--</span></span>
            </div>

            <div class="p-6 space-y-3">
                <button type="button" onclick="document.getElementById('modal-password').classList.remove('hidden')"
                    class="w-full py-2.5 px-4 bg-white border border-gray-200 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-key text-gray-400"></i> <span data-i18n="auth.changePassword">Change password</span>
                </button>
                <button id="btn-logout-profile" type="button"
                    class="w-full py-2.5 px-4 bg-red-50 text-red-600 rounded-lg text-sm font-medium hover:bg-red-100 transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> <span data-i18n="auth.logout">Log out</span>
                </button>
            </div>

            <div class="px-6 pb-6 text-sm text-gray-500 flex justify-between border-t border-gray-50 pt-4">
                <span data-i18n="auth.memberSince">Member since</span>
                <span id="profile-created-at" class="font-mono text-gray-700">--</span>
            </div>
        </div>
    </main>

    <div id="modal-password" class="fixed inset-0 z-50 hidden overflow-y-auto" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75" onclick="document.getElementById('modal-password').classList.add('hidden')"></div>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6">
                    <h3 class="text-lg font-medium text-gray-900 mb-4" data-i18n="auth.changePassword">Change password</h3>
                    <div class="space-y-4">
                        <div>
                            <label for="old-password" class="block text-sm font-medium text-gray-700" data-i18n="auth.currentPassword">Current password</label>
                            <input type="password" id="old-password" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm">
                        </div>
                        <div>
                            <label for="new-password" class="block text-sm font-medium text-gray-700" data-i18n="auth.newPassword">New password</label>
                            <input type="password" id="new-password" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" data-i18n-placeholder="auth.passwordHint" placeholder="At least 6 characters">
                        </div>
                        <div>
                            <label for="confirm-password" class="block text-sm font-medium text-gray-700" data-i18n="auth.confirmPassword">Confirm new password</label>
                            <input type="password" id="confirm-password" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm">
                        </div>
                        <div id="pwd-msg" class="text-sm text-red-600 hidden"></div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:flex sm:flex-row-reverse gap-2">
                    <button type="button" id="btn-save-pwd" class="w-full sm:w-auto inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-sm font-medium text-white hover:bg-blue-700" data-i18n="auth.save">
                        Save
                    </button>
                    <button type="button" class="mt-3 sm:mt-0 w-full sm:w-auto inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50"
                        onclick="document.getElementById('modal-password').classList.add('hidden')" data-i18n="auth.cancel">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            function tr(key, params) {
                return typeof t === 'function' ? t(key, params) : key;
            }

            const token = localStorage.getItem('auth_token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            const AUTH_BASE_URL = (typeof siteConfig !== 'undefined' && siteConfig.apiBase)
                ? siteConfig.apiBase
                : ((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
                    ? 'http://127.0.0.1:8001'
                    : `${window.location.origin}/api`);

            async function fetchWithAuth(path, options = {}) {
                const res = await fetch(`${AUTH_BASE_URL}${path}`, {
                    ...options,
                    headers: {
                        Authorization: `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        ...(options.headers || {})
                    }
                });
                if (res.status === 401) {
                    localStorage.removeItem('auth_token');
                    window.location.href = 'login.html';
                    throw new Error('Unauthorized');
                }
                return res.json();
            }

            try {
                const data = await fetchWithAuth('/auth/me');
                if (!data.success) throw new Error(data.detail || tr('auth.loadProfileFailed'));
                const user = data.user;
                document.getElementById('profile-email').textContent = user.email || '--';
                document.getElementById('profile-uid').textContent = user.id || '--';
                if (user.created_at) {
                    document.getElementById('profile-created-at').textContent =
                        String(user.created_at).replace('T', ' ').replace(/\.\d+$/, '');
                }
            } catch (e) {
                if (e.message !== 'Unauthorized') console.error(e);
            }

            document.getElementById('btn-logout-profile').addEventListener('click', () => {
                localStorage.removeItem('auth_token');
                window.location.href = 'login.html';
            });

            document.getElementById('btn-save-pwd').addEventListener('click', async () => {
                const oldPwd = document.getElementById('old-password').value;
                const newPwd = document.getElementById('new-password').value;
                const confirmPwd = document.getElementById('confirm-password').value;
                const msgEl = document.getElementById('pwd-msg');
                msgEl.classList.add('hidden');

                if (!oldPwd || !newPwd || !confirmPwd) {
                    msgEl.textContent = tr('auth.fillAllFields');
                    msgEl.classList.remove('hidden');
                    return;
                }
                if (newPwd !== confirmPwd) {
                    msgEl.textContent = tr('auth.passwordMismatch');
                    msgEl.classList.remove('hidden');
                    return;
                }
                if (newPwd.length < 6) {
                    msgEl.textContent = tr('auth.passwordTooShort');
                    msgEl.classList.remove('hidden');
                    return;
                }

                const btn = document.getElementById('btn-save-pwd');
                btn.disabled = true;
                btn.textContent = tr('auth.saving');

                try {
                    const res = await fetch(`${AUTH_BASE_URL}/auth/change-password`, {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ old_password: oldPwd, new_password: newPwd })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || tr('auth.updateFailed'));
                    alert(tr('auth.passwordUpdated'));
                    localStorage.removeItem('auth_token');
                    window.location.href = 'login.html';
                } catch (e) {
                    msgEl.textContent = e.message;
                    msgEl.classList.remove('hidden');
                } finally {
                    btn.disabled = false;
                    btn.textContent = tr('auth.save');
                }
            });
        });
    </script>
</body>
</html>
