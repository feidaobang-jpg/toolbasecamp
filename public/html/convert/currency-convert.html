<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currency Converter - Tool Basecamp</title>
  <meta name="description" content="Convert between CNY, USD, EUR, JPY, HKD, GBP with live or manual rates.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/tools-form.css?v=3" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.currencyConvert.title">Currency Converter</h1>
        <p data-i18n="tools.currencyConvert.desc">Convert amounts between major currencies using live rates or a manual rate.</p>
      </div>

      <div class="tool-card currency-card">
        <div class="field-row">
          <label class="field-label" for="amount-input" data-i18n="tools.currencyConvert.amountLabel">Amount</label>
          <input type="text" inputmode="decimal" id="amount-input" class="tb-input" data-i18n-placeholder="tools.currencyConvert.amountPlaceholder" placeholder="e.g. 100" autocomplete="off" />
        </div>
        <div class="field-row">
          <label class="field-label" for="from-currency" data-i18n="tools.currencyConvert.fromLabel">From</label>
          <select id="from-currency" class="tb-select">
            <option value="CNY" data-i18n="tools.currencyConvert.cny">人民币 (CNY)</option>
            <option value="USD" selected data-i18n="tools.currencyConvert.usd">美元 (USD)</option>
            <option value="EUR" data-i18n="tools.currencyConvert.eur">欧元 (EUR)</option>
            <option value="JPY" data-i18n="tools.currencyConvert.jpy">日元 (JPY)</option>
            <option value="HKD" data-i18n="tools.currencyConvert.hkd">港币 (HKD)</option>
            <option value="GBP" data-i18n="tools.currencyConvert.gbp">英镑 (GBP)</option>
          </select>
        </div>
        <div class="field-row">
          <label class="field-label" for="to-currency" data-i18n="tools.currencyConvert.toLabel">To</label>
          <select id="to-currency" class="tb-select">
            <option value="USD" data-i18n="tools.currencyConvert.usd">美元 (USD)</option>
            <option value="CNY" selected data-i18n="tools.currencyConvert.cny">人民币 (CNY)</option>
            <option value="EUR" data-i18n="tools.currencyConvert.eur">欧元 (EUR)</option>
            <option value="JPY" data-i18n="tools.currencyConvert.jpy">日元 (JPY)</option>
            <option value="HKD" data-i18n="tools.currencyConvert.hkd">港币 (HKD)</option>
            <option value="GBP" data-i18n="tools.currencyConvert.gbp">英镑 (GBP)</option>
          </select>
        </div>
        <div class="field-row">
          <label class="field-label" for="manual-rate" data-i18n="tools.currencyConvert.manualRateLabel">Manual rate (optional)</label>
          <input type="text" inputmode="decimal" id="manual-rate" class="tb-input" data-i18n-placeholder="tools.currencyConvert.manualRatePlaceholder" placeholder="1 source = ? target" autocomplete="off" />
        </div>
        <p class="tb-status currency-status" id="rate-status"></p>

        <div class="action-row">
          <button type="button" class="tb-btn" id="convert-btn" data-i18n="tools.currencyConvert.convert">Convert</button>
          <button type="button" class="tb-btn" id="clear-btn" data-i18n="tools.currencyConvert.clear">Clear</button>
        </div>

        <div class="error-box" id="error-box" role="alert"></div>

        <div class="tb-result" id="result-wrap" hidden>
          <div class="tb-result-title" data-i18n="tools.currencyConvert.resultTitle">Result</div>
          <div class="tb-result-row">
            <span class="tb-result-label" data-i18n="tools.currencyConvert.resultLabel">Converted</span>
            <span class="tb-result-value" id="result-value"></span>
          </div>
          <div class="tb-result-row">
            <span class="tb-result-label" data-i18n="tools.currencyConvert.rateUsedLabel">Rate used</span>
            <span class="tb-result-value" id="result-rate"></span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/locales/en.js?v=fx-ui1"></script>
  <script src="../../js/locales/zh-CN.js?v=fx-ui1"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/convert/currency-convert.js?v=3"></script>
</body>
</html>
