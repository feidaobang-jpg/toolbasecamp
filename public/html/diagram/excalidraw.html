<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteboard - Tool Basecamp</title>
    <meta name="description" content="Hand-drawn style whiteboard in your browser — sketch diagrams and notes with Excalidraw.">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/diagram/diagram-tools.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@excalidraw/excalidraw@0.18.0/dist/prod/index.css">
    <script>
        window.EXCALIDRAW_ASSET_PATH = 'https://cdn.jsdelivr.net/npm/@excalidraw/excalidraw@0.18.0/dist/prod/';
    </script>
</head>
<body>
    <div class="container">
        <aside class="sidebar"></aside>
        <main class="content content--board">
            <div class="diagram-tool diagram-tool--board">
                <div class="diagram-tool-header diagram-tool-header--compact">
                    <h2 data-i18n="tools.excalidraw.title">Whiteboard</h2>
                    <details class="diagram-tips-details">
                        <summary data-i18n="tools.excalidraw.tipsTitle">Tips</summary>
                        <ul>
                            <li data-i18n="tools.excalidraw.tip1">Pick tools on the left — rectangle, arrow, pen, text</li>
                            <li data-i18n="tools.excalidraw.tip2">Hold Space and drag to pan the canvas</li>
                            <li data-i18n="tools.excalidraw.tip3">Menu (☰) → Export image or Save to disk</li>
                        </ul>
                    </details>
                </div>

                <div id="error-box" class="diagram-error" role="alert"></div>
                <div id="loading-box" class="diagram-loading" data-i18n="tools.excalidraw.loading">Loading whiteboard…</div>

                <div class="diagram-canvas-wrap diagram-canvas-wrap--board">
                    <div id="excalidraw-root"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../js/locales/en.js"></script>
    <script src="../../js/locales/zh-CN.js"></script>
    <script src="../../js/i18n.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/base.js"></script>
    <script src="../../js/common_ui.js"></script>
    <script type="module" src="../../js/diagram/excalidraw.js"></script>
</body>
</html>
