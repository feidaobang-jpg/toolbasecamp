<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Images to PDF - Tool Basecamp</title>
  <meta name="description" content="Merge multiple images into a single PDF in your browser. No upload required.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.imagesToPdf.title">Images to PDF</h1>
        <p data-i18n="tools.imagesToPdf.desc">Merge multiple images into a single PDF file in your browser</p>
      </div>

      <div class="tool-card">
        <div class="img-list" id="img-list">
          <div class="img-add-btn" id="img-add-btn">
            <span>＋</span>
            <span>Add images</span>
          </div>
        </div>
        <input type="file" id="file-input" accept="image/*" multiple style="display:none" />

        <div class="tip-box">
          <b>Tip:</b> Supports JPG, PNG, WebP. Image order becomes page order. Drag thumbnails to reorder. All processing happens locally.
        </div>

        <div class="options-row">
          <label>Orientation:
            <select id="orientation-select">
              <option value="auto">Auto (follow image)</option>
              <option value="portrait">Portrait</option>
              <option value="landscape">Landscape</option>
            </select>
          </label>
          <label>Margin:
            <select id="margin-select">
              <option value="0">None</option>
              <option value="10" selected>Small</option>
              <option value="20">Medium</option>
            </select>
          </label>
        </div>

        <div class="action-row">
          <button type="button" class="tb-btn" id="convert-btn" disabled data-i18n="tools.imagesToPdf.merge">Merge to PDF</button>
          <button type="button" class="tb-btn" id="clear-btn" data-i18n="tools.imagesToPdf.clear">Clear</button>
        </div>

        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-label">
            <span id="progress-status">Processing...</span>
            <span id="progress-percent">0%</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>

        <div class="error-box" id="error-box">
          <span>⚠️</span>
          <span id="error-msg">Generation failed</span>
        </div>

        <div class="result-wrap" id="result-wrap">
          <div class="result-box">
            <span class="result-icon">📕</span>
            <div class="result-info">
              <div class="result-name" id="result-name">output.pdf</div>
              <div class="result-size" id="result-size">Done</div>
            </div>
            <a class="tb-btn" id="download-btn" href="#" download="output.pdf" data-i18n="tools.imagesToPdf.download">Download PDF</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/common_ui.js"></script>
  <script src="../../js/docs/images-to-pdf.js"></script>
</body>
</html>
