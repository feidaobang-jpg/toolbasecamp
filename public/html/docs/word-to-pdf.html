<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word to PDF - Tool Basecamp</title>
  <meta name="description" content="Convert Word DOC or DOCX files to PDF online.">
  <link rel="stylesheet" href="../../css/base.css?v=3" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=3" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.wordToPdf.title">Word to PDF</h1>
        <p data-i18n="tools.wordToPdf.desc">Convert Word documents to PDF</p>
      </div>

      <div class="tool-card">
        <div class="drop-zone" id="drop-zone">
          <div class="drop-icon">📂</div>
          <div class="drop-title" data-i18n="tools.wordToPdf.dropTitle">Click or drag a Word file here</div>
          <div class="drop-hint" data-i18n="tools.wordToPdf.dropHint">Supports .doc and .docx up to 50 MB</div>
          <input type="file" id="file-input" accept=".doc,.docx" style="display:none" />
        </div>

        <div class="file-info-row" id="file-info" style="display:none">
          <span class="file-icon">📝</span>
          <span class="file-name" id="file-name">-</span>
          <span class="file-size" id="file-size">-</span>
          <button class="remove-btn" id="remove-btn" title="Remove">✕</button>
        </div>

        <div class="tip-box" style="margin-top:14px">
          <b>Note:</b> Conversion uses LibreOffice. Documents with special fonts or macros may differ slightly.
        </div>

        <div class="action-row">
          <button type="button" class="tb-btn" id="convert-btn" disabled data-i18n="tools.wordToPdf.convert">Convert</button>
          <button type="button" class="tb-btn" id="clear-btn" data-i18n="tools.wordToPdf.clear">Clear</button>
        </div>

        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-label">
            <span id="progress-status">Converting...</span>
            <span id="progress-percent">0%</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>

        <div class="error-box" id="error-box">
          <span>⚠️</span>
          <span id="error-msg">Conversion failed</span>
        </div>

        <div class="result-wrap" id="result-wrap">
          <div class="result-box">
            <span class="result-icon">📕</span>
            <div class="result-info">
              <div class="result-name" id="result-name">-</div>
              <div class="result-size" id="result-size">Done</div>
            </div>
            <a class="tb-btn" id="download-btn" href="#" download data-i18n="tools.wordToPdf.downloadPdf">Download PDF</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/common_ui.js"></script>
  <script src="../../js/docs/word-to-pdf.js"></script>
</body>
</html>
