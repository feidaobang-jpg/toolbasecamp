<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>街机乱斗 · Arena Brawl</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#05070f;color:#e2e8f0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden;touch-action:none}
#wrap{position:relative;width:100%;height:100%;max-width:960px;margin:0 auto;background:#000}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;left:0;right:0;top:0;padding:10px 14px;pointer-events:none;text-shadow:0 2px 4px #000}
#hud .bar{height:12px;background:#1e293b;border:1px solid #475569;border-radius:6px;overflow:hidden;margin-top:4px}
#hud .bar>i{display:block;height:100%;background:linear-gradient(90deg,#ef4444,#fbbf24);width:100%}
#hud .sp>i{background:linear-gradient(90deg,#2563eb,#38bdf8)}
#hud .combo{position:absolute;right:16px;top:18px;font-size:28px;font-weight:800;color:#fbbf24;opacity:0;transform:scale(.8);transition:opacity .15s,transform .15s}
#hud .combo.on{opacity:1;transform:scale(1)}
#ui{position:absolute;inset:0;pointer-events:none}
#ui .panel{pointer-events:auto;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(92%,420px);background:rgba(10,14,28,.94);border:1px solid #334155;border-radius:16px;padding:20px 18px;box-shadow:0 20px 60px rgba(0,0,0,.55)}
#ui h1{font-size:1.5rem;color:#38bdf8;margin-bottom:8px}
#ui p{font-size:.88rem;line-height:1.5;color:#94a3b8;margin-bottom:8px}
#ui .row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
#ui button{font:inherit;flex:1;min-width:120px;border:0;border-radius:999px;padding:11px 16px;background:#2563eb;color:#fff;cursor:pointer}
#ui button.ghost{background:#1e293b;border:1px solid #475569}
#touch{display:none;position:absolute;inset:0;pointer-events:none}
#touch .pad{pointer-events:auto;position:absolute;left:14px;bottom:16px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2)}
#touch .stick{position:absolute;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.3);left:36px;top:36px}
#touch .btn{pointer-events:auto;position:absolute;width:68px;height:68px;border-radius:50%;background:rgba(37,99,235,.55);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center}
#touch .a{right:22px;bottom:28px}#touch .b{right:96px;bottom:22px}#touch .c{right:56px;bottom:96px}
@media(pointer:coarse){#touch{display:block}}
.hidden{display:none!important}
#credit{position:absolute;left:10px;bottom:8px;font-size:10px;color:rgba(148,163,184,.7);pointer-events:none}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div>HP</div><div class="bar"><i id="hpBar"></i></div>
    <div style="margin-top:6px">必杀</div><div class="bar sp"><i id="spBar"></i></div>
    <div style="margin-top:8px;font-size:12px">波次 <b id="waveN">1</b> · 击倒 <b id="kills">0</b> · 最高 <b id="best">0</b></div>
    <div class="combo" id="combo">COMBO 0</div>
  </div>
  <div id="touch">
    <div class="pad" id="pad"><div class="stick" id="stick"></div></div>
    <div class="btn a" id="btnAtk">拳</div>
    <div class="btn b" id="btnSp">必杀</div>
    <div class="btn c" id="btnJump">跳</div>
  </div>
  <div id="ui">
    <div class="panel" id="panelMenu">
      <h1>街机乱斗 Arena</h1>
      <p>横版 2.5D 对战。角色与场景全部 Canvas 程序化绘制，无外部图片。</p>
      <p>键鼠：WASD / 方向键移动 · J / 空格 出拳连招 · K 跳跃 · L / U 必杀<br/>触屏：摇杆 + 拳 / 跳 / 必杀</p>
      <div class="row"><button id="btnStart">开战</button></div>
    </div>
    <div class="panel hidden" id="panelOver">
      <h1 id="overTitle">战斗结束</h1>
      <p id="overText"></p>
      <div class="row">
        <button id="btnRetry">再战</button>
        <button class="ghost" id="btnMenu">标题</button>
      </div>
    </div>
  </div>
  <div id="credit">GFX: Canvas 程序化 · SFX: WebAudio</div>
</div>
<script>
(function(){
'use strict';
const SAVE='tbc_arena_brawl_v1';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('wrap');

let W=800,H=450,DPR=1,SCALE=1;
let mode='menu', lastT=0, best=0;
let keys={}, touchMove={x:0,y:0,active:false};
let hitstop=0, shake=0, slowMo=0, flash=0, rgbSplit=0;
let particles=[], sparks=[], floats=[], afterimages=[];
let world=null, audioCtx=null;

try{best=(JSON.parse(localStorage.getItem(SAVE)||'{}').best)|0}catch(e){}
document.getElementById('best').textContent=String(best);

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function rand(a,b){return a+Math.random()*(b-a)}
function pick(a){return a[(Math.random()*a.length)|0]}
function lerp(a,b,t){return a+(b-a)*t}

function ensureAudio(){
  if(audioCtx)return audioCtx;
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC)return null;
  audioCtx=new AC();return audioCtx;
}
function tone(freq,dur,type,vol,slide,delay){
  const ac=ensureAudio();if(!ac)return;
  const t0=ac.currentTime+(delay||0);
  const o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
  o.type=type||'square';
  o.frequency.setValueAtTime(freq,t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,slide),t0+dur);
  f.type='lowpass';f.frequency.value=2200;
  g.gain.setValueAtTime(vol||0.06,t0);
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(f);f.connect(g);g.connect(ac.destination);
  o.start(t0);o.stop(t0+dur+0.03);
}
function noiseBurst(dur,vol){
  const ac=ensureAudio();if(!ac)return;
  const n=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
  const d=n.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
  const s=ac.createBufferSource();s.buffer=n;
  const g=ac.createGain();g.gain.value=vol||0.08;
  s.connect(g);g.connect(ac.destination);s.start();
}
function sfx(name){
  if(name==='jab'){tone(220,0.06,'square',0.05,90);noiseBurst(0.04,0.05)}
  else if(name==='hook'){tone(160,0.09,'sawtooth',0.06,70);noiseBurst(0.06,0.07);tone(90,0.12,'triangle',0.04,40,0.02)}
  else if(name==='upper'){tone(280,0.08,'square',0.06,140);tone(120,0.18,'sawtooth',0.05,50,0.03);noiseBurst(0.1,0.09)}
  else if(name==='special'){tone(100,0.25,'sawtooth',0.07,40);tone(440,0.2,'square',0.05,180,0.05);noiseBurst(0.2,0.1)}
  else if(name==='hit'){noiseBurst(0.05,0.08);tone(80,0.08,'triangle',0.05)}
  else if(name==='jump')tone(320,0.08,'sine',0.04,180);
  else if(name==='ko'){tone(60,0.4,'sawtooth',0.08,30);tone(200,0.3,'square',0.05,80,0.1)}
  else if(name==='start')tone(260,0.12,'sine',0.05,520);
  else if(name==='whoosh')tone(400,0.05,'triangle',0.03,120);
}

function resize(){
  const r=wrap.getBoundingClientRect();
  DPR=Math.min(2,devicePixelRatio||1);
  W=Math.max(480,r.width|0);H=Math.max(300,r.height|0);
  canvas.width=(W*DPR)|0;canvas.height=(H*DPR)|0;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  SCALE=Math.min(1.35, Math.max(0.95, H/480));
}
window.addEventListener('resize',resize);

function groundY(){return H*0.72}
function zToY(z){return groundY()+z*0.55}
function sortDraw(a,b){return a.z-b.z||a.x-b.x}

function makeFighter(kind,x,z,face){
  const isP=kind==='player';
  return {
    kind,x,z,vx:0,vz:0,vy:0,face:face||1,
    hp:isP?100:36,maxHp:isP?100:36,sp:0,maxSp:100,
    state:'idle',animT:0,atkLock:0,hitStun:0,invuln:0,
    comboStep:0,comboTimer:0,air:false,dead:false,
    flash:0,scalePunch:1,_airY:0
  };
}

function poseOf(f){
  if(f.dead)return 'dead';
  if(f.hitStun>0)return 'hit';
  if(f.state==='jab'||f.state==='hook'||f.state==='upper'||f.state==='special'||f.state==='jumpAtk')return f.state;
  if(f.air)return 'jump';
  if(Math.abs(f.vx)+Math.abs(f.vz)>12)return 'walk';
  return 'idle';
}

function startAttack(f,type){
  if(f.dead||f.atkLock>0||f.hitStun>0)return;
  f.state=type;
  f.animT=0;
  f.scalePunch=1.18;
  if(type==='jab'){f.atkLock=0.22;sfx('jab');sfx('whoosh')}
  else if(type==='hook'){f.atkLock=0.34;sfx('hook')}
  else if(type==='upper'){f.atkLock=0.42;sfx('upper')}
  else if(type==='special'){f.atkLock=0.55;f.sp=Math.max(0,f.sp-50);sfx('special')}
  else if(type==='jumpAtk'){f.atkLock=0.3;sfx('jab')}
  f._hitAt=type==='jab'?0.06:type==='hook'?0.1:type==='special'?0.12:0.08;
  f._hitDone=false;
  f._dmg=type==='jab'?8:type==='hook'?14:type==='upper'?22:type==='special'?35:12;
  f._kb=type==='jab'?90:type==='hook'?160:type==='upper'?220:type==='special'?320:140;
  f._hitZ=18;f._hitX=type==='special'?70:42;
}

function tryCombo(f){
  if(f.air){startAttack(f,'jumpAtk');return}
  if(f.comboTimer<=0)f.comboStep=0;
  f.comboStep++;
  f.comboTimer=0.55;
  if(f.comboStep===1)startAttack(f,'jab');
  else if(f.comboStep===2)startAttack(f,'hook');
  else {startAttack(f,'upper');f.comboStep=0}
}

function spawnFX(x,y,kind){
  if(kind==='spark'){
    for(let i=0;i<18;i++)particles.push({x,y,vx:rand(-220,220),vy:rand(-280,40),life:rand(0.2,0.55),c:pick(['#fff','#fbbf24','#38bdf8','#f472b6']),r:rand(2,5)});
    sparks.push({x,y,t:0,life:0.25});
  }else if(kind==='burst'){
    for(let i=0;i<36;i++){
      const a=rand(0,Math.PI*2),sp=rand(80,360);
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-80,life:rand(0.3,0.7),c:pick(['#fde68a','#fb7185','#38bdf8','#fff']),r:rand(2,7)});
    }
  }else if(kind==='slash'){
    sparks.push({x,y,t:0,life:0.18,slash:true,face:world.player.face});
  }
}

function applyHit(attacker,target){
  if(target.dead||target.invuln>0)return;
  const dmg=attacker._dmg*(1+Math.min(2,world.combo*0.08));
  target.hp-=dmg;
  target.hitStun=0.28;
  target.invuln=0.12;
  target.flash=0.15;
  target.vx=attacker.face*attacker._kb;
  target.vy=attacker.state==='upper'||attacker.state==='special'?-520:-180;
  target.air=true;
  if((target._airY||0)>=0)target._airY=-2;
  target.state='hit';
  attacker.sp=Math.min(attacker.maxSp,attacker.sp+8);
  if(attacker.kind==='player'&&(attacker.state==='special'||world.combo%3===0)){
    afterimages.push({x:attacker.x,z:attacker.z,pose:poseOf(attacker),face:attacker.face,life:0.22,kind:attacker.kind,_airY:attacker._airY||0,animT:attacker.animT});
  }
  world.combo++;
  world.comboFade=1.6;
  world.hits++;
  const sx=target.x+attacker.face*20;
  const sy=zToY(target.z)+(target._airY||0)-52*SCALE;
  floats.push({x:sx,y:sy,t:0,text:'-'+Math.floor(dmg),c:'#fde68a'});
  spawnFX(sx,sy,attacker.state==='special'?'burst':'spark');
  if(attacker.state==='hook'||attacker.state==='upper')spawnFX(sx,sy,'slash');
  hitstop=attacker.state==='special'?0.12:attacker.state==='upper'?0.09:0.05;
  shake=attacker.state==='special'?14:attacker.state==='upper'?10:6;
  flash=0.12;rgbSplit=0.15;
  if(attacker.state==='special'||attacker.state==='upper')slowMo=0.18;
  sfx('hit');
  if(target.hp<=0){
    target.hp=0;target.dead=true;target.hitStun=999;world.kills++;
    sfx('ko');slowMo=0.35;shake=16;spawnFX(sx,sy,'burst');
    floats.push({x:sx,y:sy-20,t:0,text:'KO!',c:'#fb7185'});
  }
  updateHud();
}

function updateHud(){
  if(!world)return;
  const p=world.player;
  document.getElementById('hpBar').style.width=(100*p.hp/p.maxHp)+'%';
  document.getElementById('spBar').style.width=(100*p.sp/p.maxSp)+'%';
  document.getElementById('waveN').textContent=String(world.wave);
  document.getElementById('kills').textContent=String(world.kills);
  document.getElementById('best').textContent=String(best);
  const c=document.getElementById('combo');
  if(world.combo>=2){c.textContent='COMBO '+world.combo;c.classList.add('on')}
  else c.classList.remove('on');
}

function newGame(){
  world={
    player:makeFighter('player',W*0.35,0,1),
    enemies:[],wave:1,toSpawn:3,spawnT:0.5,kills:0,combo:0,comboFade:0,hits:0,camX:0,time:0
  };
  particles=[];sparks=[];floats=[];afterimages=[];
  mode='play';
  document.getElementById('panelMenu').classList.add('hidden');
  document.getElementById('panelOver').classList.add('hidden');
  sfx('start');
  updateHud();
}

function gameOver(win){
  mode='over';
  const score=world.kills*100+world.hits*5+Math.floor(world.combo*20);
  best=Math.max(best,score);
  try{localStorage.setItem(SAVE,JSON.stringify({best}))}catch(e){}
  document.getElementById('panelOver').classList.remove('hidden');
  document.getElementById('overTitle').textContent=win?'清场胜利':'你倒下了';
  document.getElementById('overText').textContent='得分 '+score+' · 击倒 '+world.kills+' · 最高 '+best;
}

function spawnEnemy(){
  const side=Math.random()<0.5?-1:1;
  const e=makeFighter('enemy',world.camX+W*0.5+side*(W*0.55),rand(-40,50),-side);
  e.hp=28+world.wave*6;e.maxHp=e.hp;
  world.enemies.push(e);
}

function ai(e,dt){
  if(e.dead||e.hitStun>0||e.atkLock>0)return;
  const p=world.player;
  const dx=p.x-e.x,dz=p.z-e.z;
  const dist=Math.hypot(dx,dz);
  e.face=dx>=0?1:-1;
  if(dist>48){
    e.vx=Math.sign(dx)*70;
    e.vz=Math.sign(dz)*40;
  }else{
    e.vx*=0.8;e.vz*=0.8;
    if(Math.random()<dt*1.6)startAttack(e,Math.random()<0.7?'jab':'hook');
  }
}

function fighterPhysics(f,dt){
  f.animT+=dt;
  if(f.atkLock>0)f.atkLock-=dt;
  if(f.hitStun>0)f.hitStun-=dt;
  if(f.invuln>0)f.invuln-=dt;
  if(f.flash>0)f.flash-=dt;
  if(f.comboTimer>0)f.comboTimer-=dt;
  if(f.scalePunch>1)f.scalePunch+=(1-f.scalePunch)*Math.min(1,dt*10);

  if(f.atkLock<=0&&f.hitStun<=0&&!f.dead&&(f.state==='jab'||f.state==='hook'||f.state==='upper'||f.state==='special'||f.state==='jumpAtk'||f.state==='hit')){
    f.state='idle';
  }

  if(f.air){
    f.vy+=1600*dt;
    f._airY=(f._airY||0)+f.vy*dt;
    if(f._airY>=0){f._airY=0;f.vy=0;f.air=false}
  }else{f._airY=0;f.vy=0}

  if(f.atkLock<=0&&f.hitStun<=0&&!f.dead){
    f.x+=f.vx*dt;
    f.z+=f.vz*dt;
  }else{
    f.x+=f.vx*dt*0.35;
    f.vx*=Math.pow(0.05,dt);
  }
  f.z=clamp(f.z,-70,70);
  f.x=clamp(f.x,world.camX+40,world.camX+W-40);

  if(f.atkLock>0&&f._hitAt!=null&&!f._hitDone){
    const elapsed=(f.state==='jab'?0.22:f.state==='hook'?0.34:f.state==='upper'?0.42:f.state==='special'?0.55:0.3)-f.atkLock;
    if(elapsed>=f._hitAt){
      f._hitDone=true;
      const targets=f.kind==='player'?world.enemies:[world.player];
      targets.forEach(t=>{
        if(!t||t.dead)return;
        if(Math.abs(t.z-f.z)>f._hitZ)return;
        const dx=(t.x-f.x)*f.face;
        if(dx>8&&dx<f._hitX+30)applyHit(f,t);
      });
    }
  }
}

function update(dt){
  if(mode!=='play'||!world)return;
  let d=dt;
  if(hitstop>0){hitstop-=dt;d=0}
  if(slowMo>0){slowMo-=dt;d*=0.35}
  if(shake>0)shake*=Math.pow(0.04,dt);
  if(flash>0)flash-=dt;
  if(rgbSplit>0)rgbSplit-=dt;

  world.time+=d;
  if(world.comboFade>0){world.comboFade-=d;if(world.comboFade<=0)world.combo=0}
  updateHud();

  const p=world.player;
  let mx=0,mz=0;
  if(keys['a']||keys['arrowleft'])mx-=1;
  if(keys['d']||keys['arrowright'])mx+=1;
  if(keys['w']||keys['arrowup'])mz-=1;
  if(keys['s']||keys['arrowdown'])mz+=1;
  if(touchMove.active){mx+=touchMove.x;mz+=touchMove.y}
  const len=Math.hypot(mx,mz)||1;
  if(len>1){mx/=len;mz/=len}
  if(p.atkLock<=0&&p.hitStun<=0&&!p.dead){
    p.vx=mx*160;p.vz=mz*110;
    if(mx)p.face=mx>0?1:-1;
  }else if(p.atkLock<=0){p.vx*=0.85;p.vz*=0.85}

  world.camX+=(p.x-W*0.4-world.camX)*Math.min(1,d*4);

  if(world.toSpawn>0){
    world.spawnT-=d;
    if(world.spawnT<=0){spawnEnemy();world.toSpawn--;world.spawnT=0.7}
  }else if(world.enemies.length&&world.enemies.every(e=>e.dead)){
    world.wave++;
    world.toSpawn=2+world.wave;
    world.spawnT=1.0;
    floats.push({x:p.x,y:zToY(p.z)-100,t:0,text:'WAVE '+world.wave,c:'#38bdf8'});
    if(world.wave>6){gameOver(true);return}
  }

  fighterPhysics(p,d);
  world.enemies.forEach(e=>{ai(e,d);fighterPhysics(e,d)});
  world.enemies=world.enemies.filter(e=>!(e.dead&&e.animT>1.2));

  if(p.dead&&p.animT>1.0)gameOver(false);

  particles.forEach(pt=>{pt.x+=pt.vx*d;pt.y+=pt.vy*d;pt.vy+=600*d;pt.life-=d});
  particles=particles.filter(pt=>pt.life>0);
  sparks.forEach(s=>s.t+=d);
  sparks=sparks.filter(s=>s.t<s.life);
  floats.forEach(f=>{f.t+=d;f.y-=40*d});
  floats=floats.filter(f=>f.t<1);
  afterimages.forEach(a=>a.life-=d);
  afterimages=afterimages.filter(a=>a.life>0);
}

/* —— 程序化绘制 —— */
function roundRect(x,y,w,h,r){
  const rr=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+rr,y);
  ctx.arcTo(x+w,y,x+w,y+h,rr);
  ctx.arcTo(x+w,y+h,x,y+h,rr);
  ctx.arcTo(x,y+h,x,y,rr);
  ctx.arcTo(x,y,x+w,y,rr);
  ctx.closePath();
}

function limb(x1,y1,x2,y2,w,c){
  ctx.strokeStyle=c;
  ctx.lineWidth=w;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
}

function drawCharBody(opt){
  const {
    pose, animT, isPlayer, charged, flashAmt, alpha
  }=opt;
  const skin=isPlayer?'#f5c6a0':'#9aa8b8';
  const hair=isPlayer?'#1e293b':'#334155';
  const shirt=isPlayer?(charged?'#2563eb':'#38bdf8'):'#64748b';
  const pants=isPlayer?'#1d4ed8':'#475569';
  const accent=isPlayer?'#fbbf24':'#94a3b8';
  const boot=isPlayer?'#0f172a':'#1e293b';
  const t=animT||0;
  const walk=Math.sin(t*12);

  let la={x:-10,y:8}, ra={x:10,y:8}; // arm ends relative torso
  let ll={x:-7,y:34}, rl={x:7,y:34};
  let bodyLean=0, punchGlow=false, fistSize=7;

  if(pose==='walk'){
    ll={x:-8+walk*6,y:34}; rl={x:8-walk*6,y:34};
    la={x:-12,y:10-walk*4}; ra={x:12,y:10+walk*4};
  }else if(pose==='jab'){
    ra={x:28,y:2}; la={x:-8,y:12}; bodyLean=4; punchGlow=true;
  }else if(pose==='hook'){
    ra={x:26,y:-4}; la={x:-6,y:14}; bodyLean=6; punchGlow=true; fistSize=8;
  }else if(pose==='upper'){
    ra={x:18,y:-22}; la={x:-8,y:10}; bodyLean=2; punchGlow=true; fistSize=9;
  }else if(pose==='special'){
    ra={x:36,y:-6}; la={x:-4,y:8}; bodyLean=10; punchGlow=true; fistSize=11;
  }else if(pose==='jump'||pose==='jumpAtk'){
    ll={x:-10,y:28}; rl={x:10,y:28};
    la={x:-14,y:0}; ra={x:pose==='jumpAtk'?26:14,y:pose==='jumpAtk'?-4:0};
    if(pose==='jumpAtk')punchGlow=true;
  }else if(pose==='hit'){
    la={x:-16,y:0}; ra={x:8,y:14}; bodyLean=-8;
    ll={x:-4,y:34}; rl={x:10,y:32};
  }else if(pose==='dead'){
    // flat on ground drawn separately
  }else{
    la={x:-11,y:10+Math.sin(t*3)*1.5}; ra={x:11,y:10-Math.sin(t*3)*1.5};
  }

  ctx.save();
  ctx.globalAlpha=alpha==null?1:alpha;
  if(flashAmt>0)ctx.globalCompositeOperation='lighter';

  if(pose==='dead'){
    ctx.fillStyle=shirt;
    roundRect(-22,-10,44,16,6);ctx.fill();
    ctx.fillStyle=skin;
    ctx.beginPath();ctx.arc(18,-2,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=hair;
    ctx.beginPath();ctx.arc(18,-5,8,Math.PI,0);ctx.fill();
    ctx.restore();
    return;
  }

  ctx.translate(bodyLean,0);

  // legs
  limb( -4,12, ll.x,ll.y, 7*SCALE, pants);
  limb(  4,12, rl.x,rl.y, 7*SCALE, pants);
  ctx.fillStyle=boot;
  ctx.beginPath();ctx.ellipse(ll.x,ll.y+3,7,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(rl.x,rl.y+3,7,3.5,0,0,Math.PI*2);ctx.fill();

  // torso
  const tg=ctx.createLinearGradient(0,-18,0,16);
  tg.addColorStop(0,shirt);tg.addColorStop(1,pants);
  ctx.fillStyle=tg;
  roundRect(-12,-16,24,30,8);ctx.fill();
  if(isPlayer){
    ctx.fillStyle=accent;
    ctx.fillRect(-3,-8,6,10);
  }else{
    ctx.fillStyle='#94a3b8';
    roundRect(-8,-6,16,8,2);ctx.fill();
    ctx.fillStyle='#0f172a';
    ctx.fillRect(-5,-4,4,4);ctx.fillRect(1,-4,4,4);
  }

  // arms
  limb( -8,-4, la.x,la.y, 6*SCALE, shirt);
  limb(  8,-4, ra.x,ra.y, 6*SCALE, shirt);
  ctx.fillStyle=skin;
  ctx.beginPath();ctx.arc(la.x,la.y,6,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(ra.x,ra.y,fistSize,0,Math.PI*2);ctx.fill();
  if(punchGlow){
    ctx.fillStyle='rgba(251,191,36,.55)';
    ctx.beginPath();ctx.arc(ra.x,ra.y,fistSize+6,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.8)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(ra.x,ra.y,fistSize+10,0,Math.PI*2);ctx.stroke();
  }
  if(charged&&isPlayer){
    ctx.strokeStyle='rgba(56,189,248,.7)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,-28,16+Math.sin(t*10)*2,0,Math.PI*2);ctx.stroke();
  }

  // head
  ctx.fillStyle=skin;
  ctx.beginPath();ctx.arc(0,-28,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=hair;
  ctx.beginPath();ctx.ellipse(0,-34,13,8,0,Math.PI,0);ctx.fill();
  if(isPlayer){
    ctx.fillStyle='#0f172a';
    ctx.beginPath();ctx.ellipse(-4,-28,2.2,2.8,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(4,-28,2.2,2.8,0,0,Math.PI*2);ctx.fill();
  }else{
    ctx.fillStyle='#ef4444';
    ctx.fillRect(-7,-30,5,3);ctx.fillRect(2,-30,5,3);
  }

  ctx.globalCompositeOperation='source-over';
  ctx.restore();
}

function drawFighterVisual(f, cam, ghost){
  const x=f.x-cam;
  const air=f._airY||0;
  const y=zToY(f.z)+air;
  const sc=SCALE*(f.scalePunch||1)*(f.kind==='enemy'?0.92:1)*(ghost?0.95:1);
  const shScale=clamp(1+air/120,0.45,1);

  ctx.save();
  ctx.globalAlpha=ghost?(ghost.life*2.2):0.4*shScale;
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.ellipse(x,zToY(f.z),16*sc*shScale,5*sc*shScale,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(x,y);
  ctx.scale(f.face*sc, sc);
  drawCharBody({
    pose:ghost?ghost.pose:poseOf(f),
    animT:ghost?ghost.animT:f.animT,
    isPlayer:f.kind==='player',
    charged:f.kind==='player'&&f.sp>=30,
    flashAmt:ghost?0:f.flash,
    alpha:ghost?clamp(ghost.life*2.2,0,0.5):1
  });
  ctx.restore();

  if(f.kind==='enemy'&&!f.dead&&!ghost){
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(x-22,y-78*sc-8,44,5);
    ctx.fillStyle='#ef4444';ctx.fillRect(x-22,y-78*sc-8,44*(f.hp/f.maxHp),5);
  }
}

function drawStage(cam){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#312e81');
  g.addColorStop(0.4,'#0f172a');
  g.addColorStop(1,'#020617');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // stars
  ctx.fillStyle='rgba(255,255,255,.35)';
  for(let i=0;i<40;i++){
    const sx=((i*97-cam*0.05)%W+W)%W;
    const sy=20+(i*37)%(groundY()*0.45);
    ctx.fillRect(sx,sy,2,2);
  }

  // neon skyline (parallax)
  const base=groundY()-10;
  for(let layer=0;layer<2;layer++){
    const parallax=layer===0?0.2:0.45;
    const alpha=layer===0?0.35:0.55;
    ctx.fillStyle=layer===0?'#1e1b4b':'#0b1224';
    ctx.globalAlpha=alpha;
    for(let i=-1;i<10;i++){
      const bw=50+((i*17)%40);
      const bh=40+((i*29)%90);
      const bx=((i*70-cam*parallax)%(W+120))-40;
      ctx.fillRect(bx,base-bh,bw,bh);
      if(layer===1){
        ctx.fillStyle='#fbbf24';
        ctx.globalAlpha=0.25;
        for(let wy=8;wy<bh-8;wy+=12){
          for(let wx=6;wx<bw-6;wx+=10){
            if(((i+wx+wy)&3)===0)ctx.fillRect(bx+wx,base-bh+wy,4,5);
          }
        }
        ctx.fillStyle='#0b1224';
        ctx.globalAlpha=alpha;
      }
    }
    ctx.globalAlpha=1;
  }

  // floor
  const floorG=ctx.createLinearGradient(0,groundY()-20,0,H);
  floorG.addColorStop(0,'#1e293b');
  floorG.addColorStop(1,'#020617');
  ctx.fillStyle=floorG;
  ctx.fillRect(0,groundY()-8,W,H-groundY()+8);

  ctx.strokeStyle='rgba(56,189,248,.1)';
  ctx.lineWidth=1;
  for(let i=-2;i<12;i++){
    const y=zToY(-70+i*14);
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  // perspective lines
  ctx.strokeStyle='rgba(148,163,184,.08)';
  for(let i=0;i<8;i++){
    const x=((i*90-cam*0.7)%W+W)%W;
    ctx.beginPath();ctx.moveTo(x,groundY()-8);ctx.lineTo(lerp(x,W*0.5,0.35),H);ctx.stroke();
  }

  // foreground neon strip
  ctx.fillStyle='rgba(37,99,235,.25)';
  ctx.fillRect(0,H-28,W,8);
  ctx.fillStyle='rgba(251,191,36,.2)';
  ctx.fillRect(0,H-18,W,4);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>0.4)ctx.translate(rand(-shake,shake),rand(-shake,shake));
  const cam=world?world.camX:0;

  drawStage(cam);

  if(world){
    afterimages.forEach(a=>{
      drawFighterVisual({
        x:a.x,z:a.z,face:a.face,kind:a.kind,_airY:a._airY,
        scalePunch:1,sp:0,flash:0,dead:false,state:'idle',animT:a.animT,vx:0,vz:0,air:false,hitStun:0
      }, cam, a);
    });
    const list=[world.player,...world.enemies].filter(Boolean);
    list.sort(sortDraw);
    list.forEach(f=>drawFighterVisual(f,cam,null));
  }else{
    // menu preview
    const preview={
      kind:'player',x:cam+W*0.5,z:0,face:1,_airY:0,scalePunch:1,sp:40,flash:0,
      dead:false,state:'idle',animT:performance.now()/1000,vx:40,vz:0,air:false,hitStun:0
    };
    drawFighterVisual(preview,cam,null);
  }

  particles.forEach(p=>{
    ctx.globalAlpha=clamp(p.life*2,0,1);
    ctx.fillStyle=p.c;
    ctx.beginPath();ctx.arc(p.x-cam,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  sparks.forEach(s=>{
    const t=s.t/s.life;
    if(s.slash){
      ctx.save();
      ctx.translate(s.x-cam,s.y);
      ctx.scale((s.face||1)*(1.2+t),1);
      ctx.globalAlpha=1-t;
      ctx.strokeStyle='#fff';
      ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(-8,-18);ctx.quadraticCurveTo(20,0,40,12);
      ctx.stroke();
      ctx.strokeStyle='#fbbf24';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(-4,-10);ctx.quadraticCurveTo(18,2,34,10);
      ctx.stroke();
      ctx.restore();
    }else{
      ctx.strokeStyle='rgba(255,255,255,'+(1-t)+')';
      ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(s.x-cam,s.y,10+t*40,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='rgba(251,191,36,'+(1-t)*0.8+')';
      ctx.beginPath();ctx.arc(s.x-cam,s.y,6+t*28,0,Math.PI*2);ctx.stroke();
    }
  });
  floats.forEach(f=>{
    ctx.globalAlpha=1-f.t;
    ctx.fillStyle=f.c;ctx.font='bold 18px system-ui';ctx.textAlign='center';
    ctx.fillText(f.text,f.x-cam,f.y);
    ctx.textAlign='left';ctx.globalAlpha=1;
  });

  if(flash>0){
    ctx.fillStyle='rgba(255,255,255,'+(flash*0.55)+')';
    ctx.fillRect(0,0,W,H);
  }
  if(rgbSplit>0){
    ctx.globalCompositeOperation='screen';
    ctx.fillStyle='rgba(255,0,80,'+(rgbSplit*0.12)+')';ctx.fillRect(-4,0,W,H);
    ctx.fillStyle='rgba(0,200,255,'+(rgbSplit*0.12)+')';ctx.fillRect(4,0,W,H);
    ctx.globalCompositeOperation='source-over';
  }
  ctx.restore();
}

function loop(ts){
  const dt=Math.min(0.033,(ts-lastT)/1000||0.016);lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

window.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  ensureAudio();
  if(mode!=='play'||!world)return;
  if(e.code==='Space'||e.key==='j'||e.key==='J'){e.preventDefault();tryCombo(world.player)}
  if(e.key==='k'||e.key==='K'){
    e.preventDefault();
    const p=world.player;
    if(!p.air&&p.atkLock<=0&&p.hitStun<=0){p.air=true;p.vy=-620;p._airY=-4;sfx('jump')}
  }
  if(e.key==='l'||e.key==='L'||e.key==='u'||e.key==='U'){
    e.preventDefault();
    if(world.player.sp>=50)startAttack(world.player,'special');
  }
});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});

(function(){
  const pad=document.getElementById('pad'),stick=document.getElementById('stick');
  function setStick(cx,cy){
    const r=pad.getBoundingClientRect();
    let x=cx-(r.left+r.width/2),y=cy-(r.top+r.height/2);
    const m=Math.hypot(x,y)||1,max=40,mag=clamp(m/max,0,1);
    x/=m;y/=m;
    touchMove={x:x*mag,y:y*mag,active:mag>0.1};
    stick.style.left=(36+x*mag*28)+'px';stick.style.top=(36+y*mag*28)+'px';
  }
  function end(){touchMove={x:0,y:0,active:false};stick.style.left='36px';stick.style.top='36px'}
  pad.addEventListener('touchstart',e=>{e.preventDefault();ensureAudio();const t=e.changedTouches[0];setStick(t.clientX,t.clientY)},{passive:false});
  pad.addEventListener('touchmove',e=>{e.preventDefault();const t=e.changedTouches[0];setStick(t.clientX,t.clientY)},{passive:false});
  pad.addEventListener('touchend',e=>{e.preventDefault();end()},{passive:false});
  document.getElementById('btnAtk').addEventListener('touchstart',e=>{e.preventDefault();ensureAudio();if(world)tryCombo(world.player)},{passive:false});
  document.getElementById('btnJump').addEventListener('touchstart',e=>{e.preventDefault();ensureAudio();if(world){const p=world.player;if(!p.air&&p.atkLock<=0){p.air=true;p.vy=-620;p._airY=-4;sfx('jump')}}},{passive:false});
  document.getElementById('btnSp').addEventListener('touchstart',e=>{e.preventDefault();ensureAudio();if(world&&world.player.sp>=50)startAttack(world.player,'special')},{passive:false});
})();

document.getElementById('btnStart').onclick=()=>{ensureAudio();newGame()};
document.getElementById('btnRetry').onclick=()=>{ensureAudio();newGame()};
document.getElementById('btnMenu').onclick=()=>{
  mode='menu';world=null;
  document.getElementById('panelOver').classList.add('hidden');
  document.getElementById('panelMenu').classList.remove('hidden');
};

resize();
requestAnimationFrame(loop);
})();
</script>
</body>
