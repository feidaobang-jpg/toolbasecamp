<script type="module">
import * as THREE from 'three';

const SAVE = 'tbc_arena_strike_v1';
const wrap = document.getElementById('wrap');
const statsEl = {
  hp: document.getElementById('hpTxt'),
  kills: document.getElementById('kills'),
  wave: document.getElementById('wave'),
  best: document.getElementById('best'),
  bar: document.getElementById('hpBar'),
  flash: document.getElementById('dmgFlash'),
  hit: document.getElementById('hitMark')
};

let best = 0;
try { best = (JSON.parse(localStorage.getItem(SAVE) || '{}').best) | 0; } catch (e) {}
statsEl.best.textContent = String(best);

/* ========== WebAudio ========== */
let audioCtx = null;
function ensureAudio() {
  if (audioCtx) return audioCtx;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return null;
  audioCtx = new AC();
  return audioCtx;
}
function envGain(ac, t0, vol, attack, sustain, release) {
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + attack);
  g.gain.exponentialRampToValueAtTime(vol * 0.7, t0 + attack + sustain);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + attack + sustain + release);
  return g;
}
function noiseBuf(ac, dur) {
  const n = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d = n.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.2);
  return n;
}
function sfx(name) {
  const ac = ensureAudio();
  if (!ac) return;
  if (ac.state === 'suspended') ac.resume();
  const t0 = ac.currentTime;
  if (name === 'shoot') {
    const o = ac.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(180, t0);
    o.frequency.exponentialRampToValueAtTime(55, t0 + 0.09);
    const g = envGain(ac, t0, 0.07, 0.002, 0.02, 0.1);
    const f = ac.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.setValueAtTime(2400, t0);
    f.frequency.exponentialRampToValueAtTime(400, t0 + 0.1);
    o.connect(f); f.connect(g); g.connect(ac.destination);
    o.start(t0); o.stop(t0 + 0.14);
    const src = ac.createBufferSource();
    src.buffer = noiseBuf(ac, 0.08);
    const ng = envGain(ac, t0, 0.11, 0.001, 0.01, 0.07);
    const nf = ac.createBiquadFilter();
    nf.type = 'bandpass'; nf.frequency.value = 1200; nf.Q.value = 0.7;
    src.connect(nf); nf.connect(ng); ng.connect(ac.destination);
    src.start(t0);
  } else if (name === 'hit') {
    const o = ac.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(420, t0);
    o.frequency.exponentialRampToValueAtTime(90, t0 + 0.08);
    const g = envGain(ac, t0, 0.05, 0.001, 0.02, 0.08);
    o.connect(g); g.connect(ac.destination);
    o.start(t0); o.stop(t0 + 0.12);
    const src = ac.createBufferSource();
    src.buffer = noiseBuf(ac, 0.05);
    const ng = envGain(ac, t0, 0.08, 0.001, 0.01, 0.05);
    src.connect(ng); ng.connect(ac.destination);
    src.start(t0);
  } else if (name === 'hurt') {
    const o = ac.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(120, t0);
    o.frequency.exponentialRampToValueAtTime(40, t0 + 0.2);
    const g = envGain(ac, t0, 0.06, 0.01, 0.05, 0.15);
    o.connect(g); g.connect(ac.destination);
    o.start(t0); o.stop(t0 + 0.25);
  } else if (name === 'foot') {
    const src = ac.createBufferSource();
    src.buffer = noiseBuf(ac, 0.04);
    const ng = envGain(ac, t0, 0.035, 0.001, 0.01, 0.03);
    const nf = ac.createBiquadFilter();
    nf.type = 'lowpass'; nf.frequency.value = 500;
    src.connect(nf); nf.connect(ng); ng.connect(ac.destination);
    src.start(t0);
  } else if (name === 'ko') {
    const o = ac.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(200, t0);
    o.frequency.exponentialRampToValueAtTime(50, t0 + 0.35);
    const g = envGain(ac, t0, 0.07, 0.01, 0.1, 0.25);
    o.connect(g); g.connect(ac.destination);
    o.start(t0); o.stop(t0 + 0.4);
  } else if (name === 'win') {
    [523, 659, 784].forEach((f, i) => {
      const o = ac.createOscillator();
      o.type = 'sine';
      o.frequency.value = f;
      const g = envGain(ac, t0 + i * 0.1, 0.05, 0.01, 0.08, 0.15);
      o.connect(g); g.connect(ac.destination);
      o.start(t0 + i * 0.1); o.stop(t0 + i * 0.1 + 0.3);
    });
  } else if (name === 'start') {
    const o = ac.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(300, t0);
    o.frequency.exponentialRampToValueAtTime(600, t0 + 0.15);
    const g = envGain(ac, t0, 0.05, 0.01, 0.05, 0.1);
    o.connect(g); g.connect(ac.destination);
    o.start(t0); o.stop(t0 + 0.2);
  } else if (name === 'enemyShoot') {
    const o = ac.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(140, t0);
    o.frequency.exponentialRampToValueAtTime(60, t0 + 0.07);
    const g = envGain(ac, t0, 0.035, 0.001, 0.015, 0.07);
    o.connect(g); g.connect(ac.destination);
    o.start(t0); o.stop(t0 + 0.1);
  }
}

/* ========== Procedural PBR textures ========== */
function noise2(x, y) {
  const s = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
  return s - Math.floor(s);
}
function fbm(x, y) {
  let v = 0, a = 0.5;
  for (let i = 0; i < 5; i++) {
    v += a * noise2(x, y);
    x *= 2; y *= 2; a *= 0.5;
  }
  return v;
}
function makeCanvas(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  return { c, ctx: c.getContext('2d') };
}
function toTex(canvas, repeat = 4) {
  const t = new THREE.CanvasTexture(canvas);
  t.colorSpace = THREE.SRGBColorSpace;
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(repeat, repeat);
  t.anisotropy = 8;
  t.needsUpdate = true;
  return t;
}
function toDataTex(canvas, repeat = 4) {
  const t = new THREE.CanvasTexture(canvas);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(repeat, repeat);
  t.anisotropy = 4;
  t.needsUpdate = true;
  return t;
}

function genConcrete(size = 512) {
  const { c, ctx } = makeCanvas(size);
  const img = ctx.createImageData(size, size);
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const n = fbm(x / 40, y / 40);
      const v = 110 + n * 70 + (noise2(x, y) * 20);
      const i = (y * size + x) * 4;
      img.data[i] = v * 0.92;
      img.data[i + 1] = v * 0.94;
      img.data[i + 2] = v;
      img.data[i + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  // cracks
  ctx.strokeStyle = 'rgba(40,40,45,.25)';
  ctx.lineWidth = 1;
  for (let k = 0; k < 18; k++) {
    ctx.beginPath();
    let x = Math.random() * size, y = Math.random() * size;
    ctx.moveTo(x, y);
    for (let s = 0; s < 8; s++) {
      x += (Math.random() - 0.5) * 40;
      y += (Math.random() - 0.5) * 40;
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  const rough = makeCanvas(size);
  const rimg = rough.ctx.createImageData(size, size);
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const n = 140 + fbm(x / 30, y / 30) * 90;
      const i = (y * size + x) * 4;
      rimg.data[i] = rimg.data[i + 1] = rimg.data[i + 2] = n;
      rimg.data[i + 3] = 255;
    }
  }
  rough.ctx.putImageData(rimg, 0, 0);
  return { map: toTex(c, 6), rough: toDataTex(rough.c, 6) };
}

function genBrick(size = 512) {
  const { c, ctx } = makeCanvas(size);
  ctx.fillStyle = '#6b4f3a';
  ctx.fillRect(0, 0, size, size);
  const bw = 64, bh = 28, gap = 4;
  for (let row = 0; row < size / bh + 2; row++) {
    const off = (row % 2) * (bw / 2);
    for (let col = -1; col < size / bw + 2; col++) {
      const x = col * bw + off;
      const y = row * bh;
      const shade = 0.85 + noise2(col, row) * 0.2;
      ctx.fillStyle = `rgb(${Math.floor(140 * shade)},${Math.floor(72 * shade)},${Math.floor(48 * shade)})`;
      ctx.fillRect(x + gap / 2, y + gap / 2, bw - gap, bh - gap);
      ctx.fillStyle = 'rgba(255,200,160,.08)';
      ctx.fillRect(x + gap / 2, y + gap / 2, bw - gap, 3);
    }
  }
  const rough = makeCanvas(size);
  rough.ctx.fillStyle = '#aaa';
  rough.ctx.fillRect(0, 0, size, size);
  rough.ctx.fillStyle = '#666';
  for (let row = 0; row < size / bh + 2; row++) {
    const off = (row % 2) * (bw / 2);
    for (let col = -1; col < size / bw + 2; col++) {
      rough.ctx.fillRect(col * bw + off, row * bh, bw, gap);
      rough.ctx.fillRect(col * bw + off, row * bh, gap, bh);
    }
  }
  return { map: toTex(c, 3), rough: toDataTex(rough.c, 3) };
}

function genWood(size = 512) {
  const { c, ctx } = makeCanvas(size);
  const img = ctx.createImageData(size, size);
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const grain = Math.sin(x * 0.08 + fbm(x / 80, y / 20) * 4) * 0.5 + 0.5;
      const n = fbm(x / 100, y / 20);
      const r = 110 + grain * 50 + n * 30;
      const g = 70 + grain * 30 + n * 20;
      const b = 35 + grain * 15;
      const i = (y * size + x) * 4;
      img.data[i] = r; img.data[i + 1] = g; img.data[i + 2] = b; img.data[i + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  const rough = makeCanvas(size);
  const rimg = rough.ctx.createImageData(size, size);
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const v = 100 + Math.abs(Math.sin(x * 0.1)) * 80;
      const i = (y * size + x) * 4;
      rimg.data[i] = rimg.data[i + 1] = rimg.data[i + 2] = v;
      rimg.data[i + 3] = 255;
    }
  }
  rough.ctx.putImageData(rimg, 0, 0);
  return { map: toTex(c, 2), rough: toDataTex(rough.c, 2) };
}

function genMetal(size = 256) {
  const { c, ctx } = makeCanvas(size);
  const img = ctx.createImageData(size, size);
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const n = fbm(x / 20, y / 20);
      const v = 90 + n * 80;
      const i = (y * size + x) * 4;
      img.data[i] = v; img.data[i + 1] = v * 1.02; img.data[i + 2] = v * 1.05; img.data[i + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  ctx.strokeStyle = 'rgba(0,0,0,.2)';
  for (let i = 0; i < 12; i++) {
    ctx.beginPath();
    ctx.moveTo(0, i * 22 + 5);
    ctx.lineTo(size, i * 22);
    ctx.stroke();
  }
  const rough = makeCanvas(size);
  rough.ctx.fillStyle = '#444';
  rough.ctx.fillRect(0, 0, size, size);
  return { map: toTex(c, 2), rough: toDataTex(rough.c, 2) };
}

function genCamo(size = 256) {
  const { c, ctx } = makeCanvas(size);
  ctx.fillStyle = '#3f5a3a';
  ctx.fillRect(0, 0, size, size);
  const colors = ['#2d4a2c', '#5a6b3a', '#1f3320', '#6b7340'];
  for (let i = 0; i < 80; i++) {
    ctx.fillStyle = colors[i % colors.length];
    ctx.beginPath();
    ctx.ellipse(Math.random() * size, Math.random() * size, 10 + Math.random() * 30, 8 + Math.random() * 20, Math.random(), 0, Math.PI * 2);
    ctx.fill();
  }
  return { map: toTex(c, 1), rough: null };
}

const TEX = {
  concrete: genConcrete(),
  brick: genBrick(),
  wood: genWood(),
  metal: genMetal(),
  camo: genCamo()
};

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(2, devicePixelRatio || 1));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
wrap.insertBefore(renderer.domElement, wrap.firstChild);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ea0c2);
scene.fog = new THREE.Fog(0x7ea0c2, 32, 80);

const camera = new THREE.PerspectiveCamera(75, 1, 0.08, 120);
const clock = new THREE.Clock();
const raycaster = new THREE.Raycaster();
const tmpV = new THREE.Vector3();
const tmpV2 = new THREE.Vector3();

let mode = 'menu';
let yaw = 0, pitch = 0;
let player = null;
let bots = [];
let solids = [];
let bullets = [];
let muzzleFlash = null;
let keys = Object.create(null);
let pointerLocked = false;
let touchMove = { x: 0, y: 0 };
let lookTouch = null;
let fireHeld = false;
let shootCd = 0;
let hitFlashT = 0;
let footT = 0;
let gunMesh = null;

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function resize() {
  const r = wrap.getBoundingClientRect();
  const w = Math.max(320, r.width | 0);
  const h = Math.max(240, r.height | 0);
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

function pbr(texPack, opts = {}) {
  return new THREE.MeshStandardMaterial({
    map: texPack.map,
    roughnessMap: texPack.rough || undefined,
    roughness: opts.roughness ?? 0.9,
    metalness: opts.metalness ?? 0.05,
    color: opts.color ?? 0xffffff,
    flatShading: false
  });
}

function addBox(x, y, z, sx, sy, sz, material, collidable = true) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), material);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  // UV scale by size for better tiling feel
  const uv = mesh.geometry.attributes.uv;
  for (let i = 0; i < uv.count; i++) {
    // leave default; repeat handled by texture.repeat
  }
  scene.add(mesh);
  if (collidable) {
    solids.push({
      min: new THREE.Vector3(x - sx / 2, y - sy / 2, z - sz / 2),
      max: new THREE.Vector3(x + sx / 2, y + sy / 2, z + sz / 2),
      mesh
    });
  }
  return mesh;
}

function makeBotMesh() {
  const g = new THREE.Group();
  const bodyMat = pbr(TEX.camo, { roughness: 0.85 });
  bodyMat.emissive = new THREE.Color(0x000000);
  bodyMat.emissiveIntensity = 0;
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.32, 0.85, 4, 8), bodyMat);
  body.position.y = 1.05;
  body.castShadow = true;
  g.add(body);
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.22, 10, 10),
    new THREE.MeshStandardMaterial({ color: 0xd4a574, roughness: 0.7 })
  );
  head.position.y = 1.85;
  head.castShadow = true;
  g.add(head);
  const helm = new THREE.Mesh(
    new THREE.SphereGeometry(0.24, 10, 8, 0, Math.PI * 2, 0, Math.PI * 0.55),
    pbr(TEX.metal, { metalness: 0.45, roughness: 0.5 })
  );
  helm.position.y = 1.92;
  g.add(helm);
  // simple gun block (no limbs)
  const gun = new THREE.Mesh(
    new THREE.BoxGeometry(0.1, 0.1, 0.55),
    pbr(TEX.metal, { metalness: 0.6, roughness: 0.35 })
  );
  gun.position.set(0.28, 1.2, 0.32);
  g.add(gun);
  // team marker
  const band = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.12, 0.12),
    new THREE.MeshStandardMaterial({ color: 0xb91c1c, roughness: 0.6 })
  );
  band.position.set(0, 1.35, 0.28);
  g.add(band);
  g.userData.body = body;
  return g;
}

function buildViewmodel() {
  while (camera.children.length) camera.remove(camera.children[0]);
  gunMesh = new THREE.Group();
  const skin = new THREE.MeshStandardMaterial({ color: 0xe0b090, roughness: 0.6 });
  const sleeve = new THREE.MeshStandardMaterial({ color: 0x1d4ed8, roughness: 0.75 });
  const metal = pbr(TEX.metal, { metalness: 0.7, roughness: 0.35 });

  // right arm
  const rArm = new THREE.Group();
  rArm.position.set(0.18, -0.28, -0.25);
  rArm.rotation.set(0.35, 0.15, -0.2);
  const rUpper = new THREE.Mesh(new THREE.CapsuleGeometry(0.045, 0.18, 3, 6), sleeve);
  rUpper.rotation.x = 1.1;
  rUpper.position.set(0, 0, -0.1);
  rArm.add(rUpper);
  const rHand = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.08, 0.1), skin);
  rHand.position.set(0.02, -0.02, -0.32);
  rArm.add(rHand);
  gunMesh.add(rArm);

  // left arm supporting
  const lArm = new THREE.Group();
  lArm.position.set(-0.05, -0.32, -0.35);
  lArm.rotation.set(0.5, -0.4, 0.3);
  const lUpper = new THREE.Mesh(new THREE.CapsuleGeometry(0.04, 0.16, 3, 6), sleeve);
  lUpper.rotation.x = 0.9;
  lArm.add(lUpper);
  const lHand = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.07, 0.09), skin);
  lHand.position.set(0.05, 0.02, -0.22);
  lArm.add(lHand);
  gunMesh.add(lArm);

  const body = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.1, 0.5), metal);
  body.position.set(0.12, -0.2, -0.5);
  gunMesh.add(body);
  const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.018, 0.38, 8), metal);
  barrel.rotation.x = Math.PI / 2;
  barrel.position.set(0.12, -0.18, -0.82);
  gunMesh.add(barrel);
  const grip = new THREE.Mesh(new THREE.BoxGeometry(0.055, 0.13, 0.07), pbr(TEX.wood, { roughness: 0.85 }));
  grip.position.set(0.12, -0.3, -0.42);
  gunMesh.add(grip);

  gunMesh.userData.rArm = rArm;
  gunMesh.userData.lArm = lArm;
  camera.add(gunMesh);
  scene.add(camera);
}

function buildMap() {
  while (scene.children.length) scene.remove(scene.children[0]);
  solids = [];

  const hemi = new THREE.HemisphereLight(0xc8d9ff, 0x4a4030, 0.55);
  scene.add(hemi);
  const sun = new THREE.DirectionalLight(0xffe6c0, 1.35);
  sun.position.set(22, 30, 12);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 2;
  sun.shadow.camera.far = 90;
  sun.shadow.camera.left = -40;
  sun.shadow.camera.right = 40;
  sun.shadow.camera.top = 40;
  sun.shadow.camera.bottom = -40;
  sun.shadow.bias = -0.0003;
  scene.add(sun);
  const fill = new THREE.PointLight(0x88aaff, 0.35, 50);
  fill.position.set(-10, 8, 8);
  scene.add(fill);

  const floor = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), pbr(TEX.concrete, { roughness: 0.95 }));
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  const wallMat = pbr(TEX.brick, { roughness: 0.92 });
  addBox(0, 2, -30, 60, 4, 1.2, wallMat);
  addBox(0, 2, 30, 60, 4, 1.2, wallMat);
  addBox(-30, 2, 0, 1.2, 4, 60, wallMat);
  addBox(30, 2, 0, 1.2, 4, 60, wallMat);

  const wood = pbr(TEX.wood, { roughness: 0.8 });
  const metal = pbr(TEX.metal, { metalness: 0.55, roughness: 0.4 });
  const conc = pbr(TEX.concrete, { roughness: 0.9 });

  const crates = [
    [0, 1, 0, 3, 2, 3, wood],
    [-8, 1.2, -6, 4, 2.4, 1.2, metal],
    [8, 1.2, 6, 4, 2.4, 1.2, metal],
    [-12, 1.5, 10, 2, 3, 6, conc],
    [12, 1.5, -10, 2, 3, 6, conc],
    [-4, 1, 14, 6, 2, 2, wood],
    [4, 1, -14, 6, 2, 2, wood],
    [-18, 1, -2, 3, 2, 3, metal],
    [18, 1, 2, 3, 2, 3, metal],
    [0, 1.5, 20, 8, 3, 1.5, wallMat],
    [0, 1.5, -20, 8, 3, 1.5, wallMat]
  ];
  crates.forEach(c => addBox(...c));
  addBox(-20, 0.6, 18, 5, 1.2, 5, conc);
  addBox(20, 0.6, -18, 5, 1.2, 5, conc);

  muzzleFlash = new THREE.PointLight(0xffcc66, 0, 10);
  scene.add(muzzleFlash);
  buildViewmodel();
}

function resolveCircle(pos, radius) {
  // circle (XZ) vs AABB — stable, no axis-flip jitter
  const pad = 0.02;
  for (let iter = 0; iter < 3; iter++) {
    for (const s of solids) {
      // only collide with solids that occupy standing height
      if (s.max.y < 0.35 || s.min.y > 1.7) continue;
      const minX = s.min.x - pad, maxX = s.max.x + pad;
      const minZ = s.min.z - pad, maxZ = s.max.z + pad;
      const cx = clamp(pos.x, minX, maxX);
      const cz = clamp(pos.z, minZ, maxZ);
      let dx = pos.x - cx;
      let dz = pos.z - cz;

      if (dx === 0 && dz === 0) {
        // center inside box: push out via nearest face
        const left = pos.x - minX;
        const right = maxX - pos.x;
        const near = pos.z - minZ;
        const far = maxZ - pos.z;
        const m = Math.min(left, right, near, far);
        if (m === left) pos.x = minX - radius;
        else if (m === right) pos.x = maxX + radius;
        else if (m === near) pos.z = minZ - radius;
        else pos.z = maxZ + radius;
        continue;
      }

      const dist = Math.hypot(dx, dz);
      if (dist > 0 && dist < radius) {
        const push = (radius - dist) / dist;
        pos.x += dx * push;
        pos.z += dz * push;
      }
    }
  }
  pos.x = clamp(pos.x, -28.4, 28.4);
  pos.z = clamp(pos.z, -28.4, 28.4);
}

function spawnBot(x, z) {
  const mesh = makeBotMesh();
  mesh.position.set(x, 0, z);
  scene.add(mesh);
  bots.push({
    mesh, hp: 60, maxHp: 60, speed: 3.2 + Math.random() * 0.8,
    shootCd: 0.6 + Math.random(), aimErr: 0.04 + Math.random() * 0.05,
    alive: true, hitFlash: 0
  });
}

function clearBots() {
  bots.forEach(b => scene.remove(b.mesh));
  bots = [];
}

function updateHud() {
  if (!player) return;
  statsEl.hp.textContent = String(Math.max(0, player.hp | 0));
  statsEl.bar.style.width = (100 * player.hp / player.maxHp) + '%';
  statsEl.kills.textContent = String(player.kills);
  statsEl.wave.textContent = String(player.wave);
  statsEl.best.textContent = String(best);
}

function showHit() {
  hitFlashT = 0.18;
  statsEl.hit.style.opacity = '1';
  sfx('hit');
}

function playerHurt(dmg) {
  if (!player || mode !== 'play') return;
  player.hp -= dmg;
  sfx('hurt');
  statsEl.flash.style.opacity = '1';
  setTimeout(() => { statsEl.flash.style.opacity = '0'; }, 80);
  updateHud();
  if (player.hp <= 0) {
    player.hp = 0;
    endGame(false);
  }
}

function endGame(win) {
  mode = 'over';
  document.exitPointerLock?.();
  const score = player.kills * 100 + player.wave * 50;
  best = Math.max(best, score);
  try { localStorage.setItem(SAVE, JSON.stringify({ best })); } catch (e) {}
  document.getElementById('panelOver').classList.remove('hidden');
  document.getElementById('overTitle').textContent = win ? '清场胜利' : '你倒下了';
  document.getElementById('overText').textContent = `得分 ${score} · 击杀 ${player.kills} · 波次 ${player.wave} · 最高 ${best}`;
  sfx(win ? 'win' : 'ko');
  updateHud();
}

function spawnWave() {
  const n = 3 + player.wave;
  const spots = [[-22, -22], [22, -22], [-22, 22], [22, 22], [0, -24], [0, 24], [-24, 0], [24, 0]];
  for (let i = 0; i < n; i++) {
    const s = spots[i % spots.length];
    const j = (Math.random() - 0.5) * 3;
    spawnBot(s[0] + j, s[1] - j);
  }
}

function newGame() {
  ensureAudio();
  buildMap();
  clearBots();
  bullets = [];
  yaw = 0; pitch = 0;
  player = {
    pos: new THREE.Vector3(0, 1.6, 8),
    hp: 100, maxHp: 100,
    kills: 0, wave: 1, radius: 0.4, height: 1.7,
    invuln: 0
  };
  camera.position.copy(player.pos);
  mode = 'play';
  document.getElementById('panelMenu').classList.add('hidden');
  document.getElementById('panelOver').classList.add('hidden');
  spawnWave();
  updateHud();
  sfx('start');
  if (!('ontouchstart' in window)) renderer.domElement.requestPointerLock?.();
}

function losBlocked(from, to) {
  const dir = tmpV.copy(to).sub(from);
  const dist = dir.length();
  if (dist < 0.01) return true;
  dir.multiplyScalar(1 / dist);
  raycaster.set(from, dir);
  raycaster.far = dist;
  const hits = raycaster.intersectObjects(solids.map(s => s.mesh), false);
  return hits.length > 0 && hits[0].distance < dist - 0.2;
}

function tryShoot() {
  if (mode !== 'play' || !player || shootCd > 0) return;
  shootCd = 0.16;
  sfx('shoot');
  muzzleFlash.intensity = 3.5;
  muzzleFlash.position.copy(camera.position).add(tmpV.set(0.15, -0.1, -0.6).applyQuaternion(camera.quaternion));
  if (gunMesh) {
    gunMesh.position.z = 0.04;
    setTimeout(() => { if (gunMesh) gunMesh.position.z = 0; }, 50);
  }

  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  raycaster.far = 80;
  const botMeshes = bots.filter(b => b.alive).map(b => b.mesh);
  const hits = raycaster.intersectObjects(botMeshes, true);
  let hitBot = null;
  let hitPoint = null;
  if (hits.length) {
    let root = hits[0].object;
    while (root.parent && root.parent !== scene) root = root.parent;
    const wallHit = raycaster.intersectObjects(solids.map(s => s.mesh), false);
    if (!wallHit.length || wallHit[0].distance > hits[0].distance) {
      hitBot = bots.find(b => b.mesh === root);
      hitPoint = hits[0].point.clone();
    }
  }
  const start = camera.position.clone().add(new THREE.Vector3(0.15, -0.12, -0.3).applyQuaternion(camera.quaternion));
  const end = hitPoint || camera.position.clone().add(raycaster.ray.direction.clone().multiplyScalar(40));
  bullets.push({ a: start, b: end, t: 0.07 });

  if (hitBot && hitBot.alive) {
    hitBot.hp -= 34;
    hitBot.hitFlash = 0.15;
    hitBot.mesh.userData.body.material.emissive = new THREE.Color(0xff8866);
    hitBot.mesh.userData.body.material.emissiveIntensity = 0.85;
    showHit();
    if (hitBot.hp <= 0) {
      hitBot.alive = false;
      hitBot.mesh.visible = false;
      player.kills++;
      sfx('ko');
      updateHud();
      if (bots.every(b => !b.alive)) {
        player.wave++;
        if (player.wave > 6) endGame(true);
        else spawnWave();
        updateHud();
      }
    }
  }
}

function updatePlayer(dt) {
  let mx = 0, mz = 0;
  if (keys['w'] || keys['arrowup']) mz -= 1;
  if (keys['s'] || keys['arrowdown']) mz += 1;
  if (keys['a'] || keys['arrowleft']) mx -= 1;
  if (keys['d'] || keys['arrowright']) mx += 1;
  mx += touchMove.x;
  mz += touchMove.y;
  const len = Math.hypot(mx, mz) || 1;
  if (len > 1) { mx /= len; mz /= len; }

  const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
  const wish = right.multiplyScalar(mx).add(forward.multiplyScalar(mz));
  const moving = wish.lengthSq() > 0.01;
  const speed = 7.2;
  // separate axes to avoid corner tunneling / jitter
  player.pos.x += wish.x * speed * dt;
  resolveCircle(player.pos, player.radius);
  player.pos.z += wish.z * speed * dt;
  resolveCircle(player.pos, player.radius);
  player.pos.y = 1.6;
  if (player.invuln > 0) player.invuln -= dt;

  if (moving) {
    footT -= dt;
    if (footT <= 0) { sfx('foot'); footT = 0.34; }
  }

  camera.position.copy(player.pos);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // subtle bob + arm hold
  if (gunMesh) {
    const bob = moving ? Math.sin(performance.now() * 0.012) * 0.008 : 0;
    gunMesh.position.y = bob;
    gunMesh.rotation.x = pitch * 0.12;
    if (gunMesh.userData.rArm) {
      gunMesh.userData.rArm.rotation.x = 0.35 + pitch * 0.08;
      gunMesh.userData.lArm.rotation.x = 0.5 + pitch * 0.06;
    }
  }

  if (fireHeld) tryShoot();
}

function updateBots(dt) {
  const eye = player.pos;
  for (const b of bots) {
    if (!b.alive) continue;
    if (b.hitFlash > 0) {
      b.hitFlash -= dt;
      if (b.hitFlash <= 0 && b.mesh.userData.body) {
        b.mesh.userData.body.material.emissiveIntensity = 0;
      }
    }
    const p = b.mesh.position;
    const toPlayer = tmpV2.set(eye.x - p.x, 0, eye.z - p.z);
    const dist = toPlayer.length();
    if (dist > 0.001) toPlayer.multiplyScalar(1 / dist);
    b.mesh.rotation.y = Math.atan2(toPlayer.x, toPlayer.z);

    const head = new THREE.Vector3(p.x, 1.6, p.z);
    const canSee = dist < 32 && !losBlocked(head, eye);

    if (dist > 6 || !canSee) {
      p.x += toPlayer.x * b.speed * dt;
      resolveCircle(p, 0.38);
      p.z += toPlayer.z * b.speed * dt;
      resolveCircle(p, 0.38);
    } else if (dist < 4) {
      p.x -= toPlayer.x * b.speed * 0.5 * dt;
      resolveCircle(p, 0.38);
      p.z -= toPlayer.z * b.speed * 0.5 * dt;
      resolveCircle(p, 0.38);
    }

    b.shootCd -= dt;
    if (canSee && b.shootCd <= 0 && dist < 28) {
      b.shootCd = 0.55 + Math.random() * 0.45;
      sfx('enemyShoot');
      const aim = eye.clone().add(new THREE.Vector3(
        (Math.random() - 0.5) * b.aimErr * dist * 8,
        (Math.random() - 0.5) * 0.3,
        (Math.random() - 0.5) * b.aimErr * dist * 8
      ));
      if (!losBlocked(head, aim)) {
        const acc = clamp(1.15 - dist / 35, 0.25, 0.9);
        if (Math.random() < acc && player.invuln <= 0) {
          playerHurt(9 + Math.random() * 6);
          player.invuln = 0.12;
        }
      }
      bullets.push({ a: head.clone().add(toPlayer.clone().multiplyScalar(0.4)), b: aim, t: 0.06, enemy: true });
    }
  }
}

function updateBullets(dt) {
  bullets.forEach(b => { b.t -= dt; });
  bullets = bullets.filter(b => b.t > 0);
}

function drawTracers() {
  if (!drawTracers.group) {
    drawTracers.group = new THREE.Group();
    scene.add(drawTracers.group);
  }
  while (drawTracers.group.children.length) {
    const c = drawTracers.group.children[0];
    drawTracers.group.remove(c);
    c.geometry.dispose();
    c.material.dispose();
  }
  // re-parent after map rebuild
  if (drawTracers.group.parent !== scene) scene.add(drawTracers.group);
  for (const b of bullets) {
    const geo = new THREE.BufferGeometry().setFromPoints([b.a, b.b]);
    const line = new THREE.Line(geo, new THREE.LineBasicMaterial({
      color: b.enemy ? 0xf97316 : 0xfef08a,
      transparent: true,
      opacity: clamp(b.t * 12, 0, 1)
    }));
    drawTracers.group.add(line);
  }
}

function tick() {
  const dt = Math.min(0.033, clock.getDelta());
  if (muzzleFlash) muzzleFlash.intensity = Math.max(0, muzzleFlash.intensity - dt * 22);
  if (hitFlashT > 0) {
    hitFlashT -= dt;
    if (hitFlashT <= 0) statsEl.hit.style.opacity = '0';
  }
  if (shootCd > 0) shootCd -= dt;

  if (mode === 'play' && player) {
    updatePlayer(dt);
    updateBots(dt);
    updateBullets(dt);
    drawTracers();
  }

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

renderer.domElement.addEventListener('click', () => {
  ensureAudio();
  if (mode === 'play' && !('ontouchstart' in window)) {
    renderer.domElement.requestPointerLock?.();
    tryShoot();
  }
});
document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === renderer.domElement;
});
document.addEventListener('mousemove', (e) => {
  if (mode !== 'play' || !pointerLocked) return;
  yaw -= e.movementX * 0.0022;
  pitch = clamp(pitch - e.movementY * 0.0022, -1.4, 1.4);
});
window.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
  if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
window.addEventListener('mousedown', (e) => {
  if (e.button === 0 && mode === 'play') { ensureAudio(); fireHeld = true; }
});
window.addEventListener('mouseup', (e) => {
  if (e.button === 0) fireHeld = false;
});

(function touch() {
  const pad = document.getElementById('pad');
  const stick = document.getElementById('stick');
  const lookZone = document.getElementById('lookZone');
  function setStick(cx, cy) {
    const r = pad.getBoundingClientRect();
    let x = cx - (r.left + r.width / 2);
    let y = cy - (r.top + r.height / 2);
    const m = Math.hypot(x, y) || 1;
    const mag = clamp(m / 40, 0, 1);
    x /= m; y /= m;
    touchMove = { x: x * mag, y: y * mag };
    stick.style.left = (36 + x * mag * 28) + 'px';
    stick.style.top = (36 + y * mag * 28) + 'px';
  }
  function endStick() {
    touchMove = { x: 0, y: 0 };
    stick.style.left = '36px';
    stick.style.top = '36px';
  }
  pad.addEventListener('touchstart', e => { e.preventDefault(); ensureAudio(); setStick(e.changedTouches[0].clientX, e.changedTouches[0].clientY); }, { passive: false });
  pad.addEventListener('touchmove', e => { e.preventDefault(); setStick(e.changedTouches[0].clientX, e.changedTouches[0].clientY); }, { passive: false });
  pad.addEventListener('touchend', e => { e.preventDefault(); endStick(); }, { passive: false });
  lookZone.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    lookTouch = { id: t.identifier, x: t.clientX, y: t.clientY };
  }, { passive: false });
  lookZone.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!lookTouch || mode !== 'play') return;
    for (const t of e.changedTouches) {
      if (t.identifier !== lookTouch.id) continue;
      yaw -= (t.clientX - lookTouch.x) * 0.005;
      pitch = clamp(pitch - (t.clientY - lookTouch.y) * 0.004, -1.4, 1.4);
      lookTouch.x = t.clientX; lookTouch.y = t.clientY;
    }
  }, { passive: false });
  lookZone.addEventListener('touchend', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (lookTouch && t.identifier === lookTouch.id) lookTouch = null;
    }
  }, { passive: false });
  const fire = document.getElementById('btnFire');
  fire.addEventListener('touchstart', e => { e.preventDefault(); ensureAudio(); fireHeld = true; tryShoot(); }, { passive: false });
  fire.addEventListener('touchend', e => { e.preventDefault(); fireHeld = false; }, { passive: false });
})();

document.getElementById('btnStart').onclick = () => newGame();
document.getElementById('btnRetry').onclick = () => newGame();
document.getElementById('btnMenu').onclick = () => {
  mode = 'menu';
  document.getElementById('panelOver').classList.add('hidden');
  document.getElementById('panelMenu').classList.remove('hidden');
};

buildMap();
camera.position.set(0, 1.6, 10);
camera.lookAt(0, 1.2, 0);
tick();
</script>
