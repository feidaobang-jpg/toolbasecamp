<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>冲锋行动 3D · Blitz Run</title>
<!-- three@0.170.0 — Contra-like side-scrolling 3D, original theme -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
  }
}
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#020617;color:#e2e8f0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden;touch-action:none;user-select:none}
#wrap{position:relative;width:100%;height:100%;max-width:1100px;margin:0 auto;background:#000}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;left:0;right:0;top:0;padding:10px 12px;pointer-events:none;text-shadow:0 1px 3px #000;font-size:13px;z-index:2;display:flex;gap:12px;flex-wrap:wrap}
#hud b{color:#fde68a}
#hpWrap{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:min(260px,70%);height:10px;background:#1e293b;border:1px solid #475569;border-radius:6px;overflow:hidden;pointer-events:none;z-index:2}
#hpBar{display:block;height:100%;width:100%;background:linear-gradient(90deg,#ef4444,#fbbf24)}
#touch{display:none;position:absolute;inset:0;pointer-events:none;z-index:3}
#touch .pad{pointer-events:auto;position:absolute;left:12px;bottom:16px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2)}
#touch .stick{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.3);left:33px;top:33px}
#touch .btn{pointer-events:auto;position:absolute;width:64px;height:64px;border-radius:50%;background:rgba(37,99,235,.55);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center}
#touch .fire{right:16px;bottom:24px}
#touch .jump{right:88px;bottom:24px}
@media(pointer:coarse){#touch{display:block}#hpWrap{bottom:100px}}
#ui{position:absolute;inset:0;pointer-events:none;z-index:4}
#ui .panel{pointer-events:auto;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(92%,420px);background:rgba(10,14,28,.94);border:1px solid #334155;border-radius:16px;padding:20px 18px}
#ui h1{font-size:1.4rem;color:#38bdf8;margin-bottom:8px}
#ui p{font-size:.86rem;line-height:1.5;color:#94a3b8;margin-bottom:8px}
#ui .row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
#ui button{font:inherit;flex:1;min-width:110px;border:0;border-radius:999px;padding:11px 16px;background:#2563eb;color:#fff;cursor:pointer}
#ui button.ghost{background:#1e293b;border:1px solid #475569}
.hidden{display:none!important}
#credit{position:absolute;left:10px;bottom:8px;font-size:10px;color:rgba(148,163,184,.55);pointer-events:none;z-index:2}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span>HP <b id="hp">100</b></span>
    <span>得分 <b id="score">0</b></span>
    <span>里程 <b id="dist">0</b></span>
    <span>最高 <b id="best">0</b></span>
  </div>
  <div id="hpWrap"><i id="hpBar"></i></div>
  <div id="touch">
    <div class="pad" id="pad"><div class="stick" id="stick"></div></div>
    <div class="btn jump" id="btnJump">跳</div>
    <div class="btn fire" id="btnFire">射</div>
  </div>
  <div id="ui">
    <div class="panel" id="panelMenu">
      <h1>冲锋行动 3D</h1>
      <p>魂斗罗风格横版射击（自创主题）。Three.js 侧视 3D，程序化几何体，无外部贴图。</p>
      <p>键鼠：A/D 或 ←→ 移动 · W/空格 跳跃 · J 射击<br/>触屏：摇杆 + 跳 + 射。场景自动向右推进。</p>
      <div class="row"><button id="btnStart">开战</button></div>
    </div>
    <div class="panel hidden" id="panelOver">
      <h1 id="overTitle">任务结束</h1>
      <p id="overText"></p>
      <div class="row">
        <button id="btnRetry">再战</button>
        <button class="ghost" id="btnMenu">标题</button>
      </div>
    </div>
  </div>
  <div id="credit">Three.js 0.170 · 侧视横版 · 适配触屏</div>
</div>
<script type="module">
import * as THREE from 'three';

const SAVE = 'tbc_blitz_run_3d_v1';
const wrap = document.getElementById('wrap');
const el = {
  hp: document.getElementById('hp'),
  score: document.getElementById('score'),
  dist: document.getElementById('dist'),
  best: document.getElementById('best'),
  bar: document.getElementById('hpBar')
};

let best = 0;
try { best = (JSON.parse(localStorage.getItem(SAVE) || '{}').best) | 0; } catch (e) {}
el.best.textContent = String(best);

let audioCtx = null;
function ensureAudio() {
  if (audioCtx) return audioCtx;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return null;
  audioCtx = new AC();
  return audioCtx;
}
function tone(freq, dur, type, vol, slide) {
  const ac = ensureAudio(); if (!ac) return;
  if (ac.state === 'suspended') ac.resume();
  const t0 = ac.currentTime;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t0);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, slide), t0 + dur);
  g.gain.setValueAtTime(vol || 0.05, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function sfx(n) {
  if (n === 'shoot') tone(420, 0.05, 'square', 0.04, 120);
  else if (n === 'jump') tone(260, 0.08, 'sine', 0.04, 420);
  else if (n === 'hit') tone(100, 0.08, 'sawtooth', 0.05);
  else if (n === 'hurt') tone(80, 0.15, 'sawtooth', 0.06, 40);
  else if (n === 'die') tone(60, 0.35, 'sawtooth', 0.07, 30);
  else if (n === 'start') tone(300, 0.12, 'sine', 0.05, 600);
  else if (n === 'power') tone(500, 0.1, 'triangle', 0.05, 900);
}

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(2, devicePixelRatio || 1));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
wrap.insertBefore(renderer.domElement, wrap.firstChild);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2744);
scene.fog = new THREE.Fog(0x1a2744, 25, 70);

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 120);
const clock = new THREE.Clock();

let mode = 'menu';
let keys = Object.create(null);
let touchMove = { x: 0, y: 0 };
let fireHeld = false, jumpQueued = false;
let player = null;
let bullets = [];
let eBullets = [];
let enemies = [];
let platforms = [];
let props = [];
let spawnT = 0;
let scrollX = 0;
let shootCd = 0;
let invuln = 0;
let groundY = 0;

function resize() {
  const r = wrap.getBoundingClientRect();
  const w = Math.max(320, r.width | 0);
  const h = Math.max(480, r.height | 0);
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  // 竖屏略抬高 FOV，保证看清跑道
  camera.fov = h > w * 1.2 ? 58 : 50;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

function mat(color, opts = {}) {
  return new THREE.MeshStandardMaterial({
    color, roughness: opts.roughness ?? 0.75, metalness: opts.metalness ?? 0.1
  });
}

function makeHero() {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.28, 0.55, 4, 8), mat(0x2563eb));
  body.position.y = 0.85;
  body.castShadow = true;
  g.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 10), mat(0xf5c6a0, { roughness: 0.6 }));
  head.position.y = 1.45;
  head.castShadow = true;
  g.add(head);
  const gun = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.1, 0.1), mat(0x334155, { metalness: 0.5 }));
  gun.position.set(0.35, 0.95, 0.15);
  g.add(gun);
  g.userData.body = body;
  return g;
}

function makeEnemy(kind) {
  const g = new THREE.Group();
  const color = kind === 'flyer' ? 0xb91c1c : 0x7f1d1d;
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.26, 0.45, 4, 8), mat(color));
  body.position.y = kind === 'flyer' ? 0.4 : 0.75;
  body.castShadow = true;
  g.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8), mat(0x9ca3af));
  head.position.y = kind === 'flyer' ? 0.85 : 1.25;
  g.add(head);
  if (kind === 'flyer') {
    const wing = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.08, 0.35), mat(0xf87171));
    wing.position.y = 0.5;
    g.add(wing);
  }
  g.userData.body = body;
  g.userData.kind = kind;
  return g;
}

function clearGroup(arr, removeMesh) {
  arr.forEach(o => {
    if (removeMesh && o.mesh) scene.remove(o.mesh);
    else if (o.parent) scene.remove(o);
  });
}

function buildWorld() {
  while (scene.children.length) scene.remove(scene.children[0]);
  platforms = [];
  props = [];

  scene.add(new THREE.HemisphereLight(0xbdd4ff, 0x3a3020, 0.7));
  const sun = new THREE.DirectionalLight(0xffe6c0, 1.1);
  sun.position.set(8, 18, 10);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  scene.add(sun);

  // infinite-ish ground strip (regenerated by scrolling chunks)
  for (let i = -2; i < 12; i++) addGroundChunk(i * 12);
  // backdrop hills
  for (let i = 0; i < 8; i++) {
    const hill = new THREE.Mesh(
      new THREE.ConeGeometry(4 + Math.random() * 3, 5 + Math.random() * 4, 5),
      mat(0x1e3a5f, { roughness: 1 })
    );
    hill.position.set(i * 14 - 10, 1.5, -12);
    scene.add(hill);
    props.push(hill);
  }
}

function addGroundChunk(x0) {
  const ground = new THREE.Mesh(
    new THREE.BoxGeometry(12, 1, 8),
    mat(0x3f6212, { roughness: 0.95 })
  );
  ground.position.set(x0 + 6, -0.5, 0);
  ground.receiveShadow = true;
  scene.add(ground);
  platforms.push({ mesh: ground, minX: x0, maxX: x0 + 12, y: 0, kind: 'ground' });

  // occasional platform
  if (Math.random() > 0.45) {
    const w = 2.5 + Math.random() * 2;
    const px = x0 + 2 + Math.random() * 6;
    const py = 1.2 + Math.random() * 1.8;
    const plat = new THREE.Mesh(new THREE.BoxGeometry(w, 0.35, 3.5), mat(0x78716c));
    plat.position.set(px, py, 0);
    plat.castShadow = true;
    plat.receiveShadow = true;
    scene.add(plat);
    platforms.push({ mesh: plat, minX: px - w / 2, maxX: px + w / 2, y: py + 0.175, kind: 'plat' });
  }
  // crate decor
  if (Math.random() > 0.5) {
    const crate = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), mat(0x92400e));
    crate.position.set(x0 + 3 + Math.random() * 6, 0.4, -1.5 + Math.random());
    crate.castShadow = true;
    scene.add(crate);
    props.push(crate);
  }
}

function newGame() {
  ensureAudio();
  buildWorld();
  bullets = [];
  eBullets = [];
  enemies = [];
  scrollX = 0;
  spawnT = 1.5;
  shootCd = 0;
  invuln = 0;
  groundY = 0;

  const mesh = makeHero();
  mesh.position.set(0, 0, 0);
  scene.add(mesh);
  player = {
    mesh,
    x: 2, y: 0, z: 0,
    vx: 0, vy: 0,
    onGround: true,
    hp: 100, maxHp: 100,
    score: 0, facing: 1,
    rapid: 0
  };
  mode = 'play';
  document.getElementById('panelMenu').classList.add('hidden');
  document.getElementById('panelOver').classList.add('hidden');
  sfx('start');
  updateHud();
}

function endGame() {
  mode = 'over';
  const score = player.score + Math.floor(scrollX);
  best = Math.max(best, score);
  try { localStorage.setItem(SAVE, JSON.stringify({ best })); } catch (e) {}
  document.getElementById('panelOver').classList.remove('hidden');
  document.getElementById('overTitle').textContent = '任务失败';
  document.getElementById('overText').textContent = `得分 ${score} · 里程 ${Math.floor(scrollX)} · 最高 ${best}`;
  sfx('die');
  updateHud();
}

function updateHud() {
  if (!player) return;
  el.hp.textContent = String(Math.max(0, player.hp | 0));
  el.bar.style.width = (100 * player.hp / player.maxHp) + '%';
  el.score.textContent = String(player.score | 0);
  el.dist.textContent = String(Math.floor(scrollX));
  el.best.textContent = String(best);
}

function spawnEnemy() {
  const kind = Math.random() > 0.72 ? 'flyer' : 'grunt';
  const mesh = makeEnemy(kind);
  const x = scrollX + 18 + Math.random() * 6;
  const y = kind === 'flyer' ? 1.8 + Math.random() * 1.5 : 0;
  mesh.position.set(x, y, 0);
  scene.add(mesh);
  enemies.push({
    mesh, kind, x, y, z: 0,
    hp: kind === 'flyer' ? 40 : 55,
    shootCd: 0.8 + Math.random(),
    bob: Math.random() * 10
  });
}

function tryShoot() {
  if (!player || shootCd > 0) return;
  shootCd = player.rapid > 0 ? 0.1 : 0.18;
  sfx('shoot');
  const b = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 6, 6),
    new THREE.MeshBasicMaterial({ color: 0xfde68a })
  );
  const ox = player.x + player.facing * 0.6;
  const oy = player.y + 1.0;
  b.position.set(ox, oy, 0);
  scene.add(b);
  bullets.push({ mesh: b, x: ox, y: oy, vx: player.facing * 28, life: 1.2 });
}

function hurt(dmg) {
  if (invuln > 0 || mode !== 'play') return;
  player.hp -= dmg;
  invuln = 0.7;
  sfx('hurt');
  player.mesh.userData.body.material.emissive = new THREE.Color(0xff0000);
  player.mesh.userData.body.material.emissiveIntensity = 0.6;
  updateHud();
  if (player.hp <= 0) {
    player.hp = 0;
    endGame();
  }
}

function solidAt(x, y, feetOnly) {
  // return ground height under x if standing
  let best = -99;
  for (const p of platforms) {
    if (x < p.minX - 0.2 || x > p.maxX + 0.2) continue;
    const top = p.y;
    if (feetOnly) {
      if (y >= top - 0.15 && y <= top + 0.35) best = Math.max(best, top);
    } else if (y >= top - 0.05) best = Math.max(best, top);
  }
  return best > -90 ? best : null;
}

function update(dt) {
  if (mode !== 'play' || !player) return;

  // auto scroll
  const scrollSpeed = 3.2 + Math.min(4, scrollX / 80);
  scrollX += scrollSpeed * dt;

  // recycle ground chunks ahead
  const maxX = platforms.reduce((m, p) => Math.max(m, p.maxX), 0);
  if (maxX < scrollX + 40) addGroundChunk(maxX);

  // remove far behind
  platforms = platforms.filter(p => {
    if (p.maxX < scrollX - 20) {
      scene.remove(p.mesh);
      return false;
    }
    return true;
  });

  let mx = 0;
  if (keys['a'] || keys['arrowleft']) mx -= 1;
  if (keys['d'] || keys['arrowright']) mx += 1;
  mx += touchMove.x;
  mx = clamp(mx, -1, 1);

  const speed = 7;
  // player world x relative to scroll: keep on screen band
  player.x += mx * speed * dt;
  const minX = scrollX - 1;
  const maxX = scrollX + 8;
  player.x = clamp(player.x, minX, maxX);
  if (mx) player.facing = mx > 0 ? 1 : -1;

  // jump
  if ((keys['w'] || keys[' '] || jumpQueued) && player.onGround) {
    player.vy = 9.5;
    player.onGround = false;
    sfx('jump');
  }
  jumpQueued = false;
  keys[' '] = false;

  player.vy -= 28 * dt;
  player.y += player.vy * dt;

  const ground = solidAt(player.x, player.y, true);
  if (player.vy <= 0 && ground != null) {
    player.y = ground;
    player.vy = 0;
    player.onGround = true;
  } else if (player.y < -2) {
    hurt(100);
  } else {
    player.onGround = false;
  }

  player.mesh.position.set(player.x, player.y, 0);
  player.mesh.scale.x = player.facing;

  if (invuln > 0) {
    invuln -= dt;
    player.mesh.visible = Math.floor(invuln * 12) % 2 === 0;
    if (invuln <= 0) {
      player.mesh.visible = true;
      player.mesh.userData.body.material.emissiveIntensity = 0;
    }
  }

  if (shootCd > 0) shootCd -= dt;
  if (player.rapid > 0) player.rapid -= dt;
  if (fireHeld || keys['j']) tryShoot();

  // camera: side view, follow scroll + player
  const camX = scrollX + 4;
  const camY = 3.2 + player.y * 0.15;
  camera.position.set(camX, camY, 14);
  camera.lookAt(camX, 1.5 + player.y * 0.1, 0);

  // spawn enemies
  spawnT -= dt;
  if (spawnT <= 0) {
    spawnEnemy();
    spawnT = Math.max(0.7, 2.2 - scrollX / 120);
  }

  // enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.bob += dt * 5;
    if (e.kind === 'flyer') {
      e.y = 2.2 + Math.sin(e.bob) * 0.6;
      e.x -= 2.5 * dt;
    } else {
      e.x -= 3.2 * dt;
      const g = solidAt(e.x, e.y, true);
      e.y = g != null ? g : 0;
    }
    e.mesh.position.set(e.x, e.y, 0);
    e.mesh.scale.x = e.x > player.x ? -1 : 1;

    e.shootCd -= dt;
    if (e.shootCd <= 0 && Math.abs(e.x - player.x) < 16) {
      e.shootCd = 1.4 + Math.random();
      const eb = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 6, 6),
        new THREE.MeshBasicMaterial({ color: 0xf97316 })
      );
      const dir = Math.sign(player.x - e.x) || -1;
      eb.position.set(e.x, e.y + 1, 0);
      scene.add(eb);
      eBullets.push({ mesh: eb, x: e.x, y: e.y + 1, vx: dir * 10, life: 2.5 });
    }

    // touch damage
    if (Math.hypot(e.x - player.x, e.y - player.y) < 0.9) hurt(12);

    if (e.x < scrollX - 8 || e.hp <= 0) {
      if (e.hp <= 0) {
        player.score += e.kind === 'flyer' ? 150 : 100;
        sfx('hit');
        updateHud();
      }
      scene.remove(e.mesh);
      enemies.splice(i, 1);
    }
  }

  // player bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.life -= dt;
    b.mesh.position.set(b.x, b.y, 0);
    let dead = b.life <= 0;
    for (const e of enemies) {
      if (Math.hypot(b.x - e.x, b.y - (e.y + 0.8)) < 0.7) {
        e.hp -= 20;
        dead = true;
        break;
      }
    }
    // power crate hit? skip
    if (dead) {
      scene.remove(b.mesh);
      bullets.splice(i, 1);
    }
  }

  // enemy bullets
  for (let i = eBullets.length - 1; i >= 0; i--) {
    const b = eBullets[i];
    b.x += b.vx * dt;
    b.life -= dt;
    b.mesh.position.set(b.x, b.y, 0);
    if (Math.hypot(b.x - player.x, b.y - (player.y + 1)) < 0.55) {
      hurt(10);
      scene.remove(b.mesh);
      eBullets.splice(i, 1);
      continue;
    }
    if (b.life <= 0 || b.x < scrollX - 10) {
      scene.remove(b.mesh);
      eBullets.splice(i, 1);
    }
  }

  // occasional power-up feeling: every 500 score grant rapid
  if (player.score > 0 && player.score % 500 < 20 && player.rapid <= 0 && Math.random() < 0.02) {
    player.rapid = 6;
    sfx('power');
  }

  player.score += dt * 2;
  updateHud();
}

function tick() {
  const dt = Math.min(0.033, clock.getDelta());
  update(dt);
  // menu idle camera
  if (mode === 'menu') {
    if (scene.children.length < 3) buildWorld();
    camera.position.set(6, 4, 16);
    camera.lookAt(4, 1.5, 0);
  }
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.code === 'Space') { e.preventDefault(); keys[' '] = true; }
  if (mode === 'play' && (e.key === 'j' || e.key === 'J')) { ensureAudio(); fireHeld = true; tryShoot(); }
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  if (e.key === 'j' || e.key === 'J') fireHeld = false;
});

(function touch() {
  const pad = document.getElementById('pad');
  const stick = document.getElementById('stick');
  function setStick(cx, cy) {
    const r = pad.getBoundingClientRect();
    let x = cx - (r.left + r.width / 2);
    let y = cy - (r.top + r.height / 2);
    const m = Math.hypot(x, y) || 1;
    const mag = clamp(m / 40, 0, 1);
    x /= m; y /= m;
    touchMove = { x: x * mag, y: y * mag };
    stick.style.left = (33 + x * mag * 26) + 'px';
    stick.style.top = (33 + y * mag * 26) + 'px';
  }
  function endStick() {
    touchMove = { x: 0, y: 0 };
    stick.style.left = '33px';
    stick.style.top = '33px';
  }
  pad.addEventListener('touchstart', e => { e.preventDefault(); ensureAudio(); setStick(e.changedTouches[0].clientX, e.changedTouches[0].clientY); }, { passive: false });
  pad.addEventListener('touchmove', e => { e.preventDefault(); setStick(e.changedTouches[0].clientX, e.changedTouches[0].clientY); }, { passive: false });
  pad.addEventListener('touchend', e => { e.preventDefault(); endStick(); }, { passive: false });
  document.getElementById('btnJump').addEventListener('touchstart', e => { e.preventDefault(); ensureAudio(); jumpQueued = true; }, { passive: false });
  document.getElementById('btnFire').addEventListener('touchstart', e => { e.preventDefault(); ensureAudio(); fireHeld = true; tryShoot(); }, { passive: false });
  document.getElementById('btnFire').addEventListener('touchend', e => { e.preventDefault(); fireHeld = false; }, { passive: false });
})();

document.getElementById('btnStart').onclick = () => newGame();
document.getElementById('btnRetry').onclick = () => newGame();
document.getElementById('btnMenu').onclick = () => {
  mode = 'menu';
  document.getElementById('panelOver').classList.add('hidden');
  document.getElementById('panelMenu').classList.remove('hidden');
};

buildWorld();
tick();
</script>
</body>
