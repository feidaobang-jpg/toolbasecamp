<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>冲锋行动 · Blitz Run</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;width:100%;
  height:100dvh;width:100dvw;
  background:#020617;color:#e2e8f0;
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  overflow:hidden;touch-action:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
/* 固定逻辑分辨率 960×540，整体 scale 适配窗口（窗口/全屏比例一致） */
#wrap{
  position:fixed;left:50%;top:50%;
  width:960px;height:540px;
  max-width:none;margin:0;
  transform:translate(-50%,-50%);
  transform-origin:center center;
  background:#000;overflow:hidden;
}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated}
#playTools{
  display:block;position:fixed;right:max(8px,env(safe-area-inset-right));
  top:max(8px,env(safe-area-inset-top));z-index:20;
}
#playTools button{
  font:inherit;font-size:11px;border:0;border-radius:999px;padding:8px 12px;
  background:rgba(37,99,235,.88);color:#fff;cursor:pointer;
  box-shadow:0 2px 10px rgba(0,0,0,.35);white-space:nowrap;
}
#hud{position:absolute;left:0;right:0;top:0;padding:8px 12px;pointer-events:none;text-shadow:0 1px 3px #000;font-size:13px;z-index:2;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
#hud b{color:#fde68a}
#hud .gun{padding:2px 8px;border-radius:999px;background:rgba(37,99,235,.45);border:1px solid #60a5fa;color:#93c5fd;font-weight:700}
/* 横版布局：血条在上方，不挡地面 */
#hpWrap{position:absolute;left:50%;top:36px;bottom:auto;transform:translateX(-50%);width:min(220px,40%);height:10px;background:#1e293b;border:1px solid #475569;border-radius:6px;overflow:hidden;pointer-events:none;z-index:2}
#hpBar{display:block;height:100%;width:100%;background:linear-gradient(90deg,#ef4444,#fbbf24)}
#orientTip{display:none;position:absolute;left:50%;top:52px;transform:translateX(-50%);z-index:5;max-width:min(92%,340px);padding:10px 14px;border-radius:12px;background:rgba(15,23,42,.92);border:1px solid #38bdf8;color:#e2e8f0;font-size:13px;line-height:1.45;text-align:center;pointer-events:auto;box-shadow:0 8px 24px rgba(0,0,0,.35)}
#orientTip b{color:#7dd3fc}
#orientTip .row{display:flex;gap:8px;margin-top:10px;justify-content:center}
#orientTip button{font:inherit;border:0;border-radius:999px;padding:8px 14px;background:#1e293b;border:1px solid #475569;color:#fff;cursor:pointer}
#touch{display:none;position:absolute;inset:0;pointer-events:none;z-index:3}
#touch .pad{pointer-events:auto;position:absolute;left:12px;bottom:12px;width:108px;height:108px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2)}
#touch .stick{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.3);left:32px;top:32px}
#touch .btn{pointer-events:auto;position:absolute;width:58px;height:58px;border-radius:50%;background:rgba(37,99,235,.55);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center}
#touch .fire{right:78px;bottom:12px}
#touch .jump{right:12px;bottom:12px}
@media(pointer:coarse){
  #touch{display:block}
  #credit{display:none}
}
@media(pointer:coarse) and (orientation:landscape){
  #orientTip{display:none!important}
}
#ui{position:absolute;inset:0;pointer-events:none;z-index:4}
#ui .panel{pointer-events:auto;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(88%,340px);background:rgba(10,14,28,.94);border:1px solid #334155;border-radius:14px;padding:14px 16px;overflow:visible}
#ui h1{font-size:1.2rem;color:#38bdf8;margin-bottom:6px}
#ui p{font-size:.8rem;line-height:1.4;color:#94a3b8;margin-bottom:6px}
#ui .row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
#ui button{font:inherit;flex:1;min-width:100px;border:0;border-radius:999px;padding:12px 16px;background:#2563eb;color:#fff;cursor:pointer}
#ui button.ghost{background:#1e293b;border:1px solid #475569}
.hidden{display:none!important}
#credit{position:absolute;left:10px;bottom:8px;font-size:10px;color:rgba(148,163,184,.55);pointer-events:none;z-index:2}
</style>
</head>
<body>
<div id="playTools">
  <button type="button" id="btnFs" title="全屏">全屏</button>
</div>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <span>HP <b id="hp">100</b></span>
    <span>武器 <span class="gun" id="gun">—</span></span>
    <span>得分 <b id="score">0</b></span>
    <span>里程 <b id="dist">0</b></span>
    <span>最高 <b id="best">0</b></span>
  </div>
  <div id="hpWrap"><i id="hpBar"></i></div>
  <div id="orientTip" class="hidden">
    <div>建议 <b>横屏</b> 游玩</div>
    <div class="row"><button type="button" id="btnOrientHide">知道了</button></div>
  </div>
  <div id="touch">
    <div class="pad" id="pad"><div class="stick" id="stick"></div></div>
    <div class="btn fire" id="btnFire">射</div>
    <div class="btn jump" id="btnJump">跳</div>
  </div>
  <div id="ui">
    <div class="panel" id="panelMenu">
      <h1>冲锋行动</h1>
      <p>道具 M L S R B · 坦克/Boss</p>
      <p>WASD 移动 · J 射 · K 跳</p>
      <div class="row"><button id="btnStart">开战</button></div>
    </div>
    <div class="panel hidden" id="panelOver">
      <h1 id="overTitle">任务结束</h1>
      <p id="overText"></p>
      <div class="row">
        <button id="btnRetry">再战</button>
        <button class="ghost" id="btnMenu">标题</button>
      </div>
    </div>
  </div>
  <div id="credit">16:9 · J射 K跳 · M/L/S/R/B</div>
</div>
<script>
(function () {
'use strict';
const SAVE = 'tbc_blitz_run_v3';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');
const el = {
  hp: document.getElementById('hp'),
  score: document.getElementById('score'),
  dist: document.getElementById('dist'),
  best: document.getElementById('best'),
  bar: document.getElementById('hpBar'),
  gun: document.getElementById('gun')
};

const GUN_NAME = { normal: '—', M: 'M机枪', L: 'L激光', S: 'S散弹', R: 'R速射', B: 'B护盾' };

const BASE_W = 960, BASE_H = 540; // 固定逻辑分辨率，窗口只整体缩放
let SW = BASE_W, SH = BASE_H, W = BASE_W, H = BASE_H, DPR = 1, zoom = 1, GROUND = 0;
let stageScale = 1;
let isPortrait = false, orientDismissed = false, orientSnooze = false;
let mode = 'menu', lastT = 0, best = 0;
let keys = Object.create(null);
let touchMove = { x: 0, y: 0 };
let fireHeld = false, jumpQueued = false;
let audioCtx = null;
let player = null;
let bullets = [], eBullets = [], enemies = [], plats = [], particles = [], pickups = [], waters = [];
let scrollX = 0, spawnT = 0, shootCd = 0, invuln = 0, nextChunk = 0;
let bossAlive = false, nextBossAt = 1800, floats = [];

try {
  const saved = JSON.parse(localStorage.getItem(SAVE) || '{}');
  best = (saved.best) | 0;
  orientDismissed = !!saved.orientHide;
} catch (e) {}
el.best.textContent = String(best);

function saveMeta() {
  try { localStorage.setItem(SAVE, JSON.stringify({ best, orientHide: orientDismissed })); } catch (e) {}
}

function isFs() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}

/** 粗指针/触屏设备（仅用于竖屏提示，与全屏无关） */
function isMobileEnv() {
  if (window.matchMedia('(pointer: coarse)').matches) return true;
  if ((navigator.maxTouchPoints || 0) > 1 && window.matchMedia('(hover: none)').matches) return true;
  const ua = navigator.userAgent || '';
  return /Android|iPhone|iPad|iPod|Mobile/i.test(ua);
}

function updateFsBtn() {
  const bf = document.getElementById('btnFs');
  if (bf) bf.textContent = isFs() ? '退出全屏' : '全屏';
}

function updateOrientUI() {
  const tip = document.getElementById('orientTip');
  const show = isMobileEnv() && isPortrait && !orientDismissed && !orientSnooze;
  tip.classList.toggle('hidden', !show);
  tip.style.display = show ? 'block' : 'none';
  updateFsBtn();
}

/** 仅由「全屏」按钮调用 */
async function enterFs() {
  if (isFs()) return true;
  const root = document.documentElement;
  try {
    if (root.requestFullscreen) await root.requestFullscreen();
    else if (root.webkitRequestFullscreen) root.webkitRequestFullscreen();
  } catch (e) { return false; }
  try {
    if (screen.orientation && screen.orientation.lock) {
      await screen.orientation.lock('landscape');
    }
  } catch (e) {}
  return isFs();
}

async function toggleFs() {
  try {
    if (isFs()) {
      if (document.exitFullscreen) await document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    } else {
      await enterFs();
    }
  } catch (e) {}
  setTimeout(resize, 60);
}

function startGame() {
  ensureAudio();
  orientSnooze = true;
  updateOrientUI();
  newGame();
}

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function rand(a, b) { return a + Math.random()*(b - a); }
function pick(a) { return a[(Math.random()*a.length)|0]; }

function ensureAudio() {
  if (audioCtx) return audioCtx;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return null;
  audioCtx = new AC();
  return audioCtx;
}
function tone(freq, dur, type, vol, slide) {
  const ac = ensureAudio(); if (!ac) return;
  if (ac.state === 'suspended') ac.resume();
  const t0 = ac.currentTime;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t0);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, slide), t0 + dur);
  g.gain.setValueAtTime(vol || 0.05, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function sfx(n) {
  if (n === 'shoot') tone(420, 0.04, 'square', 0.035, 140);
  else if (n === 'laser') tone(880, 0.08, 'sawtooth', 0.04, 200);
  else if (n === 'jump') tone(260, 0.08, 'sine', 0.04, 420);
  else if (n === 'hit') tone(100, 0.07, 'sawtooth', 0.05);
  else if (n === 'hurt') tone(80, 0.14, 'sawtooth', 0.055, 40);
  else if (n === 'die') tone(60, 0.35, 'sawtooth', 0.07, 30);
  else if (n === 'start') tone(300, 0.12, 'sine', 0.05, 600);
  else if (n === 'power') tone(520, 0.12, 'triangle', 0.055, 980);
  else if (n === 'boss') { tone(80, 0.25, 'sawtooth', 0.07, 40); tone(200, 0.2, 'square', 0.04, 80); }
}

function resize() {
  // 逻辑分辨率固定；视口只做等比例缩放（窗口小=整画面缩小，人物相对大小与全屏一致）
  const vw = Math.max(320, window.innerWidth | 0);
  const vh = Math.max(240, window.innerHeight | 0);
  stageScale = Math.min(vw / BASE_W, vh / BASE_H);
  wrap.style.width = BASE_W + 'px';
  wrap.style.height = BASE_H + 'px';
  wrap.style.transform = 'translate(-50%,-50%) scale(' + stageScale + ')';

  DPR = Math.min(2, devicePixelRatio || 1);
  SW = BASE_W;
  SH = BASE_H;
  W = BASE_W;
  H = BASE_H;
  zoom = 1;
  canvas.width = (BASE_W * DPR) | 0;
  canvas.height = (BASE_H * DPR) | 0;
  GROUND = H * 0.78;
  isPortrait = window.innerHeight > window.innerWidth * 1.05;
  updateOrientUI();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 120));
document.addEventListener('fullscreenchange', () => setTimeout(resize, 60));
document.addEventListener('webkitfullscreenchange', () => setTimeout(resize, 60));

/** 八向量化：输入向量 → 单位轴对齐/斜向 */
function quantize8(x, y) {
  const dead = 0.28;
  let ax = Math.abs(x) < dead ? 0 : (x > 0 ? 1 : -1);
  let ay = Math.abs(y) < dead ? 0 : (y > 0 ? 1 : -1);
  if (ax === 0 && ay === 0) return { x: 0, y: 0 };
  const len = Math.hypot(ax, ay) || 1;
  return { x: ax / len, y: ay / len, ax, ay };
}

function addChunk(x0) {
  const w = 360;
  const roll = Math.random();
  plats.push({ x: x0, y: GROUND, w: w, h: H - GROUND + 40, kind: 'ground' });
  if (roll > 0.45) {
    const pw = 80 + Math.random() * 70;
    plats.push({
      x: x0 + 50 + Math.random() * 120,
      y: GROUND - (75 + Math.random() * 70),
      w: pw, h: 12, kind: 'steel'
    });
  }
  if (roll > 0.72) {
    plats.push({
      x: x0 + 160 + Math.random() * 80,
      y: GROUND - (50 + Math.random() * 40),
      w: 70, h: 12, kind: 'steel'
    });
  }
  if (Math.random() > 0.55) {
    pickups.push({
      x: x0 + 80 + Math.random() * 200,
      y: GROUND - 100 - Math.random() * 60,
      type: pick(['M', 'L', 'S', 'R', 'B']),
      bob: Math.random() * 10,
      vx: -20
    });
  }
}

function rebuildWorld() {
  plats = []; waters = []; pickups = [];
  nextChunk = 0;
  for (let i = -1; i < 5; i++) {
    addChunk(i * 360);
    nextChunk = (i + 1) * 360;
  }
}

function newGame() {
  ensureAudio();
  bullets = []; eBullets = []; enemies = []; particles = []; floats = [];
  scrollX = 0; spawnT = 1.0; shootCd = 0; invuln = 0;
  bossAlive = false; nextBossAt = 1600;
  rebuildWorld();
  player = {
    x: 140, y: GROUND, vx: 0, vy: 0,
    w: 28, h: 44, onGround: true,
    facing: 1, aimX: 1, aimY: 0,
    crouch: false,
    hp: 100, maxHp: 100, score: 0,
    gun: 'normal', barrier: 0, rapid: 0
  };
  mode = 'play';
  document.getElementById('panelMenu').classList.add('hidden');
  document.getElementById('panelOver').classList.add('hidden');
  sfx('start');
  updateHud();
}

function endGame(win) {
  mode = 'over';
  const score = (player.score | 0) + Math.floor(player.x / 8);
  best = Math.max(best, score);
  saveMeta();
  document.getElementById('panelOver').classList.remove('hidden');
  document.getElementById('overTitle').textContent = win ? '关卡突破' : '任务失败';
  document.getElementById('overText').textContent = `得分 ${score} · 里程 ${Math.floor(player.x)} · 最高 ${best}`;
  sfx(win ? 'power' : 'die');
  updateHud();
}

function updateHud() {
  if (!player) return;
  el.hp.textContent = String(Math.max(0, player.hp | 0));
  el.bar.style.width = (100 * player.hp / player.maxHp) + '%';
  el.score.textContent = String(player.score | 0);
  el.dist.textContent = String(Math.floor(player.x));
  el.best.textContent = String(best);
  el.gun.textContent = GUN_NAME[player.gun] || '—';
  if (player.barrier > 0) el.gun.textContent += '+B';
}

function burst(x, y, c, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y, vx: rand(-140, 140), vy: rand(-200, -20),
      life: rand(0.2, 0.5), c, r: rand(2, 4)
    });
  }
}

function solidTop(x, yFeet, prevY) {
  let best = null;
  for (const p of plats) {
    if (p.kind === 'water') continue;
    if (x < p.x - 2 || x > p.x + p.w + 2) continue;
    const top = p.y;
    if (prevY <= top + 3 && yFeet >= top - 2 && yFeet <= top + 20) {
      if (best == null || top < best) best = top;
    }
  }
  return best;
}

function inWater(x, y) {
  return false;
}

function fireRate() {
  let base = player.gun === 'M' ? 0.09 : player.gun === 'S' ? 0.22 : player.gun === 'L' ? 0.2 : 0.16;
  if (player.gun === 'R' || player.rapid > 0) base *= 0.55;
  return base;
}

function tryShoot() {
  if (!player || shootCd > 0) return;
  shootCd = fireRate();
  const ax = player.aimX, ay = player.aimY;
  const ox = player.x + ax * 18;
  const oy = player.y - (player.crouch ? 18 : 28) + ay * 16;
  const spd = player.gun === 'L' ? 780 : 560;

  function addBullet(dx, dy, extra) {
    const len = Math.hypot(dx, dy) || 1;
    bullets.push(Object.assign({
      x: ox, y: oy,
      vx: (dx / len) * spd,
      vy: (dy / len) * spd,
      life: player.gun === 'L' ? 0.55 : 0.85,
      gun: player.gun,
      pierce: player.gun === 'L' ? 4 : 0,
      dmg: player.gun === 'L' ? 28 : player.gun === 'S' ? 14 : 20,
      r: player.gun === 'L' ? 3 : 4
    }, extra || {}));
  }

  if (player.gun === 'S') {
    // 散弹：主方向 + 两侧
    const ang = Math.atan2(ay, ax);
    [-0.35, 0, 0.35].forEach(d => {
      addBullet(Math.cos(ang + d), Math.sin(ang + d));
    });
    sfx('shoot');
  } else if (player.gun === 'L') {
    addBullet(ax, ay, { laser: true });
    sfx('laser');
  } else {
    addBullet(ax, ay);
    sfx('shoot');
  }
}

function hurt(dmg) {
  if (!player || invuln > 0 || mode !== 'play') return;
  if (player.barrier > 0) {
    player.barrier = Math.max(0, player.barrier - dmg * 0.02);
    invuln = 0.25;
    burst(player.x, player.y - 20, '#38bdf8', 6);
    return;
  }
  player.hp -= dmg;
  invuln = 0.8;
  sfx('hurt');
  burst(player.x, player.y - 20, '#f87171', 8);
  updateHud();
  if (player.hp <= 0) {
    player.hp = 0;
    endGame(false);
  }
}

function applyPickup(type) {
  sfx('power');
  if (type === 'B') {
    player.barrier = 6;
    floats.push({ x: player.x, y: player.y - 50, t: 0, text: 'B 护盾!', c: '#38bdf8' });
  } else if (type === 'R') {
    player.gun = 'R';
    player.rapid = 12;
    floats.push({ x: player.x, y: player.y - 50, t: 0, text: 'R 速射!', c: '#fbbf24' });
  } else {
    player.gun = type;
    floats.push({ x: player.x, y: player.y - 50, t: 0, text: GUN_NAME[type], c: '#a3e635' });
  }
  updateHud();
}

function spawnEnemy() {
  if (bossAlive) return;
  const roll = Math.random();
  let kind = 'grunt';
  if (roll > 0.78) kind = 'tank';
  else if (roll > 0.55) kind = 'flyer';
  const x = player.x + W * 0.8 + rand(30, 140);
  enemies.push({
    kind, x,
    y: kind === 'flyer' ? GROUND - 130 - Math.random() * 50 : GROUND,
    w: kind === 'tank' ? 54 : 30,
    h: kind === 'tank' ? 36 : kind === 'flyer' ? 28 : 42,
    hp: kind === 'tank' ? 160 : kind === 'flyer' ? 40 : 55,
    maxHp: 0,
    shootCd: 0.5 + Math.random(),
    bob: Math.random() * 10
  });
  enemies[enemies.length - 1].maxHp = enemies[enemies.length - 1].hp;
}

function spawnBoss() {
  bossAlive = true;
  sfx('boss');
  floats.push({ x: player.x + W * 0.4, y: H * 0.25, t: 0, text: 'BOSS 出现!', c: '#fb7185' });
  enemies.push({
    kind: 'boss',
    x: player.x + W * 0.55,
    y: GROUND,
    w: 90, h: 80,
    hp: 700, maxHp: 700,
    shootCd: 0.4,
    bob: 0,
    phase: 0
  });
}

function update(dt) {
  if (mode !== 'play' || !player) return;

  // 镜头跟随
  const camTarget = player.x - W * 0.32;
  if (camTarget > scrollX) scrollX = camTarget;
  else if (player.x < scrollX + W * 0.18) scrollX = Math.max(0, player.x - W * 0.18);
  scrollX = Math.max(0, scrollX);

  while (nextChunk < player.x + W + 560) {
    addChunk(nextChunk);
    nextChunk += 360;
  }
  plats = plats.filter(p => p.x + p.w > scrollX - 140);

  // —— 八向输入（移动与瞄准用轴值，避免 || 把 -0 等搞乱）——
  let ix = 0, iy = 0;
  if (keys['a'] || keys['arrowleft']) ix -= 1;
  if (keys['d'] || keys['arrowright']) ix += 1;
  if (keys['w'] || keys['arrowup']) iy -= 1;
  if (keys['s'] || keys['arrowdown']) iy += 1;
  ix += touchMove.x;
  iy += touchMove.y;
  const q = quantize8(ix, iy);

  // 蹲：仅纯下；边蹲边射时保持蹲（本帧仍按住下且无左右）
  player.crouch = player.onGround && q.ay > 0 && q.ax === 0;

  if ((keys['k'] || jumpQueued) && player.onGround && !player.crouch) {
    player.vy = -530;
    player.onGround = false;
    sfx('jump');
  }
  jumpQueued = false;

  const speed = player.crouch ? 90 : 230;
  if (q.ax) {
    player.x += q.ax * speed * dt;
    player.facing = q.ax;
  }
  player.x = Math.max(48, player.x);

  // 有方向才改瞄准；松手保持上次瞄准，避免边移边射时方向被重置/翻转
  if (q.ax !== 0 || q.ay !== 0) {
    if (player.crouch) {
      player.aimX = player.facing;
      player.aimY = 0;
    } else if (q.ax === 0) {
      player.aimX = 0;
      player.aimY = q.ay;
    } else {
      player.aimX = q.ax;
      player.aimY = q.ay;
    }
  }

  const prevY = player.y;
  player.vy += 1650 * dt;
  player.y += player.vy * dt;
  const land = solidTop(player.x, player.y, prevY);
  if (player.vy >= 0 && land != null) {
    player.y = land;
    player.vy = 0;
    player.onGround = true;
  } else player.onGround = false;

  if (player.y > H + 50) hurt(100);

  if (invuln > 0) invuln -= dt;
  if (shootCd > 0) shootCd -= dt;
  if (player.rapid > 0) player.rapid -= dt;
  if (player.barrier > 0) player.barrier -= dt;
  if (fireHeld || keys['j']) tryShoot();

  // Boss 里程
  if (!bossAlive && player.x > nextBossAt) {
    spawnBoss();
    nextBossAt += 2200;
  }

  spawnT -= dt;
  if (spawnT <= 0) {
    spawnEnemy();
    spawnT = Math.max(0.65, 1.7 - player.x / 6000);
  }

  // pickups
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.bob += dt * 4;
    p.x += (p.vx || 0) * dt;
    p.y += Math.sin(p.bob) * 12 * dt;
    if (Math.hypot(p.x - player.x, p.y - (player.y - 24)) < 28) {
      applyPickup(p.type);
      pickups.splice(i, 1);
      continue;
    }
    if (p.x < scrollX - 80) pickups.splice(i, 1);
  }

  // bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    let dead = b.life <= 0 || b.x < scrollX - 40 || b.x > scrollX + W + 80 || b.y < -40 || b.y > H + 40;
    for (let ei = 0; ei < enemies.length; ei++) {
      const e = enemies[ei];
      const ey = e.y - e.h * 0.45;
      if (Math.abs(b.x - e.x) < e.w * 0.5 && Math.abs(b.y - ey) < e.h * 0.5) {
        e.hp -= b.dmg;
        burst(b.x, b.y, b.laser ? '#f472b6' : '#fde68a', 4);
        if (b.pierce > 0) { b.pierce--; b.dmg *= 0.85; }
        else { dead = true; break; }
      }
    }
    if (dead) bullets.splice(i, 1);
  }

  // enemies AI
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.bob += dt * 5;
    if (e.kind === 'flyer') {
      e.x -= 55 * dt;
      e.y = GROUND - 120 + Math.sin(e.bob) * 30;
    } else if (e.kind === 'tank') {
      const dir = Math.sign(player.x - e.x) || -1;
      e.x += dir * 35 * dt;
      const g = solidTop(e.x, e.y, e.y - 2);
      e.y = g != null ? g : GROUND;
    } else if (e.kind === 'boss') {
      e.phase += dt;
      e.x = player.x + W * 0.42 + Math.sin(e.phase * 0.6) * 40;
      const g = solidTop(e.x, e.y, e.y - 2);
      e.y = g != null ? g : GROUND;
    } else {
      const dir = Math.sign(player.x - e.x) || -1;
      e.x += dir * 50 * dt;
      const g = solidTop(e.x, e.y, e.y - 2);
      e.y = g != null ? g : GROUND;
    }

    e.shootCd -= dt;
    if (e.shootCd <= 0 && Math.abs(e.x - player.x) < W * 0.8) {
      if (e.kind === 'boss') {
        e.shootCd = 0.35;
        for (let k = -2; k <= 2; k++) {
          const ang = Math.atan2(player.y - 30 - e.y, player.x - e.x) + k * 0.18;
          eBullets.push({
            x: e.x - 20, y: e.y - 50,
            vx: Math.cos(ang) * 260, vy: Math.sin(ang) * 260, life: 2.5, r: 5
          });
        }
      } else if (e.kind === 'tank') {
        e.shootCd = 1.1;
        const dir = Math.sign(player.x - e.x) || -1;
        eBullets.push({ x: e.x + dir * 20, y: e.y - 28, vx: dir * 300, vy: -40, life: 2.2, r: 6 });
      } else {
        e.shootCd = 1.4 + Math.random() * 0.5;
        const dir = Math.sign(player.x - e.x) || -1;
        eBullets.push({ x: e.x, y: e.y - e.h * 0.55, vx: dir * 270, vy: 0, life: 2.2, r: 4 });
      }
    }

    const hitR = e.kind === 'boss' ? 50 : e.kind === 'tank' ? 32 : 24;
    if (Math.hypot(e.x - player.x, (e.y - e.h * 0.4) - (player.y - 22)) < hitR) {
      hurt(e.kind === 'boss' ? 22 : e.kind === 'tank' ? 16 : 12);
    }

    if (e.hp <= 0) {
      const pts = e.kind === 'boss' ? 2000 : e.kind === 'tank' ? 300 : e.kind === 'flyer' ? 150 : 100;
      player.score += pts;
      burst(e.x, e.y - 20, '#f87171', e.kind === 'boss' ? 40 : 14);
      sfx('hit');
      if (e.kind === 'boss') {
        bossAlive = false;
        // 掉一堆道具
        ['M', 'L', 'S', 'R', 'B'].forEach((t, idx) => {
          pickups.push({ x: e.x - 40 + idx * 20, y: e.y - 80, type: t, bob: idx, vx: 0 });
        });
        floats.push({ x: e.x, y: e.y - 100, t: 0, text: 'BOSS 击破!', c: '#fbbf24' });
      }
      enemies.splice(i, 1);
      updateHud();
      continue;
    }
    if (e.x < scrollX - 100 || e.x > player.x + W + 300) {
      if (e.kind === 'boss') continue;
      enemies.splice(i, 1);
    }
  }

  for (let i = eBullets.length - 1; i >= 0; i--) {
    const b = eBullets[i];
    b.x += b.vx * dt;
    b.y += (b.vy || 0) * dt;
    b.life -= dt;
    if (Math.hypot(b.x - player.x, b.y - (player.y - 24)) < 16) {
      hurt(10);
      eBullets.splice(i, 1);
      continue;
    }
    if (b.life <= 0 || b.x < scrollX - 40) eBullets.splice(i, 1);
  }

  player.score += dt * 2;
  particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 520 * dt; p.life -= dt; });
  particles = particles.filter(p => p.life > 0);
  floats.forEach(f => { f.t += dt; f.y -= 25 * dt; });
  floats = floats.filter(f => f.t < 1.6);
  updateHud();
}

function wx(x) { return x - scrollX; }

function drawHero() {
  const x = wx(player.x), y = player.y;
  const blink = invuln > 0 && ((invuln * 14) | 0) % 2 === 0;
  if (blink) return;
  ctx.save();
  ctx.translate(x, y);
  // 面向瞄准水平分量
  const face = player.facing;
  ctx.scale(face || 1, 1);
  const crouch = player.crouch;
  ctx.fillStyle = '#1e3a8a';
  if (crouch) {
    ctx.fillRect(-12, -16, 24, 16);
  } else {
    ctx.fillRect(-8, -18, 7, 18);
    ctx.fillRect(2, -18, 7, 18);
    ctx.fillStyle = '#2563eb';
    ctx.fillRect(-11, -40, 22, 24);
  }
  ctx.fillStyle = '#f5c6a0';
  ctx.beginPath(); ctx.arc(0, crouch ? -22 : -50, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ef4444';
  ctx.fillRect(-9, crouch ? -28 : -56, 18, 4);
  // 枪管：本地坐标按瞄准（已按 facing 翻转）
  const ang = Math.atan2(player.aimY, player.aimX * face);
  ctx.save();
  ctx.translate(6, crouch ? -18 : -32);
  ctx.rotate(ang);
  ctx.fillStyle = '#334155';
  ctx.fillRect(0, -3, player.gun === 'L' ? 28 : 22, 6);
  if (player.gun === 'S') {
    ctx.fillStyle = '#65a30d';
    ctx.fillRect(16, -5, 8, 10);
  }
  ctx.restore();
  if (player.barrier > 0) {
    ctx.strokeStyle = 'rgba(56,189,248,' + (0.4 + Math.sin(performance.now() / 80) * 0.3) + ')';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, crouch ? -16 : -28, 28, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.restore();
}

function drawEnemy(e) {
  const x = wx(e.x), y = e.y;
  ctx.save();
  ctx.translate(x, y);
  if (e.kind === 'flyer') {
    ctx.fillStyle = '#f87171';
    ctx.fillRect(-18, -22, 36, 10);
    ctx.fillStyle = '#b91c1c';
    ctx.fillRect(-10, -28, 20, 22);
  } else if (e.kind === 'tank') {
    ctx.fillStyle = '#57534e';
    ctx.fillRect(-28, -28, 56, 28);
    ctx.fillStyle = '#78716c';
    ctx.fillRect(-18, -40, 30, 14);
    ctx.fillStyle = '#a8a29e';
    ctx.fillRect(8, -36, 26, 8);
    ctx.fillStyle = '#1c1917';
    ctx.beginPath(); ctx.arc(-16, -2, 8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(16, -2, 8, 0, Math.PI * 2); ctx.fill();
  } else if (e.kind === 'boss') {
    ctx.fillStyle = '#7f1d1d';
    ctx.fillRect(-45, -70, 90, 70);
    ctx.fillStyle = '#450a0a';
    ctx.fillRect(-50, -30, 20, 30);
    ctx.fillRect(30, -30, 20, 30);
    ctx.fillStyle = '#ef4444';
    ctx.beginPath(); ctx.arc(-15, -50, 8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(15, -50, 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fbbf24';
    ctx.font = 'bold 14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('BOSS', 0, -78);
    ctx.textAlign = 'left';
  } else {
    ctx.fillStyle = '#7f1d1d';
    ctx.fillRect(-10, -36, 20, 24);
    ctx.fillStyle = '#9ca3af';
    ctx.beginPath(); ctx.arc(0, -44, 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#450a0a';
    ctx.fillRect(-8, -14, 6, 14); ctx.fillRect(2, -14, 6, 14);
  }
  const maxHp = e.maxHp || e.hp;
  ctx.fillStyle = 'rgba(0,0,0,.45)';
  ctx.fillRect(-e.w * 0.4, -e.h - 10, e.w * 0.8, 4);
  ctx.fillStyle = '#ef4444';
  ctx.fillRect(-e.w * 0.4, -e.h - 10, e.w * 0.8 * clamp(e.hp / maxHp, 0, 1), 4);
  ctx.restore();
}

function draw() {
  // 固定逻辑分辨率绘制，外层 CSS scale 适配窗口
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = '#020617';
  ctx.fillRect(0, 0, SW, SH);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0c1929');
  g.addColorStop(0.5, '#1e3a5f');
  g.addColorStop(1, '#14532d');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // 远山
  ctx.fillStyle = '#172554';
  for (let i = 0; i < 8; i++) {
    const hx = ((i * 180 - scrollX * 0.2) % (W + 220) + W + 220) % (W + 220) - 110;
    ctx.beginPath();
    ctx.moveTo(hx, GROUND);
    ctx.lineTo(hx + 90, GROUND - 80 - (i % 3) * 18);
    ctx.lineTo(hx + 180, GROUND);
    ctx.fill();
  }

  // 地形
  plats.forEach(p => {
    const x = wx(p.x);
    if (x + p.w < -20 || x > W + 20) return;
    if (p.kind === 'ground') {
      ctx.fillStyle = '#3f6212';
      ctx.fillRect(x, p.y, p.w + 1, p.h);
      ctx.fillStyle = '#4d7c0f';
      ctx.fillRect(x, p.y, p.w + 1, 8);
    } else if (p.kind === 'steel') {
      ctx.fillStyle = '#64748b';
      ctx.fillRect(x, p.y, p.w, p.h);
      ctx.fillStyle = '#94a3b8';
      ctx.fillRect(x, p.y, p.w, 3);
      ctx.strokeStyle = '#334155';
      ctx.strokeRect(x + 0.5, p.y + 0.5, p.w - 1, p.h - 1);
    }
  });

  // 道具胶囊
  pickups.forEach(p => {
    const x = wx(p.x), y = p.y + Math.sin(p.bob) * 4;
    ctx.fillStyle = '#e2e8f0';
    ctx.beginPath(); ctx.ellipse(x, y, 14, 10, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#334155';
    ctx.stroke();
    const colors = { M: '#22c55e', L: '#e879f9', S: '#f97316', R: '#fbbf24', B: '#38bdf8' };
    ctx.fillStyle = colors[p.type] || '#fff';
    ctx.font = 'bold 14px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.type, x, y + 1);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  });

  if (player) drawHero();
  enemies.forEach(drawEnemy);

  bullets.forEach(b => {
    ctx.fillStyle = b.laser ? '#f472b6' : b.gun === 'S' ? '#86efac' : '#fde68a';
    if (b.laser) {
      ctx.save();
      ctx.translate(wx(b.x), b.y);
      ctx.rotate(Math.atan2(b.vy, b.vx));
      ctx.fillRect(0, -2, 26, 4);
      ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(wx(b.x), b.y, b.r || 4, 0, Math.PI * 2); ctx.fill();
    }
  });
  ctx.fillStyle = '#fb923c';
  eBullets.forEach(b => {
    ctx.beginPath(); ctx.arc(wx(b.x), b.y, b.r || 4, 0, Math.PI * 2); ctx.fill();
  });

  particles.forEach(p => {
    ctx.globalAlpha = clamp(p.life * 2, 0, 1);
    ctx.fillStyle = p.c;
    ctx.beginPath(); ctx.arc(wx(p.x), p.y, p.r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
  floats.forEach(f => {
    ctx.globalAlpha = 1 - f.t / 1.6;
    ctx.fillStyle = f.c;
    ctx.font = 'bold 18px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, wx(f.x), f.y);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  });

  if (mode === 'menu') {
    ctx.fillStyle = 'rgba(0,0,0,.28)';
    ctx.fillRect(0, 0, W, H);
  }
}

function loop(ts) {
  const dt = Math.min(0.033, (ts - lastT) / 1000 || 0.016);
  lastT = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (mode === 'play' && k === 'k') {
    e.preventDefault();
    jumpQueued = true;
  }
  if (mode === 'play' && k === 'j') {
    e.preventDefault();
    ensureAudio();
    fireHeld = true;
    tryShoot();
  }
});
window.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  keys[k] = false;
  if (k === 'j') fireHeld = false;
});

(function touch() {
  const pad = document.getElementById('pad');
  const stick = document.getElementById('stick');
  let stickId = null;

  function setStick(cx, cy) {
    const r = pad.getBoundingClientRect();
    const half = r.width * 0.5;
    const rest = (r.width - stick.offsetWidth) * 0.5;
    let x = cx - (r.left + half);
    let y = cy - (r.top + half);
    const m = Math.hypot(x, y) || 1;
    const mag = clamp(m / (half * 0.72), 0, 1);
    x /= m; y /= m;
    touchMove = { x: x * mag, y: y * mag };
    const travel = half * 0.45;
    stick.style.left = (rest + x * mag * travel) + 'px';
    stick.style.top = (rest + y * mag * travel) + 'px';
  }
  function endStick() {
    stickId = null;
    touchMove = { x: 0, y: 0 };
    const r = pad.getBoundingClientRect();
    const rest = (r.width - stick.offsetWidth) * 0.5;
    stick.style.left = rest + 'px';
    stick.style.top = rest + 'px';
  }
  function touchById(list, id) {
    for (let i = 0; i < list.length; i++) if (list[i].identifier === id) return list[i];
    return null;
  }

  pad.addEventListener('touchstart', e => {
    e.preventDefault();
    ensureAudio();
    if (stickId != null) return;
    const t = e.changedTouches[0];
    stickId = t.identifier;
    setStick(t.clientX, t.clientY);
  }, { passive: false });

  window.addEventListener('touchmove', e => {
    if (stickId == null) return;
    const t = touchById(e.touches, stickId) || touchById(e.changedTouches, stickId);
    if (!t) return;
    e.preventDefault();
    setStick(t.clientX, t.clientY);
  }, { passive: false });

  function onStickEnd(e) {
    if (stickId == null) return;
    if (touchById(e.changedTouches, stickId)) {
      e.preventDefault();
      endStick();
    }
  }
  window.addEventListener('touchend', onStickEnd, { passive: false });
  window.addEventListener('touchcancel', onStickEnd, { passive: false });

  const fire = document.getElementById('btnFire');
  const jump = document.getElementById('btnJump');
  jump.addEventListener('touchstart', e => { e.preventDefault(); ensureAudio(); jumpQueued = true; }, { passive: false });
  fire.addEventListener('touchstart', e => { e.preventDefault(); ensureAudio(); fireHeld = true; tryShoot(); }, { passive: false });
  fire.addEventListener('touchend', e => { e.preventDefault(); fireHeld = false; }, { passive: false });
  fire.addEventListener('touchcancel', e => { e.preventDefault(); fireHeld = false; }, { passive: false });
})();

document.getElementById('btnStart').onclick = () => startGame();
document.getElementById('btnRetry').onclick = () => startGame();
document.getElementById('btnMenu').onclick = () => {
  mode = 'menu';
  document.getElementById('panelOver').classList.add('hidden');
  document.getElementById('panelMenu').classList.remove('hidden');
};
document.getElementById('btnFs').onclick = (e) => {
  e.preventDefault();
  e.stopPropagation();
  ensureAudio();
  toggleFs();
};
document.getElementById('btnOrientHide').onclick = () => {
  orientDismissed = true;
  orientSnooze = true;
  saveMeta();
  updateOrientUI();
};

resize();
rebuildWorld();
requestAnimationFrame(loop);
})();
</script>
