<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Descent 100 - Tool Basecamp</title>
  <meta name="description" content="Fall through platforms as deep as you can. Classic Descent with emoji. Runs locally.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/game/games-common.css?v=1" />
  <link rel="stylesheet" href="../../css/game/descent.css?v=1" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.descent.title">Descent 100</h1>
        <p data-i18n="tools.descent.desc">Fall through platforms — go as deep as you can. Avoid spikes. Runs locally.</p>
      </div>

      <div class="tool-card game-card">
        <div class="game-toolbar">
          <div class="game-stats">
            <span><span data-i18n="tools.descent.depth">Depth</span>: <strong id="depth">0</strong></span>
            <span><span data-i18n="tools.game.score">Score</span>: <strong id="score">0</strong></span>
            <span><span data-i18n="tools.descent.best">Best</span>: <strong id="best">0</strong></span>
          </div>
          <div class="action-row">
            <button type="button" class="tb-btn" id="start-btn" data-i18n="tools.descent.start">Start</button>
            <button type="button" class="tb-btn" id="restart-btn" data-i18n="tools.game.restart">New game</button>
          </div>
        </div>
        <div class="game-status is-idle" id="status" data-i18n="tools.descent.hint">Press Start. Move with ← → or A/D, or touch left/right half of the screen.</div>
        <div class="game-board-wrap">
          <canvas id="canvas" class="descent-canvas" width="360" height="560"></canvas>
        </div>
        <p class="game-hint" data-i18n="tools.descent.legend">🟩 safe · 🟦 bounce · 🟧 vanish · 🟥 spike</p>
      </div>
    </main>
  </div>

  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/game/descent.js?v=1"></script>
</body>
</html>
