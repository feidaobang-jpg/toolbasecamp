<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>潜水捕鱼 · Dave Dive</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0b1220;color:#e2e8f0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden;touch-action:none}
#wrap{position:relative;width:100%;height:100%;max-width:480px;margin:0 auto;background:#020617}
canvas{display:block;width:100%;height:100%;cursor:crosshair}
#ui{position:absolute;inset:0;pointer-events:none}
#ui .panel{pointer-events:auto;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(92%,380px);background:rgba(15,23,42,.94);border:1px solid #334155;border-radius:14px;padding:18px 16px;box-shadow:0 12px 40px rgba(0,0,0,.45)}
#ui h1{font-size:1.35rem;margin-bottom:6px;color:#7dd3fc}
#ui h2{font-size:1.05rem;margin:0 0 10px;color:#38bdf8}
#ui p{font-size:.86rem;line-height:1.45;color:#94a3b8;margin-bottom:10px}
#ui .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
#ui button{font:inherit;border:0;border-radius:999px;padding:10px 16px;background:#2563eb;color:#fff;cursor:pointer;flex:1;min-width:110px}
#ui button.ghost{background:#1e293b;border:1px solid #475569}
#ui button:disabled{opacity:.45;cursor:not-allowed}
#ui .shop-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #1e293b;font-size:.84rem}
#ui .shop-item span{color:#cbd5e1}
#hud{position:absolute;left:0;right:0;top:0;padding:8px 10px;font-size:12px;line-height:1.4;text-shadow:0 1px 2px #000;pointer-events:none}
#hud b{color:#fef08a}
#touch{display:none;position:absolute;inset:0;pointer-events:none}
#touch .pad,#touch .btn{pointer-events:auto;position:absolute;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25)}
#touch .pad{left:16px;bottom:16px;width:110px;height:110px}
#touch .stick{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.35);left:33px;top:33px}
#touch .btn{right:18px;bottom:28px;width:72px;height:72px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
#touch .sprint{right:100px;bottom:22px;width:56px;height:56px;font-size:11px}
@media(pointer:coarse){#touch{display:block}}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud"></div>
  <div id="touch">
    <div class="pad" id="pad"><div class="stick" id="stick"></div></div>
    <div class="btn sprint" id="btnSprint">冲刺</div>
    <div class="btn" id="btnFire">鱼叉</div>
  </div>
  <div id="ui">
    <div class="panel" id="panelMenu">
      <h1>潜水捕鱼</h1>
      <p>灵感来自《潜水员戴夫》：白天下潜捕鱼，盯紧氧气，回船上卖鱼升级，再潜更深。</p>
      <p>键鼠：WASD / 方向键移动 · Shift 冲刺 · 鼠标瞄准点击或空格发射鱼叉 · Esc 回船（靠近水面时）</p>
      <div class="row">
        <button id="btnNew">新游戏</button>
        <button class="ghost" id="btnContinue" disabled>继续</button>
      </div>
    </div>
    <div class="panel hidden" id="panelBoat">
      <h2>船上 · 第 <span id="boatDay">1</span> 天</h2>
      <p id="boatSummary"></p>
      <div id="shopList"></div>
      <div class="row">
        <button id="btnSell">卖掉渔获</button>
        <button class="ghost" id="btnDive">下潜</button>
        <button class="ghost" id="btnSaveMenu">存档并回标题</button>
      </div>
    </div>
    <div class="panel hidden" id="panelRescue">
      <h2>氧气耗尽 · 紧急救援</h2>
      <p>同伴把你拖回船上。今天的渔获全部丢失。</p>
      <div class="row"><button id="btnRescueOk">回到船上</button></div>
    </div>
  </div>
</div>
<script>
(function(){
'use strict';
const SAVE_KEY='tbc_dave_dive_v1';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const hud=document.getElementById('hud');
const wrap=document.getElementById('wrap');

const SPECIES=[
  {id:'clown',name:'小丑鱼',min:0,max:180,hp:1,w:1,price:8,speed:55,r:9,color:'#f97316',glow:0},
  {id:'sardine',name:'沙丁鱼',min:20,max:260,hp:1,w:1,price:6,speed:70,r:7,color:'#94a3b8',glow:0},
  {id:'bass',name:'鲈鱼',min:80,max:380,hp:2,w:2,price:18,speed:50,r:11,color:'#65a30d',glow:0},
  {id:'tuna',name:'金枪鱼',min:220,max:620,hp:3,w:3,price:42,speed:85,r:14,color:'#0ea5e9',glow:0},
  {id:'lion',name:'狮子鱼',min:300,max:720,hp:3,w:2,price:55,speed:45,r:12,color:'#ef4444',glow:0},
  {id:'grouper',name:'石斑',min:400,max:900,hp:4,w:4,price:70,speed:40,r:16,color:'#a855f7',glow:0},
  {id:'jelly',name:'水母',min:150,max:800,hp:2,w:1,price:22,speed:25,r:13,color:'#e879f9',glow:0.35},
  {id:'angler',name:'鮟鱇鱼',min:750,max:1300,hp:5,w:4,price:160,speed:35,r:15,color:'#1e293b',glow:1},
  {id:'shark',name:'小型鲨鱼',min:900,max:1450,hp:6,w:5,price:210,speed:95,r:18,color:'#64748b',glow:0},
  {id:'oarfish',name:'皇带鱼',min:1250,max:1800,hp:8,w:6,price:520,speed:60,r:20,color:'#fbbf24',glow:0.6}
];

const UPGRADES=[
  {key:'oxy',name:'氧气瓶',desc:'最大氧气 +25',base:40,scale:1.45,apply:s=>{s.maxOxy+=25;s.oxy=Math.min(s.oxy+25,s.maxOxy)}},
  {key:'suit',name:'潜水服极限',desc:'安全深度 +120m',base:55,scale:1.5,apply:s=>{s.suitLimit+=120}},
  {key:'dmg',name:'鱼叉伤害',desc:'伤害 +1',base:50,scale:1.55,apply:s=>{s.spearDmg+=1}},
  {key:'range',name:'鱼叉射程',desc:'射程 +40',base:45,scale:1.5,apply:s=>{s.spearRange+=40}},
  {key:'net',name:'网兜负重',desc:'负重上限 +3',base:48,scale:1.48,apply:s=>{s.netMax+=3}}
];

let W=360,H=640,DPR=1;
let mode='menu'; // menu | dive | boat | rescue
let state=null;
let fish=[];
let spears=[];
let particles=[];
let floaters=[];
let camY=0;
let camX=0;
let keys={};
let mouse={x:W/2,y:H/2,down:false};
let touchMove={x:0,y:0,active:false};
let touchSprint=false;
let lastT=0;
let flashRed=0;
let msg='';
let msgT=0;
let audioCtx=null;

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function rand(a,b){return a+Math.random()*(b-a)}
function pick(arr){return arr[(Math.random()*arr.length)|0]}

function defaultState(){
  return {
    day:1,gold:0,
    oxy:100,maxOxy:100,suitLimit:280,
    spearDmg:1,spearRange:160,spearCd:0,spearCdMax:0.55,
    netMax:6,catch:[],
    px:0,py:40,vx:0,vy:0,
    facing:1,alive:true,
    shopLv:{oxy:0,suit:0,dmg:0,range:0,net:0}
  };
}

function save(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({v:1,state,mode:mode==='dive'?'boat':mode}))}catch(e){}
}
function load(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return null;
    const data=JSON.parse(raw);
    if(!data||!data.state)return null;
    return data;
  }catch(e){return null}
}

function ensureAudio(){
  if(audioCtx)return audioCtx;
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC)return null;
  audioCtx=new AC();
  return audioCtx;
}
function beep(freq,dur,type,vol,slide){
  const ac=ensureAudio();
  if(!ac)return;
  const t0=ac.currentTime;
  const o=ac.createOscillator();
  const g=ac.createGain();
  o.type=type||'sine';
  o.frequency.setValueAtTime(freq,t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(40,slide),t0+dur);
  g.gain.setValueAtTime(vol||0.06,t0);
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(g);g.connect(ac.destination);
  o.start(t0);o.stop(t0+dur+0.02);
}
function sfx(name){
  if(name==='shoot')beep(420,0.08,'square',0.05,120);
  else if(name==='hit')beep(180,0.06,'triangle',0.05);
  else if(name==='catch')beep(520,0.12,'sine',0.06,880);
  else if(name==='coin'){beep(660,0.07,'sine',0.05);setTimeout(()=>beep(880,0.09,'sine',0.05),60)}
  else if(name==='alarm')beep(240,0.15,'sawtooth',0.04,160);
  else if(name==='pop')beep(140,0.1,'triangle',0.05,60);
  else if(name==='splash')beep(200,0.2,'sine',0.04,80);
}

function showMsg(t,sec){msg=t;msgT=sec||2.2}
function netWeight(s){return s.catch.reduce((a,c)=>a+(c.w||1),0)}
function depthOf(y){return Math.max(0,y)}

function resize(){
  const r=wrap.getBoundingClientRect();
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=Math.max(280,Math.floor(r.width));
  H=Math.max(420,Math.floor(r.height));
  canvas.width=Math.floor(W*DPR);
  canvas.height=Math.floor(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize);

function spawnFishBand(){
  fish=[];
  for(let i=0;i<70;i++){
    const sp=pick(SPECIES);
    const y=rand(sp.min+10,sp.max-10);
    fish.push(makeFish(sp,rand(-220,220),y));
  }
}
function makeFish(sp,x,y){
  return {
    sp,x,y,vx:(Math.random()<0.5?-1:1)*sp.speed*(0.7+Math.random()*0.5),
    hp:sp.hp,maxHp:sp.hp,r:sp.r,phase:Math.random()*6.28,alive:true,caught:false
  };
}
function maintainFish(){
  const d=depthOf(state.py);
  const want=55;
  fish=fish.filter(f=>f.alive&&Math.abs(f.y-state.py)<900);
  let guard=0;
  while(fish.length<want&&guard++<40){
    const candidates=SPECIES.filter(s=>d+rand(-200,400)>=s.min&&d+rand(-100,500)<=s.max+200);
    const sp=pick(candidates.length?candidates:SPECIES);
    const y=clamp(state.py+rand(-500,700),sp.min,sp.max);
    fish.push(makeFish(sp,state.px+rand(-280,280),y));
  }
}

function startDive(){
  mode='dive';
  state.oxy=state.maxOxy;
  state.px=0;state.py=30;state.vx=0;state.vy=0;
  state.catch=[];
  state.spearCd=0;
  state.alive=true;
  spears=[];particles=[];floaters=[];
  spawnFishBand();
  camY=0;camX=0;
  hidePanels();
  showMsg('下潜开始 · 注意氧气',2);
  sfx('splash');
  save();
}

function goBoat(fromRescue){
  mode='boat';
  hidePanels();
  document.getElementById('panelBoat').classList.remove('hidden');
  document.getElementById('boatDay').textContent=String(state.day);
  const w=netWeight(state);
  const val=state.catch.reduce((a,c)=>a+c.price,0);
  document.getElementById('boatSummary').textContent=fromRescue
    ?('救援成功。金币 '+state.gold+' · 渔获已丢失。')
    :('渔获 '+state.catch.length+' 条 · 负重 '+w+'/'+state.netMax+' · 估值 '+val+' 金币 · 钱包 '+state.gold);
  renderShop();
  save();
}

function renderShop(){
  const box=document.getElementById('shopList');
  box.innerHTML='';
  UPGRADES.forEach(u=>{
    const lv=state.shopLv[u.key]|0;
    const cost=Math.floor(u.base*Math.pow(u.scale,lv));
    const row=document.createElement('div');
    row.className='shop-item';
    row.innerHTML='<span><b>'+u.name+'</b> Lv'+(lv+1)+'<br/><small style="color:#94a3b8">'+u.desc+' · '+cost+'G</small></span>';
    const btn=document.createElement('button');
    btn.textContent='升级';
    btn.disabled=state.gold<cost;
    btn.onclick=()=>{
      if(state.gold<cost)return;
      state.gold-=cost;
      state.shopLv[u.key]=lv+1;
      u.apply(state);
      sfx('coin');
      renderShop();
      document.getElementById('boatSummary').textContent='钱包 '+state.gold+' 金币 · 负重上限 '+state.netMax+' · 氧气 '+state.maxOxy+' · 极限 '+state.suitLimit+'m';
      save();
    };
    row.appendChild(btn);
    box.appendChild(row);
  });
}

function hidePanels(){
  ['panelMenu','panelBoat','panelRescue'].forEach(id=>document.getElementById(id).classList.add('hidden'));
}

function sellCatch(){
  if(!state.catch.length){showMsg('没有渔获可卖',1.5);return}
  let gain=0;
  state.catch.forEach(c=>gain+=c.price);
  state.gold+=gain;
  state.catch=[];
  sfx('coin');
  document.getElementById('boatSummary').textContent='售出 +'+gain+' · 钱包 '+state.gold+' 金币';
  renderShop();
  save();
}

function nextDayDive(){
  state.day+=1;
  startDive();
}

function oxyRate(sprint){
  const d=depthOf(state.py);
  const depthMul=1+d/700;
  let rate=7*depthMul;
  if(sprint)rate*=2;
  if(d>state.suitLimit)rate*=3;
  return rate;
}

function fireSpear(){
  if(mode!=='dive'||!state.alive||state.spearCd>0)return;
  ensureAudio();
  const py=state.py-camY;
  let dx=mouse.x-W/2;
  let dy=mouse.y-py;
  const len=Math.hypot(dx,dy)||1;
  dx/=len;dy/=len;
  spears.push({
    x:state.px,y:state.py,vx:dx*420,vy:dy*420,
    life:state.spearRange/420,dmg:state.spearDmg,spent:false
  });
  state.spearCd=state.spearCdMax;
  state.facing=dx>=0?1:-1;
  sfx('shoot');
}

function tryCatch(f){
  const item={id:f.sp.id,name:f.sp.name,w:f.sp.w,price:f.sp.price};
  if(netWeight(state)+item.w>state.netMax){
    showMsg('网兜超重！'+f.sp.name+'挣脱了',2);
    sfx('pop');
    f.hp=f.maxHp;
    f.alive=true;
    f.caught=false;
    f.vx=(Math.random()<0.5?-1:1)*f.sp.speed;
    return false;
  }
  state.catch.push(item);
  floaters.push({x:f.x,y:f.y,tx:state.px,ty:state.py,t:0,sp:f.sp,rot:0});
  f.alive=false;
  sfx('catch');
  showMsg('捕获 '+f.sp.name+' (+'+f.sp.price+'G)',1.4);
  return true;
}

function updateDive(dt){
  let mx=0,my=0;
  if(keys['a']||keys['arrowleft'])mx-=1;
  if(keys['d']||keys['arrowright'])mx+=1;
  if(keys['w']||keys['arrowup'])my-=1;
  if(keys['s']||keys['arrowdown'])my+=1;
  if(touchMove.active){mx+=touchMove.x;my+=touchMove.y}
  const len=Math.hypot(mx,my);
  if(len>1){mx/=len;my/=len}
  const sprint=(keys['shift']||touchSprint)&&len>0.05;
  const spd=sprint?175:110;
  state.vx=mx*spd;
  state.vy=my*spd;
  state.px+=state.vx*dt;
  state.py+=state.vy*dt;
  state.px=clamp(state.px,-320,320);
  state.py=clamp(state.py,8,1750);
  if(mx)state.facing=mx>0?1:-1;

  const rate=oxyRate(sprint);
  state.oxy-=rate*dt;
  if(depthOf(state.py)>state.suitLimit){
    flashRed=Math.min(1,flashRed+dt*1.5);
    if(Math.random()<dt*1.2)sfx('alarm');
  }else flashRed=Math.max(0,flashRed-dt);

  if(state.oxy<=0){
    state.oxy=0;
    state.catch=[];
    mode='rescue';
    hidePanels();
    document.getElementById('panelRescue').classList.remove('hidden');
    sfx('alarm');
    save();
    return;
  }

  // surface return
  if(state.py<25&&(keys['e']||keys['escape'])){
    showMsg('返回船上',1);
    goBoat(false);
    return;
  }
  if(state.py<18&&my<-0.3){
    // hold up near surface a moment — auto prompt
  }

  state.spearCd=Math.max(0,state.spearCd-dt);
  maintainFish();

  fish.forEach(f=>{
    if(!f.alive)return;
    f.phase+=dt;
    f.x+=f.vx*dt;
    f.y+=Math.sin(f.phase*2)*8*dt;
    if(f.x<-340||f.x>340)f.vx*=-1;
    f.y=clamp(f.y,f.sp.min,f.sp.max);
  });

  spears.forEach(sp=>{
    if(sp.spent)return;
    sp.x+=sp.vx*dt;sp.y+=sp.vy*dt;sp.life-=dt;
    if(sp.life<=0){sp.spent=true;return}
    for(const f of fish){
      if(!f.alive)continue;
      const dx=f.x-sp.x,dy=f.y-sp.y;
      if(dx*dx+dy*dy<(f.r+6)*(f.r+6)){
        f.hp-=sp.dmg;
        sp.spent=true;
        sfx('hit');
        for(let i=0;i<6;i++)particles.push({x:f.x,y:f.y,vx:rand(-60,60),vy:rand(-60,60),life:rand(0.2,0.5),c:f.sp.color});
        if(f.hp<=0)tryCatch(f);
        break;
      }
    }
  });
  spears=spears.filter(s=>!s.spent&&s.life>0);

  floaters.forEach(fl=>{
    fl.t+=dt*2.2;
    const t=clamp(fl.t,0,1);
    fl.x+=(state.px-fl.x)*dt*6;
    fl.y+=(state.py-fl.y)*dt*6;
    fl.rot+=dt*10;
    fl.done=t>=1&&Math.hypot(fl.x-state.px,fl.y-state.py)<18;
  });
  floaters=floaters.filter(f=>!f.done);

  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt});
  particles=particles.filter(p=>p.life>0);

  camY+=(state.py-H*0.42-camY)*Math.min(1,dt*6);
  camX+=(state.px-camX)*Math.min(1,dt*8);
}

function waterColor(depth){
  const t=clamp(depth/1600,0,1);
  const r=8+t*4;
  const g=40-t*25;
  const b=80+t*40;
  return [r,g,b];
}

function drawFishBody(f){
  const sp=f.sp;
  ctx.save();
  ctx.translate(f.x-camX+W/2,f.y-camY);
  ctx.scale(f.vx>=0?1:-1,1);
  if(sp.id==='jelly'){
    ctx.globalAlpha=0.55;
    ctx.fillStyle=sp.color;
    ctx.beginPath();ctx.ellipse(0,0,f.r,f.r*0.7,0,0,Math.PI*2);ctx.fill();
    for(let i=0;i<5;i++){
      ctx.strokeStyle=sp.color;
      ctx.beginPath();
      ctx.moveTo(-8+i*4,4);
      ctx.quadraticCurveTo(-8+i*4,16+Math.sin(f.phase*3+i)*4, -10+i*4,28);
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }else if(sp.id==='angler'){
    ctx.fillStyle='#0f172a';
    ctx.beginPath();ctx.ellipse(0,2,f.r,f.r*0.75,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fde047';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(6,-6);ctx.quadraticCurveTo(16,-22,10,-28);ctx.stroke();
    const g=ctx.createRadialGradient(10,-28,0,10,-28,16);
    g.addColorStop(0,'rgba(253,224,71,.9)');g.addColorStop(1,'rgba(253,224,71,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(10,-28,16,0,Math.PI*2);ctx.fill();
  }else if(sp.id==='oarfish'){
    ctx.fillStyle=sp.color;
    ctx.beginPath();ctx.ellipse(0,0,f.r*1.6,f.r*0.35,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fef3c7';
    for(let i=0;i<6;i++){ctx.fillRect(-f.r+i*5,-f.r*0.55,3,4)}
  }else{
    ctx.fillStyle=sp.color;
    ctx.beginPath();ctx.ellipse(0,0,f.r,f.r*0.65,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(-f.r,0);ctx.lineTo(-f.r-8,-5);ctx.lineTo(-f.r-8,5);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(f.r*0.35,-2,2.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#020617';ctx.beginPath();ctx.arc(f.r*0.45,-2,1.1,0,Math.PI*2);ctx.fill();
  }
  if(f.hp<f.maxHp){
    ctx.fillStyle='rgba(0,0,0,.35)';
    ctx.fillRect(-12,-f.r-10,24,4);
    ctx.fillStyle='#ef4444';
    ctx.fillRect(-12,-f.r-10,24*(f.hp/f.maxHp),4);
  }
  ctx.restore();
}

function drawPlayer(){
  const x=W/2;
  const y=state.py-camY;
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(state.facing,1);
  // body
  ctx.fillStyle='#1d4ed8';
  ctx.beginPath();ctx.ellipse(0,4,11,14,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fde68a';
  ctx.beginPath();ctx.arc(0,-10,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0ea5e9';
  ctx.fillRect(-7,-12,14,5);
  // tank
  ctx.fillStyle='#334155';
  ctx.fillRect(-14,-4,5,14);
  // fins
  ctx.fillStyle='#38bdf8';
  ctx.beginPath();ctx.moveTo(-4,16);ctx.lineTo(-14,24);ctx.lineTo(2,18);ctx.fill();
  ctx.restore();

  // aim line
  if(mode==='dive'){
    const py=state.py-camY;
    ctx.strokeStyle='rgba(255,255,255,.2)';
    ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(W/2,py);ctx.lineTo(mouse.x,mouse.y);ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawWorld(){
  const d0=camY,d1=camY+H;
  const bands=20;
  for(let i=0;i<bands;i++){
    const y0=d0+(i/bands)*H;
    const depth=y0;
    const c=waterColor(depth);
    ctx.fillStyle='rgb('+c[0]+','+c[1]+','+c[2]+')';
    ctx.fillRect(0,(i/bands)*H,W,H/bands+1);
  }
  // light shafts near surface
  if(camY<200){
    ctx.fillStyle='rgba(255,255,255,.03)';
    for(let i=0;i<5;i++){
      const x=((i*97+performance.now()*0.01)%(W+40))-20;
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+30,0);ctx.lineTo(x-10,180);ctx.lineTo(x-40,180);ctx.fill();
    }
  }
  // surface
  const sy=0-camY;
  if(sy>-40&&sy<H+40){
    ctx.fillStyle='#7dd3fc';
    ctx.fillRect(0,sy-80,W,80);
    ctx.fillStyle='#38bdf8';
    ctx.beginPath();
    ctx.moveTo(0,sy);
    for(let x=0;x<=W;x+=20)ctx.lineTo(x,sy+Math.sin(x*0.05+performance.now()*0.003)*3);
    ctx.lineTo(W,sy-4);ctx.lineTo(0,sy-4);ctx.fill();
  // boat follows camera x near surface
    ctx.fillStyle='#92400e';
    ctx.fillRect(W/2-camX-36,sy-28,72,16);
    ctx.fillStyle='#f8fafc';
    ctx.fillRect(W/2-camX-6,sy-48,8,22);
  }
  // depth markers
  ctx.fillStyle='rgba(255,255,255,.25)';
  ctx.font='11px sans-serif';
  for(let d=100;d<=1700;d+=100){
    const y=d-camY;
    if(y<-10||y>H+10)continue;
    ctx.fillRect(8,y,18,1);
    ctx.fillText(d+'m',28,y+4);
  }

  // bubbles
  ctx.fillStyle='rgba(255,255,255,.15)';
  for(let i=0;i<12;i++){
    const bx=(i*53+state.px*0.2)%W;
    const by=(H-(performance.now()*0.04+i*40+state.py*0.1)%(H+40));
    ctx.beginPath();ctx.arc(bx,by,2+(i%3),0,Math.PI*2);ctx.fill();
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(mode==='dive'||mode==='rescue'){
    drawWorld();
    fish.forEach(f=>{if(f.alive)drawFishBody(f)});
    floaters.forEach(fl=>{
      ctx.save();
      ctx.translate(fl.x-camX+W/2,fl.y-camY);
      ctx.rotate(fl.rot);
      ctx.fillStyle=fl.sp.color;
      ctx.beginPath();ctx.ellipse(0,0,fl.sp.r,fl.sp.r*0.6,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
    });
    spears.forEach(sp=>{
      ctx.strokeStyle='#e2e8f0';ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(sp.x-camX+W/2,sp.y-camY);
      ctx.lineTo(sp.x-camX+W/2-sp.vx*0.04,sp.y-camY-sp.vy*0.04);
      ctx.stroke();
    });
    particles.forEach(p=>{
      ctx.globalAlpha=clamp(p.life*2,0,1);
      ctx.fillStyle=p.c;
      ctx.fillRect(p.x-camX+W/2,p.y-camY,3,3);
      ctx.globalAlpha=1;
    });
    if(state)drawPlayer();
    if(flashRed>0.05){
      ctx.fillStyle='rgba(220,38,38,'+(0.15+flashRed*0.35)+')';
      ctx.fillRect(0,0,W,H);
    }
  }else{
    // menu / boat backdrop
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0ea5e9');g.addColorStop(0.35,'#075985');g.addColorStop(1,'#020617');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#92400e';ctx.fillRect(W/2-50,H*0.42,100,22);
    ctx.fillStyle='#f8fafc';ctx.fillRect(W/2-8,H*0.36,10,28);
  }

  // HUD
  if(mode==='dive'&&state){
    const d=Math.floor(depthOf(state.py));
    const w=netWeight(state);
    const over=d>state.suitLimit;
    hud.innerHTML='第 <b>'+state.day+'</b> 天 · 深度 <b>'+d+'</b>m'+(over?' <b style="color:#f87171">超出极限!</b>':'')+
      '<br/>氧气 <b>'+Math.ceil(state.oxy)+'</b>/'+state.maxOxy+
      ' · 渔获 <b>'+state.catch.length+'</b> · 负重 <b>'+w+'/'+state.netMax+'</b>'+
      '<br/>靠近水面按 <b>E / Esc</b> 回船 · 鱼叉冷却 '+(state.spearCd>0?state.spearCd.toFixed(1)+'s':'就绪');
  }else if(mode==='boat'&&state){
    hud.innerHTML='船上休整 · 金币 <b>'+state.gold+'</b> · 第 <b>'+state.day+'</b> 天';
  }else hud.innerHTML='';

  if(msgT>0){
    ctx.fillStyle='rgba(15,23,42,.75)';
    ctx.fillRect(W/2-120,24,240,32);
    ctx.fillStyle='#f8fafc';ctx.font='13px sans-serif';ctx.textAlign='center';
    ctx.fillText(msg,W/2,45);ctx.textAlign='left';
  }
}

function loop(ts){
  const dt=Math.min(0.033,(ts-lastT)/1000||0.016);
  lastT=ts;
  if(msgT>0)msgT-=dt;
  if(mode==='dive')updateDive(dt);
  draw();
  requestAnimationFrame(loop);
}

// input
window.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.code==='Space'){e.preventDefault();fireSpear()}
  if(e.key==='e'||e.key==='E'||e.key==='Escape'){
    if(mode==='dive'&&state&&state.py<40)goBoat(false);
  }
});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouse.x=(e.clientX-r.left)*(W/r.width);
  mouse.y=(e.clientY-r.top)*(H/r.height);
});
canvas.addEventListener('mousedown',e=>{
  ensureAudio();
  if(mode==='dive')fireSpear();
});

// touch controls
(function(){
  const pad=document.getElementById('pad');
  const stick=document.getElementById('stick');
  const btnFire=document.getElementById('btnFire');
  const btnSprint=document.getElementById('btnSprint');
  function setStick(cx,cy){
    const r=pad.getBoundingClientRect();
    const x=cx-(r.left+r.width/2);
    const y=cy-(r.top+r.height/2);
    const m=Math.hypot(x,y)||1;
    const max=36;
    const nx=x/m,ny=y/m;
    const mag=clamp(m/max,0,1);
    touchMove.x=nx*mag;touchMove.y=ny*mag;touchMove.active=mag>0.08;
    stick.style.left=(33+nx*mag*28)+'px';
    stick.style.top=(33+ny*mag*28)+'px';
  }
  function endStick(){
    touchMove={x:0,y:0,active:false};
    stick.style.left='33px';stick.style.top='33px';
  }
  pad.addEventListener('touchstart',e=>{e.preventDefault();ensureAudio();const t=e.changedTouches[0];setStick(t.clientX,t.clientY)},{passive:false});
  pad.addEventListener('touchmove',e=>{e.preventDefault();const t=e.changedTouches[0];setStick(t.clientX,t.clientY)},{passive:false});
  pad.addEventListener('touchend',e=>{e.preventDefault();endStick()},{passive:false});
  btnFire.addEventListener('touchstart',e=>{e.preventDefault();fireSpear()},{passive:false});
  btnSprint.addEventListener('touchstart',e=>{e.preventDefault();touchSprint=true},{passive:false});
  btnSprint.addEventListener('touchend',e=>{e.preventDefault();touchSprint=false},{passive:false});
  canvas.addEventListener('touchstart',e=>{
    if(mode!=='dive')return;
    const t=e.changedTouches[0];
    const r=canvas.getBoundingClientRect();
    mouse.x=(t.clientX-r.left)*(W/r.width);
    mouse.y=(t.clientY-r.top)*(H/r.height);
  },{passive:true});
})();

document.getElementById('btnNew').onclick=()=>{
  ensureAudio();
  state=defaultState();
  startDive();
};
document.getElementById('btnContinue').onclick=()=>{
  ensureAudio();
  const data=load();
  if(!data)return;
  state=Object.assign(defaultState(),data.state);
  state.catch=state.catch||[];
  hidePanels();
  if(data.mode==='boat')goBoat(false);
  else startDive();
};
document.getElementById('btnSell').onclick=sellCatch;
document.getElementById('btnDive').onclick=()=>{ensureAudio();nextDayDive()};
document.getElementById('btnSaveMenu').onclick=()=>{save();mode='menu';hidePanels();document.getElementById('panelMenu').classList.remove('hidden');refreshContinue()};
document.getElementById('btnRescueOk').onclick=()=>{goBoat(true)};

function refreshContinue(){
  const data=load();
  document.getElementById('btnContinue').disabled=!data;
}
refreshContinue();
resize();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
