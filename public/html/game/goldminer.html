<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gold Miner - Tool Basecamp</title>
  <meta name="description" content="Swing the claw and grab gold and gems. Classic Gold Miner with emoji. Runs locally.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/game/games-common.css?v=1" />
  <link rel="stylesheet" href="../../css/game/goldminer.css?v=1" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.goldminer.title">Gold Miner</h1>
        <p data-i18n="tools.goldminer.desc">Swing the claw to grab gold and gems before time runs out. Runs locally.</p>
      </div>

      <div class="tool-card game-card">
        <div class="game-toolbar">
          <div class="game-stats">
            <span><span data-i18n="tools.game.score">Score</span>: <strong id="money">0</strong></span>
            <span><span data-i18n="tools.goldminer.target">Target</span>: <strong id="target">0</strong></span>
            <span><span data-i18n="tools.goldminer.level">Level</span>: <strong id="level">1</strong></span>
            <span><span data-i18n="tools.goldminer.time">Time</span>: <strong id="time">60</strong></span>
          </div>
          <div class="action-row">
            <button type="button" class="tb-btn" id="start-btn" data-i18n="tools.goldminer.start">Start</button>
            <button type="button" class="tb-btn" id="restart-btn" data-i18n="tools.game.restart">New game</button>
          </div>
        </div>
        <div class="game-status is-idle" id="status" data-i18n="tools.goldminer.hint">Press Start, then tap or click to drop the claw.</div>
        <div class="game-board-wrap">
          <canvas id="canvas" class="gm-canvas" width="390" height="560"></canvas>
        </div>
        <p class="game-hint" data-i18n="tools.goldminer.legend">💰 gold · 💎 gem · 🪨 rock (heavy) · 💣 bomb (−score)</p>
      </div>
    </main>
  </div>

  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/game/goldminer.js?v=1"></script>
</body>
</html>
