<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gomoku - Tool Basecamp</title>
  <meta name="description" content="Two-player gomoku (five in a row) on a 15×15 board.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/game/games-common.css?v=1" />
  <link rel="stylesheet" href="../../css/game/gomoku.css?v=1" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.gomoku.title">Gomoku</h1>
        <p data-i18n="tools.gomoku.desc">Two players take turns. First to place five stones in a row wins. Runs locally.</p>
      </div>

      <div class="tool-card game-card">
        <div class="game-toolbar">
          <div class="game-status is-idle" id="status"></div>
          <div class="action-row">
            <button type="button" class="tb-btn" id="restart-btn" data-i18n="tools.game.restart">New game</button>
          </div>
        </div>
        <div class="game-board-wrap">
          <div class="gomoku-board" id="board" aria-label="Gomoku board"></div>
        </div>
        <p class="game-hint" data-i18n="tools.gomoku.tip">Tip: play on one device — black and white take turns.</p>
      </div>
    </main>
  </div>

  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/game/gomoku.js?v=1"></script>
</body>
</html>
