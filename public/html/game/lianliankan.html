<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lianliankan - Tool Basecamp</title>
  <meta name="description" content="Match identical emoji tiles with a path of at most two turns. Classic Lianliankan, runs locally.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/game/games-common.css?v=1" />
  <link rel="stylesheet" href="../../css/game/lianliankan.css?v=1" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.lianliankan.title">Lianliankan</h1>
        <p data-i18n="tools.lianliankan.desc">Match identical emoji tiles with a path of at most two turns. Runs locally.</p>
      </div>

      <div class="tool-card game-card">
        <div class="game-toolbar">
          <div class="game-stats">
            <span><span data-i18n="tools.game.score">Score</span>: <strong id="score">0</strong></span>
            <span><span data-i18n="tools.lianliankan.pairs">Pairs left</span>: <strong id="pairs">0</strong></span>
          </div>
          <div class="action-row">
            <button type="button" class="tb-btn" id="hint-btn" data-i18n="tools.lianliankan.hint">Hint</button>
            <button type="button" class="tb-btn" id="shuffle-btn" data-i18n="tools.lianliankan.shuffle">Shuffle</button>
            <button type="button" class="tb-btn" id="restart-btn" data-i18n="tools.game.restart">New game</button>
          </div>
        </div>
        <div class="game-status is-idle" id="status" data-i18n="tools.lianliankan.hintPlay">Select two matching tiles that can connect with at most two turns.</div>
        <div class="game-board-wrap">
          <div class="llk-board" id="board">
            <svg class="llk-path-layer" id="path-layer" aria-hidden="true"></svg>
            <div class="llk-grid" id="grid"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/game/lianliankan.js?v=1"></script>
</body>
</html>
