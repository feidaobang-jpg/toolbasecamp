<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<title>星蛇突击 · Salamander homage</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;width:100%;height:100dvh;width:100dvw;
  background:#020617;color:#e2e8f0;
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  overflow:hidden;touch-action:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
#wrap{
  position:fixed;left:50%;top:50%;
  width:960px;height:540px;margin:0;
  transform:translate(-50%,-50%);
  transform-origin:center center;
  background:#000;overflow:hidden;
}
canvas{display:block;width:100%;height:100%}
#hud{
  position:absolute;left:0;right:0;top:0;padding:8px 12px;
  pointer-events:none;text-shadow:0 1px 3px #000;font-size:13px;z-index:2;
  display:flex;gap:12px;flex-wrap:wrap;align-items:center;
}
#hud b{color:#fde68a}
#hud .tag{
  padding:2px 8px;border-radius:999px;
  background:rgba(37,99,235,.45);border:1px solid #60a5fa;
  color:#93c5fd;font-weight:700;font-size:12px;
}
#bossBarWrap{
  position:absolute;left:50%;top:36px;transform:translateX(-50%);
  width:min(320px,55%);height:10px;background:#1e293b;
  border:1px solid #475569;border-radius:6px;overflow:hidden;
  pointer-events:none;z-index:2;display:none;
}
#bossBar{display:block;height:100%;width:100%;background:linear-gradient(90deg,#ef4444,#f97316)}
#touch{display:none;position:absolute;inset:0;pointer-events:none;z-index:3}
#touch .pad{
  pointer-events:auto;position:absolute;left:1.5%;bottom:2.5%;
  width:11%;aspect-ratio:1;max-width:96px;min-width:52px;
  border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);
}
#touch .stick{
  position:absolute;left:50%;top:50%;width:40%;height:40%;
  margin:-20% 0 0 -20%;border-radius:50%;background:rgba(255,255,255,.3);
  transform:translate(0,0);will-change:transform;
}
#touch .fire{
  pointer-events:auto;position:absolute;right:2%;bottom:2.5%;
  width:7%;aspect-ratio:1;max-width:64px;min-width:40px;
  border-radius:50%;background:rgba(37,99,235,.55);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;
}
@media(pointer:coarse){#touch{display:block}#credit{display:none}}
#ui{position:absolute;inset:0;pointer-events:none;z-index:4}
#ui .panel{
  pointer-events:auto;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:min(88%,400px);background:rgba(10,14,28,.94);border:1px solid #334155;
  border-radius:14px;padding:16px 18px;box-shadow:0 20px 60px rgba(0,0,0,.55);
}
#ui h1{font-size:1.25rem;color:#38bdf8;margin-bottom:6px}
#ui p{font-size:.82rem;line-height:1.45;color:#94a3b8;margin-bottom:6px}
#ui .row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
#ui button{
  font:inherit;flex:1;min-width:100px;border:0;border-radius:999px;
  padding:11px 16px;background:#2563eb;color:#fff;cursor:pointer;
}
#ui button.ghost{background:#1e293b;border:1px solid #475569}
.hidden{display:none!important}
#credit{
  position:absolute;left:10px;bottom:8px;font-size:10px;
  color:rgba(148,163,184,.55);pointer-events:none;z-index:2;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <span>得分 <b id="score">0</b></span>
    <span>命 <b id="lives">3</b></span>
    <span>最高 <b id="best">0</b></span>
    <span class="tag" id="weaponTag">普通弹</span>
  </div>
  <div id="bossBarWrap"><i id="bossBar"></i></div>
  <div id="touch">
    <div class="pad" id="pad"><div class="stick" id="stick"></div></div>
    <div class="fire" id="btnFire">射</div>
  </div>
  <div id="ui">
    <div class="panel" id="panelMenu">
      <h1>星蛇突击</h1>
      <p>Salamander / Life Force 风格纵版 STG。穿越有机星域，击落敌巢与星蛇 Boss。</p>
      <p>键鼠：WASD 移动 · J 开火<br/>触屏：左摇杆 · 右下开火</p>
      <p>胶囊：<b style="color:#60a5fa">S</b> 加速 · <b style="color:#f472b6">M</b> 导弹 · <b style="color:#34d399">L</b> 激光</p>
      <div class="row">
        <button id="btnStart">出击</button>
        <button class="ghost" id="btnContinue" disabled>继续</button>
      </div>
    </div>
    <div class="panel hidden" id="panelOver">
      <h1 id="overTitle">任务结束</h1>
      <p id="overText"></p>
      <div class="row">
        <button id="btnRetry">再战</button>
        <button class="ghost" id="btnMenu">标题</button>
      </div>
    </div>
  </div>
  <div id="credit">960×540 · WASD+J · 触屏摇杆</div>
</div>
<script>
(function () {
'use strict';

const SAVE = 'tbc_star_serpent_v1';
const BASE_W = 960, BASE_H = 540;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');

const el = {
  score: document.getElementById('score'),
  lives: document.getElementById('lives'),
  best: document.getElementById('best'),
  weaponTag: document.getElementById('weaponTag'),
  bossBarWrap: document.getElementById('bossBarWrap'),
  bossBar: document.getElementById('bossBar'),
  panelMenu: document.getElementById('panelMenu'),
  panelOver: document.getElementById('panelOver'),
  overTitle: document.getElementById('overTitle'),
  overText: document.getElementById('overText'),
  btnStart: document.getElementById('btnStart'),
  btnContinue: document.getElementById('btnContinue'),
  btnRetry: document.getElementById('btnRetry'),
  btnMenu: document.getElementById('btnMenu'),
  pad: document.getElementById('pad'),
  stick: document.getElementById('stick'),
  btnFire: document.getElementById('btnFire')
};

const WEAPON_NAME = { normal: '普通弹', missile: '导弹', laser: '激光' };
const POWER_LABEL = { S: '加速', M: '导弹', L: '激光' };

let W = BASE_W, H = BASE_H, DPR = 1, drawSX = 1, drawSY = 1, stageScale = 1;
let mode = 'menu';
let lastT = 0;
let best = 0;
let savedRun = null;

let keys = Object.create(null);
let touchMove = { x: 0, y: 0 };
let fireHeld = false;
let audioCtx = null;

let player = null;
let bullets = [];
let eBullets = [];
let enemies = [];
let powerups = [];
let particles = [];
let floats = [];
let stars = [];
let tunnel = [];
let boss = null;

let scrollSpd = 55;
let dist = 0;
let spawnT = 0;
let wave = 1;
let bossWave = 0;
let nextBossAt = 2800;
let bossAlert = 0;
let shakeT = 0;
let flashT = 0;

try {
  const saved = JSON.parse(localStorage.getItem(SAVE) || '{}');
  best = (saved.best) | 0;
  if (saved.run && saved.run.player) savedRun = saved.run;
} catch (e) {}
el.best.textContent = String(best);
el.btnContinue.disabled = !savedRun;

function saveMeta(run) {
  try {
    localStorage.setItem(SAVE, JSON.stringify({
      best,
      run: run || null
    }));
  } catch (e) {}
}

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function rand(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[(Math.random() * arr.length) | 0]; }

function resize() {
  const vw = Math.max(320, window.innerWidth | 0);
  const vh = Math.max(240, window.innerHeight | 0);
  stageScale = Math.min(vw / BASE_W, vh / BASE_H);
  const dispW = Math.max(1, Math.floor(BASE_W * stageScale));
  const dispH = Math.max(1, Math.floor(BASE_H * stageScale));
  wrap.style.width = dispW + 'px';
  wrap.style.height = dispH + 'px';
  DPR = Math.min(2.5, devicePixelRatio || 1);
  W = BASE_W;
  H = BASE_H;
  canvas.style.width = dispW + 'px';
  canvas.style.height = dispH + 'px';
  canvas.width = Math.floor(dispW * DPR);
  canvas.height = Math.floor(dispH * DPR);
  drawSX = canvas.width / BASE_W;
  drawSY = canvas.height / BASE_H;
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 120));

function beginDraw() {
  ctx.setTransform(drawSX, 0, 0, drawSY, 0, 0);
}

/* ========== WebAudio ========== */
function ensureAudio() {
  if (audioCtx) return audioCtx;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return null;
  audioCtx = new AC();
  return audioCtx;
}

function envGain(ac, t0, vol, attack, sustain, release) {
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(Math.max(0.0002, vol), t0 + attack);
  g.gain.exponentialRampToValueAtTime(Math.max(0.0002, vol * 0.65), t0 + attack + sustain);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + attack + sustain + release);
  return g;
}

function noiseBuf(ac, dur) {
  const n = ac.createBuffer(1, (ac.sampleRate * dur) | 0, ac.sampleRate);
  const d = n.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.3);
  return n;
}

function sfx(name) {
  const ac = ensureAudio();
  if (!ac) return;
  if (ac.state === 'suspended') ac.resume();
  const t0 = ac.currentTime;
  if (name === 'shoot') {
    const o = ac.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(880, t0);
    o.frequency.exponentialRampToValueAtTime(220, t0 + 0.06);
    const g = envGain(ac, t0, 0.045, 0.001, 0.015, 0.06);
    o.connect(g); g.connect(ac.destination);
    o.start(t0); o.stop(t0 + 0.09);
  } else if (name === 'laser') {
    const o = ac.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(420, t0);
    o.frequency.exponentialRampToValueAtTime(180, t0 + 0.12);
    const g = envGain(ac, t0, 0.035, 0.002, 0.04, 0.08);
    const f = ac.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 900; f.Q.value = 1.2;
    o.connect(f); f.connect(g); g.connect(ac.destination);
    o.start(t0); o.stop(t0 + 0.15);
  } else if (name === 'missile') {
    const o = ac.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(160, t0);
    o.frequency.exponentialRampToValueAtTime(90, t0 + 0.1);
    const g = envGain(ac, t0, 0.05, 0.002, 0.03, 0.08);
    o.connect(g); g.connect(ac.destination);
    o.start(t0); o.stop(t0 + 0.12);
  } else if (name === 'hit') {
    const src = ac.createBufferSource();
    src.buffer = noiseBuf(ac, 0.06);
    const g = envGain(ac, t0, 0.08, 0.001, 0.01, 0.05);
    const f = ac.createBiquadFilter();
    f.type = 'highpass'; f.frequency.value = 800;
    src.connect(f); f.connect(g); g.connect(ac.destination);
    src.start(t0);
  } else if (name === 'explode') {
    const src = ac.createBufferSource();
    src.buffer = noiseBuf(ac, 0.25);
    const g = envGain(ac, t0, 0.12, 0.002, 0.05, 0.2);
    const f = ac.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.setValueAtTime(2200, t0);
    f.frequency.exponentialRampToValueAtTime(120, t0 + 0.25);
    src.connect(f); f.connect(g); g.connect(ac.destination);
    src.start(t0);
    const o = ac.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(90, t0);
    o.frequency.exponentialRampToValueAtTime(30, t0 + 0.2);
    const og = envGain(ac, t0, 0.07, 0.005, 0.04, 0.18);
    o.connect(og); og.connect(ac.destination);
    o.start(t0); o.stop(t0 + 0.25);
  } else if (name === 'power') {
    [440, 554, 659, 880].forEach((f, i) => {
      const o = ac.createOscillator();
      o.type = 'sine';
      o.frequency.value = f;
      const g = envGain(ac, t0 + i * 0.06, 0.05, 0.005, 0.05, 0.12);
      o.connect(g); g.connect(ac.destination);
      o.start(t0 + i * 0.06); o.stop(t0 + i * 0.06 + 0.2);
    });
  } else if (name === 'hurt') {
    const o = ac.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(180, t0);
    o.frequency.exponentialRampToValueAtTime(50, t0 + 0.25);
    const g = envGain(ac, t0, 0.07, 0.005, 0.06, 0.18);
    o.connect(g); g.connect(ac.destination);
    o.start(t0); o.stop(t0 + 0.28);
  } else if (name === 'boss') {
    [220, 277, 330, 415].forEach((f, i) => {
      const o = ac.createOscillator();
      o.type = 'square';
      o.frequency.value = f;
      const g = envGain(ac, t0 + i * 0.12, 0.04, 0.01, 0.08, 0.15);
      o.connect(g); g.connect(ac.destination);
      o.start(t0 + i * 0.12); o.stop(t0 + i * 0.12 + 0.35);
    });
  } else if (name === 'start') {
    const o = ac.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(330, t0);
    o.frequency.exponentialRampToValueAtTime(660, t0 + 0.2);
    const g = envGain(ac, t0, 0.05, 0.01, 0.06, 0.12);
    o.connect(g); g.connect(ac.destination);
    o.start(t0); o.stop(t0 + 0.25);
  }
}

/* ========== Init / reset ========== */
function makePlayer(from) {
  const p = from || {};
  return {
    x: p.x != null ? p.x : W * 0.5,
    y: p.y != null ? p.y : H * 0.82,
    spd: p.spd != null ? p.spd : 260,
    spdLv: p.spdLv | 0 || 0,
    weapon: p.weapon || 'normal',
    lives: p.lives != null ? p.lives : 3,
    score: p.score | 0 || 0,
    shootCd: 0,
    invuln: 0,
    laserT: 0
  };
}

function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      z: rand(0.2, 1),
      tw: Math.random() * Math.PI * 2
    });
  }
}

function initTunnel() {
  tunnel = [];
  for (let i = 0; i < 24; i++) {
    tunnel.push({
      y: i * 48 - 48,
      seed: Math.random() * 9999,
      hue: 280 + Math.random() * 40
    });
  }
}

function resetGame(keepRun) {
  player = makePlayer(keepRun ? savedRun.player : null);
  bullets = [];
  eBullets = [];
  enemies = [];
  powerups = [];
  particles = [];
  floats = [];
  boss = null;
  dist = keepRun ? (savedRun.dist | 0) : 0;
  wave = keepRun ? (savedRun.wave | 0) || 1 : 1;
  bossWave = keepRun ? (savedRun.bossWave | 0) : 0;
  nextBossAt = keepRun ? (savedRun.nextBossAt || 2800) : 2800;
  scrollSpd = 55 + wave * 2;
  spawnT = 0;
  bossAlert = 0;
  shakeT = 0;
  flashT = 0;
  initStars();
  initTunnel();
  updateHud();
  el.bossBarWrap.style.display = 'none';
}

function updateHud() {
  if (!player) return;
  el.score.textContent = String(player.score);
  el.lives.textContent = String(player.lives);
  el.weaponTag.textContent = WEAPON_NAME[player.weapon] || '普通弹';
}

function persistRun() {
  if (mode !== 'play' || !player) return;
  savedRun = {
    player: {
      x: player.x, y: player.y, spd: player.spd, spdLv: player.spdLv,
      weapon: player.weapon, lives: player.lives, score: player.score
    },
    dist, wave, bossWave, nextBossAt
  };
  saveMeta(savedRun);
}

/* ========== Spawning ========== */
function spawnEnemy(type, x, y, opts) {
  opts = opts || {};
  const e = {
    type,
    x: x != null ? x : rand(60, W - 60),
    y: y != null ? y : -40,
    vx: opts.vx || 0,
    vy: opts.vy != null ? opts.vy : rand(40, 90) + wave * 4,
    hp: opts.hp || 2,
    maxHp: opts.hp || 2,
    r: opts.r || 18,
    t: 0,
    shootCd: rand(0.8, 2.2),
    hue: opts.hue != null ? opts.hue : rand(0, 40),
    wobble: Math.random() * Math.PI * 2,
    score: opts.score || 100
  };
  if (type === 'pod') { e.hp = 4; e.maxHp = 4; e.r = 22; e.score = 200; }
  if (type === 'skitter') { e.hp = 1; e.maxHp = 1; e.r = 14; e.vy = 120 + wave * 6; e.score = 80; }
  if (type === 'turret') { e.hp = 6; e.maxHp = 6; e.r = 26; e.vy = 35; e.vx = 0; e.score = 350; }
  if (type === 'serpent') { e.hp = 3; e.maxHp = 3; e.r = 16; e.vy = 70; e.score = 150; }
  enemies.push(e);
}

function spawnWave() {
  const kind = (Math.random() * 100) | 0;
  if (kind < 30) {
    for (let i = 0; i < 5; i++) spawnEnemy('skitter', 120 + i * 140, -30 - i * 35);
  } else if (kind < 55) {
    for (let i = 0; i < 3; i++) spawnEnemy('pod', rand(100, W - 100), -50 - i * 60);
  } else if (kind < 75) {
    const cx = rand(W * 0.25, W * 0.75);
    for (let i = 0; i < 6; i++) {
      spawnEnemy('serpent', cx + Math.sin(i * 0.9) * 80, -40 - i * 28, { vx: Math.cos(i) * 30 });
    }
  } else {
    spawnEnemy('turret', rand(120, W - 120), -60);
    for (let i = 0; i < 4; i++) spawnEnemy('skitter', rand(80, W - 80), -20 - i * 40);
  }
}

function maybeDropPower(x, y) {
  if (Math.random() > 0.22) return;
  const kinds = ['S', 'M', 'L'];
  powerups.push({
    x, y, vy: 45, kind: pick(kinds), t: 0, r: 14
  });
}

function spawnBoss() {
  bossWave++;
  bossAlert = 2.5;
  sfx('boss');
  const segs = [];
  const n = 10 + bossWave;
  for (let i = 0; i < n; i++) {
    segs.push({ off: i * 28, hp: 8 + bossWave * 2, maxHp: 8 + bossWave * 2 });
  }
  boss = {
    x: W * 0.5,
    y: -120,
    targetY: H * 0.28,
    vx: 0,
    t: 0,
    phase: 0,
    segs,
    shootCd: 1.2,
    totalHp: segs.reduce((s, g) => s + g.hp, 0),
    maxTotal: segs.reduce((s, g) => s + g.maxHp, 0)
  };
  el.bossBarWrap.style.display = 'block';
  addFloat('⚠ 星蛇 Boss 来袭', W * 0.5, H * 0.35, '#f97316', 2.2);
}

/* ========== Combat ========== */
function addBullet(x, y, vx, vy, dmg, friendly, opts) {
  opts = opts || {};
  bullets.push({
    x, y, vx, vy, dmg: dmg || 1, friendly: !!friendly,
    r: opts.r || 4, life: opts.life || 3, hue: opts.hue != null ? opts.hue : 190,
    homing: opts.homing || false, trail: opts.trail || false
  });
}

function addEBullet(x, y, vx, vy, r) {
  eBullets.push({ x, y, vx, vy, r: r || 5, life: 6 });
}

function playerShoot() {
  if (!player || player.shootCd > 0) return;
  const w = player.weapon;
  if (w === 'normal') {
    player.shootCd = 0.11;
    addBullet(player.x, player.y - 22, 0, -620, 1, true);
    sfx('shoot');
  } else if (w === 'missile') {
    player.shootCd = 0.13;
    addBullet(player.x, player.y - 22, 0, -580, 1, true);
    addBullet(player.x - 16, player.y - 8, -80, -420, 2, true, { r: 5, homing: true, hue: 330, trail: true });
    addBullet(player.x + 16, player.y - 8, 80, -420, 2, true, { r: 5, homing: true, hue: 330, trail: true });
    sfx('missile');
  } else if (w === 'laser') {
    player.shootCd = 0.07;
    addBullet(player.x, player.y - 24, 0, -700, 2, true, { r: 6, hue: 120, life: 0.35 });
    addBullet(player.x - 12, player.y - 18, 0, -680, 1, true, { r: 4, hue: 140, life: 0.3 });
    addBullet(player.x + 12, player.y - 18, 0, -680, 1, true, { r: 4, hue: 140, life: 0.3 });
    if (Math.random() < 0.35) sfx('laser');
  }
}

function explode(x, y, col, n) {
  sfx('explode');
  shakeT = Math.max(shakeT, 0.15);
  for (let i = 0; i < (n || 12); i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = rand(40, 220);
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: rand(0.25, 0.7), col: col || '#f97316', sz: rand(2, 5)
    });
  }
}

function addFloat(text, x, y, col, life) {
  floats.push({ text, x, y, vy: -28, life: life || 1.2, col: col || '#fde68a' });
}

function hitPlayer() {
  if (!player || player.invuln > 0) return;
  player.lives--;
  player.invuln = 2.2;
  player.weapon = 'normal';
  sfx('hurt');
  shakeT = 0.35;
  flashT = 0.12;
  updateHud();
  if (player.lives <= 0) gameOver(false);
  else addFloat('残机 -1', player.x, player.y - 30, '#ef4444');
}

function gameOver(clear) {
  mode = 'over';
  if (player && player.score > best) {
    best = player.score;
    el.best.textContent = String(best);
  }
  savedRun = null;
  saveMeta(null);
  el.panelOver.classList.remove('hidden');
  el.overTitle.textContent = clear ? '任务完成' : '任务结束';
  el.overText.textContent = clear
    ? '星域已净化！得分 ' + player.score
    : '得分 ' + (player ? player.score : 0) + ' · 最高 ' + best;
  el.btnContinue.disabled = true;
}

function circleHit(ax, ay, ar, bx, by, br) {
  const dx = ax - bx, dy = ay - by;
  return dx * dx + dy * dy < (ar + br) * (ar + br);
}

function damageEnemy(e, dmg) {
  e.hp -= dmg;
  sfx('hit');
  if (e.hp <= 0) {
    player.score += e.score;
    explode(e.x, e.y, `hsl(${e.hue},80%,55%)`, 10);
    maybeDropPower(e.x, e.y);
    updateHud();
    return true;
  }
  return false;
}

function applyPower(kind) {
  sfx('power');
  if (kind === 'S') {
    player.spdLv = Math.min(4, player.spdLv + 1);
    player.spd = 260 + player.spdLv * 35;
    addFloat('加速 UP', player.x, player.y - 36, '#60a5fa');
  } else if (kind === 'M') {
    player.weapon = 'missile';
    addFloat('导弹武装', player.x, player.y - 36, '#f472b6');
  } else if (kind === 'L') {
    player.weapon = 'laser';
    addFloat('激光武装', player.x, player.y - 36, '#34d399');
  }
  updateHud();
}

/* ========== Update ========== */
function update(dt) {
  if (mode !== 'play') return;
  dist += scrollSpd * dt;
  spawnT -= dt;
  if (spawnT <= 0 && !boss) {
    spawnWave();
    spawnT = Math.max(0.55, 1.6 - wave * 0.04);
    if (Math.random() < 0.08) wave++;
    scrollSpd = 55 + wave * 2 + player.spdLv * 3;
  }

  if (!boss && dist >= nextBossAt) {
    spawnBoss();
    nextBossAt += 3200 + bossWave * 400;
  }
  if (bossAlert > 0) bossAlert -= dt;

  // Stars & tunnel scroll
  for (const s of stars) {
    s.y += scrollSpd * s.z * dt;
    s.tw += dt * 3;
    if (s.y > H + 4) { s.y = -4; s.x = Math.random() * W; }
  }
  for (const t of tunnel) {
    t.y += scrollSpd * 0.85 * dt;
    if (t.y > H + 60) {
      t.y = -60;
      t.seed = Math.random() * 9999;
      t.hue = 280 + Math.random() * 40;
    }
  }

  // Input movement
  let mx = 0, my = 0;
  if (keys.w || keys.ArrowUp) my -= 1;
  if (keys.s || keys.ArrowDown) my += 1;
  if (keys.a || keys.ArrowLeft) mx -= 1;
  if (keys.d || keys.ArrowRight) mx += 1;
  mx += touchMove.x;
  my += touchMove.y;
  const ml = Math.hypot(mx, my);
  if (ml > 1) { mx /= ml; my /= ml; }
  player.x += mx * player.spd * dt;
  player.y += my * player.spd * dt;
  player.x = clamp(player.x, 32, W - 32);
  player.y = clamp(player.y, H * 0.12, H * 0.92);

  player.shootCd -= dt;
  player.invuln -= dt;
  if (fireHeld || keys.j || keys.z || keys[' ']) playerShoot();

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.life -= dt;
    if (b.homing) {
      let best = null, bd = 1e9;
      for (const e of enemies) {
        const d = (e.x - b.x) ** 2 + (e.y - b.y) ** 2;
        if (d < bd) { bd = d; best = e; }
      }
      if (boss) {
        const by = boss.y + 20;
        const d = (boss.x - b.x) ** 2 + (by - b.y) ** 2;
        if (d < bd) best = { x: boss.x, y: by, boss: true };
      }
      if (best) {
        const ang = Math.atan2(best.y - b.y, best.x - b.x);
        const spd = Math.hypot(b.vx, b.vy) || 500;
        b.vx += Math.cos(ang) * 900 * dt;
        b.vy += Math.sin(ang) * 900 * dt;
        const sp = Math.hypot(b.vx, b.vy);
        b.vx = b.vx / sp * spd;
        b.vy = b.vy / sp * spd;
      }
    }
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.life <= 0 || b.y < -40 || b.y > H + 40 || b.x < -40 || b.x > W + 40) {
      bullets.splice(i, 1);
      continue;
    }
    if (!b.friendly) continue;
    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (circleHit(b.x, b.y, b.r, e.x, e.y, e.r)) {
        if (damageEnemy(e, b.dmg)) enemies.splice(j, 1);
        hit = true;
        break;
      }
    }
    if (!hit && boss) {
      const headY = boss.y + 20;
      if (circleHit(b.x, b.y, b.r, boss.x, headY, 30)) {
        hitBoss(b.dmg);
        hit = true;
      } else {
        for (let si = 0; si < boss.segs.length; si++) {
          const s = boss.segs[si];
          if (s.hp <= 0) continue;
          const sx = boss.x + Math.sin(boss.t * 2.2 + si * 0.55) * (40 + si * 8);
          const sy = boss.y + s.off;
          if (circleHit(b.x, b.y, b.r, sx, sy, 18)) {
            s.hp -= b.dmg;
            boss.totalHp -= b.dmg;
            sfx('hit');
            hit = true;
            if (s.hp <= 0) explode(sx, sy, '#a855f7', 8);
            break;
          }
        }
      }
    }
    if (hit) bullets.splice(i, 1);
  }

  // Enemy bullets
  for (let i = eBullets.length - 1; i >= 0; i--) {
    const b = eBullets[i];
    b.life -= dt;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.life <= 0 || b.y > H + 30 || b.x < -30 || b.x > W + 30) {
      eBullets.splice(i, 1);
      continue;
    }
    if (circleHit(b.x, b.y, b.r, player.x, player.y, 14)) {
      eBullets.splice(i, 1);
      hitPlayer();
    }
  }

  // Enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.t += dt;
    e.y += e.vy * dt;
    if (e.type === 'serpent') e.x += Math.sin(e.t * 4 + e.wobble) * 80 * dt + e.vx * dt;
    else if (e.type === 'skitter') e.x += Math.sin(e.t * 8) * 120 * dt;
    else e.x += e.vx * dt;

    e.shootCd -= dt;
    if (e.shootCd <= 0 && e.y > 20 && e.y < H * 0.75) {
      e.shootCd = rand(1.2, 2.8);
      const ang = Math.atan2(player.y - e.y, player.x - e.x);
      const sp = e.type === 'turret' ? 200 : 160;
      addEBullet(e.x, e.y, Math.cos(ang) * sp, Math.sin(ang) * sp, e.type === 'turret' ? 7 : 5);
    }

    if (circleHit(e.x, e.y, e.r, player.x, player.y, 14)) {
      explode(e.x, e.y, '#fb7185', 8);
      enemies.splice(i, 1);
      hitPlayer();
      continue;
    }
    if (e.y > H + 60) enemies.splice(i, 1);
  }

  // Powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.t += dt;
    p.y += p.vy * dt;
    p.x += Math.sin(p.t * 5) * 20 * dt;
    if (circleHit(p.x, p.y, p.r, player.x, player.y, 16)) {
      applyPower(p.kind);
      powerups.splice(i, 1);
      continue;
    }
    if (p.y > H + 30) powerups.splice(i, 1);
  }

  // Boss
  if (boss) updateBoss(dt);

  // Particles & floats
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.96;
    p.vy *= 0.96;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i];
    f.life -= dt;
    f.y += f.vy * dt;
    if (f.life <= 0) floats.splice(i, 1);
  }

  if (shakeT > 0) shakeT -= dt;
  if (flashT > 0) flashT -= dt;

  if ((dist | 0) % 400 < 2) persistRun();
}

function hitBoss(dmg) {
  if (!boss) return;
  const head = boss.segs[0];
  if (head && head.hp > 0) {
    head.hp -= dmg;
    boss.totalHp -= dmg;
    sfx('hit');
    if (head.hp <= 0) explode(boss.x, boss.y + 20, '#c084fc', 14);
  }
}

function updateBoss(dt) {
  const b = boss;
  b.t += dt;
  if (b.y < b.targetY) b.y += 80 * dt;
  b.x += Math.sin(b.t * 1.4) * 140 * dt;
  b.x = clamp(b.x, 80, W - 80);
  b.shootCd -= dt;

  if (b.shootCd <= 0) {
    b.shootCd = Math.max(0.45, 1.1 - bossWave * 0.05);
    const n = 3 + (bossWave | 0);
    for (let i = 0; i < n; i++) {
      const ang = Math.PI * 0.5 + (i - (n - 1) / 2) * 0.22;
      addEBullet(b.x, b.y + 40, Math.cos(ang) * 180, Math.sin(ang) * 180, 6);
    }
    const ang2 = Math.atan2(player.y - b.y, player.x - b.x);
    addEBullet(b.x, b.y + 20, Math.cos(ang2) * 220, Math.sin(ang2) * 220, 7);
  }

  el.bossBar.style.width = Math.max(0, (b.totalHp / b.maxTotal) * 100) + '%';

  if (b.totalHp <= 0) {
    explode(b.x, b.y, '#a855f7', 28);
    for (let i = 0; i < b.segs.length; i++) {
      const sx = b.x + Math.sin(b.t + i) * 50;
      explode(sx, b.y + b.segs[i].off, '#f472b6', 10);
    }
    player.score += 5000 + bossWave * 800;
    updateHud();
    boss = null;
    el.bossBarWrap.style.display = 'none';
    addFloat('Boss 击破!', W * 0.5, H * 0.4, '#fde68a', 2);
    wave++;
  }
}

/* ========== Draw ========== */
function drawTunnel() {
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#0f0520');
  grd.addColorStop(0.5, '#1a0a2e');
  grd.addColorStop(1, '#240818');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  for (const s of stars) {
    const a = 0.25 + Math.sin(s.tw) * 0.15 + s.z * 0.35;
    ctx.fillStyle = `rgba(200,220,255,${a})`;
    ctx.fillRect(s.x, s.y, 1 + s.z * 2, 1 + s.z);
  }

  for (const t of tunnel) {
    const y = t.y;
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = `hsla(${t.hue},70%,45%,0.5)`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 24) {
      const ny = y + Math.sin(x * 0.02 + t.seed) * 18 + Math.cos(x * 0.008) * 10;
      if (x === 0) ctx.moveTo(x, ny);
      else ctx.lineTo(x, ny);
    }
    ctx.stroke();
    ctx.beginPath();
    for (let x = 0; x <= W; x += 24) {
      const ny = y + 80 + Math.sin(x * 0.025 + t.seed + 2) * 22;
      if (x === 0) ctx.moveTo(x, ny);
      else ctx.lineTo(x, ny);
    }
    ctx.stroke();
    ctx.restore();

    // organic blobs on walls
    for (let i = 0; i < 3; i++) {
      const bx = (t.seed * (i + 1) * 97) % W;
      const by = y + 30 + i * 22;
      const r = 12 + (t.seed % 10);
      ctx.fillStyle = `hsla(${t.hue + i * 20},65%,35%,0.25)`;
      ctx.beginPath();
      ctx.ellipse(bx, by, r, r * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawPlayer() {
  if (!player) return;
  const { x, y } = player;
  const blink = player.invuln > 0 && ((player.invuln * 10) | 0) % 2 === 0;
  if (blink) ctx.globalAlpha = 0.45;

  ctx.save();
  ctx.translate(x, y);

  // engine glow
  ctx.fillStyle = 'rgba(56,189,248,0.55)';
  ctx.beginPath();
  ctx.moveTo(-6, 14); ctx.lineTo(0, 28); ctx.lineTo(6, 14);
  ctx.fill();

  // wings
  ctx.fillStyle = '#38bdf8';
  ctx.strokeStyle = '#0ea5e9';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -24);
  ctx.lineTo(18, 8);
  ctx.lineTo(8, 12);
  ctx.lineTo(0, 4);
  ctx.lineTo(-8, 12);
  ctx.lineTo(-18, 8);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // body
  ctx.fillStyle = '#e0f2fe';
  ctx.fillRect(-4, -8, 8, 20);
  ctx.fillStyle = '#0284c7';
  ctx.fillRect(-2, -16, 4, 10);

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  const pulse = 1 + Math.sin(e.t * 6) * 0.06;
  ctx.scale(pulse, pulse);
  if (e.type === 'pod') {
    ctx.fillStyle = `hsl(${e.hue + 30},75%,45%)`;
    ctx.beginPath();
    ctx.ellipse(0, 0, e.r, e.r * 0.75, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `hsl(${e.hue},90%,65%)`;
    ctx.beginPath();
    ctx.arc(0, -4, 6, 0, Math.PI * 2);
    ctx.fill();
  } else if (e.type === 'turret') {
    ctx.fillStyle = '#7c3aed';
    ctx.fillRect(-e.r * 0.6, -e.r * 0.4, e.r * 1.2, e.r * 0.9);
    ctx.fillStyle = '#f472b6';
    ctx.beginPath();
    ctx.arc(0, 0, e.r * 0.45, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1e1b4b';
    ctx.fillRect(-3, -e.r, 6, e.r);
  } else if (e.type === 'serpent') {
    ctx.strokeStyle = `hsl(${e.hue + 200},70%,55%)`;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, 0, e.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#4ade80';
    ctx.beginPath();
    ctx.arc(4, -2, 3, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillStyle = `hsl(${e.hue + 10},80%,55%)`;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = i / 6 * Math.PI * 2;
      const px = Math.cos(a) * e.r;
      const py = Math.sin(a) * e.r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawBoss() {
  if (!boss) return;
  const b = boss;
  ctx.save();
  for (let i = b.segs.length - 1; i >= 0; i--) {
    const s = b.segs[i];
    if (s.hp <= 0) continue;
    const sx = b.x + Math.sin(b.t * 2.2 + i * 0.55) * (40 + i * 8);
    const sy = b.y + s.off;
    const r = 16 + (i === 0 ? 6 : 0);
    const grd = ctx.createRadialGradient(sx, sy, 2, sx, sy, r);
    grd.addColorStop(0, i === 0 ? '#f0abfc' : '#c084fc');
    grd.addColorStop(1, '#581c87');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fill();
    if (i === 0) {
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(sx - 6, sy - 4, 4, 0, Math.PI * 2);
      ctx.arc(sx + 6, sy - 4, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

function drawBullets() {
  for (const b of bullets) {
    ctx.fillStyle = `hsl(${b.hue},90%,65%)`;
    ctx.beginPath();
    if (b.trail) {
      ctx.ellipse(b.x, b.y, b.r, b.r * 1.8, 0, 0, Math.PI * 2);
    } else {
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    }
    ctx.fill();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(b.x, b.y - 3, b.r * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.fillStyle = '#fb7185';
  for (const b of eBullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = '#fecdd3';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawPowerups() {
  for (const p of powerups) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.t * 2);
    ctx.fillStyle = 'rgba(15,23,42,0.85)';
    ctx.strokeStyle = p.kind === 'S' ? '#60a5fa' : p.kind === 'M' ? '#f472b6' : '#34d399';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(-14, -14, 28, 28, 6);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = ctx.strokeStyle;
    ctx.font = 'bold 14px system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.kind, 0, 1);
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = clamp(p.life * 2, 0, 1);
    ctx.fillStyle = p.col;
    ctx.fillRect(p.x - p.sz * 0.5, p.y - p.sz * 0.5, p.sz, p.sz);
  }
  ctx.globalAlpha = 1;
}

function drawFloats() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 15px system-ui,sans-serif';
  for (const f of floats) {
    ctx.globalAlpha = clamp(f.life, 0, 1);
    ctx.fillStyle = f.col;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

function drawBossAlert() {
  if (bossAlert <= 0) return;
  ctx.save();
  ctx.globalAlpha = 0.35 + Math.sin(bossAlert * 8) * 0.15;
  ctx.fillStyle = '#ef4444';
  ctx.fillRect(0, 0, W, 6);
  ctx.fillRect(0, H - 6, W, 6);
  ctx.restore();
}

function drawFlash() {
  if (flashT <= 0) return;
  ctx.fillStyle = `rgba(255,255,255,${flashT * 2.5})`;
  ctx.fillRect(0, 0, W, H);
}

function render() {
  beginDraw();
  let ox = 0, oy = 0;
  if (shakeT > 0) {
    ox = (Math.random() - 0.5) * 8;
    oy = (Math.random() - 0.5) * 8;
  }
  ctx.save();
  ctx.translate(ox, oy);

  drawTunnel();
  drawPowerups();
  for (const e of enemies) drawEnemy(e);
  drawBoss();
  drawBullets();
  drawPlayer();
  drawParticles();
  drawFloats();
  drawBossAlert();
  drawFlash();

  ctx.restore();
}

/* ========== Loop ========== */
function loop(t) {
  const dt = Math.min(0.033, (t - lastT) / 1000 || 0);
  lastT = t;
  if (mode === 'play') update(dt);
  render();
  requestAnimationFrame(loop);
}

/* ========== Input ========== */
function setKey(e, down) {
  const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
  keys[k] = down;
  if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
}
window.addEventListener('keydown', e => setKey(e, true));
window.addEventListener('keyup', e => setKey(e, false));

let padId = null, padCx = 0, padCy = 0, padR = 50;
function padPos(e) {
  const r = el.pad.getBoundingClientRect();
  padCx = r.left + r.width * 0.5;
  padCy = r.top + r.height * 0.5;
  padR = r.width * 0.38;
}
function moveStick(nx, ny) {
  touchMove.x = nx;
  touchMove.y = ny;
  el.stick.style.transform = `translate(${nx * padR}px,${ny * padR}px)`;
}
function resetStick() {
  touchMove.x = 0;
  touchMove.y = 0;
  el.stick.style.transform = 'translate(0,0)';
}
el.pad.addEventListener('pointerdown', e => {
  padId = e.pointerId;
  padPos(e);
  el.pad.setPointerCapture(e.pointerId);
  const dx = (e.clientX - padCx) / padR;
  const dy = (e.clientY - padCy) / padR;
  const l = Math.hypot(dx, dy) || 1;
  const s = Math.min(1, l);
  moveStick((dx / l) * s, (dy / l) * s);
  e.preventDefault();
});
el.pad.addEventListener('pointermove', e => {
  if (e.pointerId !== padId) return;
  const dx = (e.clientX - padCx) / padR;
  const dy = (e.clientY - padCy) / padR;
  const l = Math.hypot(dx, dy) || 1;
  const s = Math.min(1, l);
  moveStick((dx / l) * s, (dy / l) * s);
  e.preventDefault();
});
function endPad(e) {
  if (e.pointerId !== padId) return;
  padId = null;
  resetStick();
}
el.pad.addEventListener('pointerup', endPad);
el.pad.addEventListener('pointercancel', endPad);

el.btnFire.addEventListener('pointerdown', e => { fireHeld = true; e.preventDefault(); ensureAudio(); });
el.btnFire.addEventListener('pointerup', () => { fireHeld = false; });
el.btnFire.addEventListener('pointerleave', () => { fireHeld = false; });

function startGame(continued) {
  ensureAudio();
  sfx('start');
  mode = 'play';
  el.panelMenu.classList.add('hidden');
  el.panelOver.classList.add('hidden');
  resetGame(continued);
  if (continued && savedRun) {
    savedRun = null;
    saveMeta(null);
    el.btnContinue.disabled = true;
  }
}

el.btnStart.addEventListener('click', () => startGame(false));
el.btnContinue.addEventListener('click', () => startGame(true));
el.btnRetry.addEventListener('click', () => startGame(false));
el.btnMenu.addEventListener('click', () => {
  mode = 'menu';
  el.panelOver.classList.add('hidden');
  el.panelMenu.classList.remove('hidden');
  try {
    const saved = JSON.parse(localStorage.getItem(SAVE) || '{}');
    el.btnContinue.disabled = !(saved.run && saved.run.player);
  } catch (e) { el.btnContinue.disabled = true; }
});

resize();
initStars();
initTunnel();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
