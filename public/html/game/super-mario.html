<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Mario - Tool Basecamp</title>
  <meta name="description" content="Classic platformer — jump, collect coins, stomp enemies. Runs locally.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/game/games-common.css?v=1" />
  <link rel="stylesheet" href="../../css/game/casual-more.css?v=1" />
  <style>
    .mario-controls { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:12px; user-select:none; -webkit-user-select:none; }
    .mario-controls button { width:60px; height:60px; font-size:22px; border-radius:14px; border:2px solid #ccc; background:#fff; cursor:pointer; touch-action:manipulation; display:flex; align-items:center; justify-content:center; }
    .mario-controls button:active { background:#e5e7eb; transform:scale(0.92); }
    .ctrl-row { display:flex; gap:10px; align-items:center; }
    .ctrl-spacer { width:70px; }
  </style>
</head>
<body>
  <div class="container"><aside class="sidebar"></aside><main class="content">
    <div class="tool-header"><h1 data-i18n="tools.superMario.title">Super Mario</h1><p data-i18n="tools.superMario.desc">Jump, collect coins, stomp enemies in this classic platformer. Runs locally.</p></div>
    <div class="tool-card game-card">
      <div class="game-toolbar">
        <div class="game-stats">
          <span><span data-i18n="tools.game.score">Score</span>: <strong id="score">0</strong></span>
          <span><span data-i18n="tools.superMario.coins">Coins</span>: <strong id="coins">0</strong></span>
          <span><span data-i18n="tools.superMario.lives">Lives</span>: <strong id="lives">3</strong></span>
          <span><span data-i18n="tools.superMario.level">Level</span>: <strong id="level">1</strong></span>
        </div>
        <div class="action-row">
          <button type="button" class="tb-btn" id="restart-btn" data-i18n="tools.game.restart">New game</button>
        </div>
      </div>
      <div class="game-status is-idle" id="status" data-i18n="tools.superMario.hint">Arrow keys / WASD to move, Space / ↑ to jump. Stomp enemies from above!</div>
      <div class="game-board-wrap"><canvas id="canvas" class="game-emoji-canvas" width="480" height="320"></canvas></div>
      <div class="mario-controls" id="touch-controls">
        <div class="ctrl-row">
          <button id="btn-left" title="Left">◀</button>
          <button id="btn-right" title="Right">▶</button>
          <div class="ctrl-spacer"></div>
          <button id="btn-jump" title="Jump" style="background:#2563eb;color:#fff;border-color:#2563eb;font-size:26px;">▲</button>
        </div>
      </div>
    </div>
  </main></div>
  <script src="../../js/locales/en.js"></script><script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script><script src="../../js/config.js"></script><script src="../../js/base.js"></script>
  <script src="../../js/game/super-mario.js?v=1"></script>
</body></html>
