<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Card Score - Tool Basecamp</title>
  <meta name="description" content="Offline card game scorekeeper for multiple players. Data saved locally in your browser.">
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css" />
  <link rel="stylesheet" href="../../css/life/card-score.css?v=4" />
</head>
<body class="card-score-page">
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.cardScore.title">Card Score</h1>
        <p data-i18n="tools.cardScore.desc">Track scores for card games. All data stays on this device.</p>
      </div>

      <div class="tool-card card-score-view is-active" id="list-view">
        <p class="card-score-list-desc" data-i18n="tools.cardScore.desc">Track scores for card games. All data stays on this device.</p>
        <div class="card-score-actions">
          <button type="button" class="tb-btn w-full" id="new-game-btn" data-i18n="tools.cardScore.newGame">New game</button>
          <button type="button" class="tb-btn w-full" id="continue-btn" data-i18n="tools.cardScore.continueGame">Continue saved game</button>
        </div>
        <p class="card-score-note" data-i18n="tools.cardScore.privacyNote">Scores are stored locally in your browser only.</p>
      </div>

      <div class="tool-card card-score-board-wrap card-score-view" id="board-view" hidden>
        <div class="card-score-scroll" id="grid-scroll">
          <div class="card-score-grid" id="score-grid"></div>
        </div>
        <button type="button" class="tb-btn card-score-add-btn" id="add-player-btn" data-i18n="tools.cardScore.addPlayer">Add player</button>
      </div>

      <div class="card-score-keyboard" id="keyboard" aria-hidden="true">
        <div class="card-score-keyboard-panel">
          <div class="card-score-keyboard-header">
            <span id="keyboard-display" data-i18n="tools.cardScore.keyboardPlaceholder">Enter score</span>
            <button type="button" class="card-score-keyboard-close" id="keyboard-close" aria-label="Close">&times;</button>
          </div>
          <div class="card-score-key-row">
            <button type="button" class="card-score-key" data-key="1">1</button>
            <button type="button" class="card-score-key" data-key="2">2</button>
            <button type="button" class="card-score-key" data-key="3">3</button>
          </div>
          <div class="card-score-key-row">
            <button type="button" class="card-score-key" data-key="4">4</button>
            <button type="button" class="card-score-key" data-key="5">5</button>
            <button type="button" class="card-score-key" data-key="6">6</button>
          </div>
          <div class="card-score-key-row">
            <button type="button" class="card-score-key" data-key="7">7</button>
            <button type="button" class="card-score-key" data-key="8">8</button>
            <button type="button" class="card-score-key" data-key="9">9</button>
          </div>
          <div class="card-score-key-row">
            <button type="button" class="card-score-key" data-key="-">-</button>
            <button type="button" class="card-score-key" data-key="0">0</button>
            <button type="button" class="card-score-key card-score-key-delete" data-key="delete" data-i18n="tools.cardScore.backspace">Del</button>
          </div>
          <div class="card-score-key-row">
            <button type="button" class="card-score-key card-score-key-nav" data-key="prev" data-i18n="tools.cardScore.prevCell">Prev</button>
            <button type="button" class="card-score-key card-score-key-nav" data-key="next" data-i18n="tools.cardScore.nextCell">Next</button>
          </div>
        </div>
      </div>

      <div class="recipe-toast" id="toast" role="status" aria-live="polite"></div>
    </main>
  </div>

  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/life/card-score.js?v=4"></script>
</body>
</html>
