<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Apply Week - Tool Basecamp</title>
  <meta name="description" content="Weekly apply rhythm, resume tweaks, and follow-ups. Requires sign-in.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/media/image-tools.css?v=13" />
  <link rel="stylesheet" href="../../css/life/life-plans.css?v=1" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.jobApplyWeekPlan.title">Job Apply Week</h1>
        <p data-i18n="tools.jobApplyWeekPlan.desc">Weekly apply rhythm, resume tweaks, and follow-ups. Requires sign-in.</p>
      </div>
      <div class="tool-card img-cloud-gate" id="login-gate" hidden>
        <p data-i18n="tools.imageCloud.loginRequired">Please sign in.</p>
        <div class="action-row" style="justify-content:center">
          <a class="tb-btn" id="login-link" href="../auth/login.html" data-i18n="auth.login">Log in</a>
        </div>
      </div>
      <div id="app" hidden>
        <div class="tool-card">
          <p class="img-cloud-quota" id="quota-line"></p>
          <form id="plan-form" class="life-plan-form">
            <div class="field-row">
              <label class="field-label" for="role" data-i18n="tools.jobApplyWeekPlan.role">Target role</label>
              <input id="role" name="role" type="text" required data-i18n-placeholder="tools.jobApplyWeekPlan.rolePh" placeholder="Frontend / operations…" />
            </div>
            <div class="field-row">
              <label class="field-label" for="background" data-i18n="tools.jobApplyWeekPlan.background">Background</label>
              <textarea id="background" name="background" rows="3" required data-i18n-placeholder="tools.jobApplyWeekPlan.backgroundPh" placeholder="Years, stack, highlights…"></textarea>
            </div>
            <div class="field-row">
              <label class="field-label" for="hours" data-i18n="tools.jobApplyWeekPlan.hours">Hours available / day (optional)</label>
              <input id="hours" name="hours" type="number" min="1" max="8" value="2" />
            </div>
            <div class="field-row">
              <label class="field-label" for="channels" data-i18n="tools.jobApplyWeekPlan.channels">Channels (optional)</label>
              <input id="channels" name="channels" type="text" data-i18n-placeholder="tools.jobApplyWeekPlan.channelsPh" placeholder="Boss, LinkedIn, referrals…" />
            </div>
            <div class="field-row">
              <label class="field-label" for="notes" data-i18n="tools.jobApplyWeekPlan.notes">Notes (optional)</label>
              <input id="notes" name="notes" type="text" data-i18n-placeholder="tools.jobApplyWeekPlan.notesPh" placeholder="Need remote, city…" />
            </div>
            <div class="action-row">
              <button type="submit" class="tb-btn" id="run-btn" data-i18n="tools.lifePlans.generate">Generate</button>
              <button type="button" class="tb-btn" id="clear-btn" data-i18n="tools.lifePlans.clear">Clear</button>
              <button type="button" class="tb-btn" id="copy-btn" data-i18n="tools.lifePlans.copy">Copy</button>
              <button type="button" class="tb-btn" id="download-btn" data-i18n="tools.lifePlans.download">Download</button>
            </div>
          </form>
          <div class="life-plan-busy" id="busy" hidden>
            <span class="img-cloud-spinner" aria-hidden="true"></span>
            <span data-i18n="tools.imageCloud.processing">Processing...</span>
          </div>
          <div class="error-box" id="error-box" role="alert"></div>
        </div>
        <div class="tool-card life-plan-result" id="result-card" hidden>
          <div id="result-mount"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="../../js/locales/en.js?v=lp-guest1"></script>
  <script src="../../js/locales/zh-CN.js?v=lp-guest1"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/media/image-cloud-client.js?v=8"></script>
  <script src="../../js/life/life-plans.js?v=6"></script>
  <script>TBLifePlans.initPlanPage({ kind: 'job_apply_week' });</script>
</body>
</html>
