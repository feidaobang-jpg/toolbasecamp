<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Weekend - Tool Basecamp</title>
  <meta name="description" content="Weekend plan with kids. Requires sign-in.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/media/image-tools.css?v=13" />
  <link rel="stylesheet" href="../../css/life/life-plans.css?v=1" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.kidsWeekendPlan.title">Kids Weekend</h1>
        <p data-i18n="tools.kidsWeekendPlan.desc">Weekend plan with kids. Requires sign-in.</p>
      </div>
      <div class="tool-card img-cloud-gate" id="login-gate" hidden>
        <p data-i18n="tools.imageCloud.loginRequired">Please sign in.</p>
        <div class="action-row" style="justify-content:center">
          <a class="tb-btn" id="login-link" href="../auth/login.html" data-i18n="auth.login">Log in</a>
        </div>
      </div>
      <div id="app" hidden>
        <div class="tool-card">
          <p class="img-cloud-quota" id="quota-line"></p>
          <form id="plan-form" class="life-plan-form">
            <div class="field-row">
              <label class="field-label" for="ages" data-i18n="tools.kidsWeekendPlan.ages">Kids ages</label>
              <input id="ages" name="ages" type="text" required data-i18n-placeholder="tools.kidsWeekendPlan.agesPh" placeholder="e.g. 3 and 7" />
            </div>
            <div class="field-row">
              <label class="field-label" for="city" data-i18n="tools.kidsWeekendPlan.city">City / area</label>
              <input id="city" name="city" type="text" required data-i18n-placeholder="tools.kidsWeekendPlan.cityPh" placeholder="e.g. Hangzhou" />
            </div>
            <div class="field-row">
              <label class="field-label" for="energy" data-i18n="tools.kidsWeekendPlan.energy">Energy preference (optional)</label>
              <input id="energy" name="energy" type="text" data-i18n-placeholder="tools.kidsWeekendPlan.energyPh" placeholder="More outdoors…" />
            </div>
            <div class="field-row">
              <label class="field-label" for="budget" data-i18n="tools.kidsWeekendPlan.budget">Budget (optional)</label>
              <input id="budget" name="budget" type="text" data-i18n-placeholder="tools.kidsWeekendPlan.budgetPh" placeholder="e.g. ¥100 per person" />
            </div>
            <div class="field-row">
              <label class="field-label" for="notes" data-i18n="tools.kidsWeekendPlan.notes">Notes (optional)</label>
              <input id="notes" name="notes" type="text" data-i18n-placeholder="tools.kidsWeekendPlan.notesPh" placeholder="Rain backup…" />
            </div>
            <div class="action-row">
              <button type="submit" class="tb-btn" id="run-btn" data-i18n="tools.lifePlans.generate">Generate</button>
              <button type="button" class="tb-btn" id="clear-btn" data-i18n="tools.lifePlans.clear">Clear</button>
              <button type="button" class="tb-btn" id="copy-btn" data-i18n="tools.lifePlans.copy">Copy</button>
              <button type="button" class="tb-btn" id="download-btn" data-i18n="tools.lifePlans.download">Download</button>
            </div>
          </form>
          <div class="life-plan-busy" id="busy" hidden>
            <span class="img-cloud-spinner" aria-hidden="true"></span>
            <span data-i18n="tools.imageCloud.processing">Processing...</span>
          </div>
          <div class="error-box" id="error-box" role="alert"></div>
        </div>
        <div class="tool-card life-plan-result" id="result-card" hidden>
          <div id="result-mount"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="../../js/locales/en.js?v=lp-batch2"></script>
  <script src="../../js/locales/zh-CN.js?v=lp-batch2"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/media/image-cloud-client.js?v=8"></script>
  <script src="../../js/life/life-plans.js?v=5"></script>
  <script>TBLifePlans.initPlanPage({ kind: 'kids_weekend' });</script>
</body>
</html>
