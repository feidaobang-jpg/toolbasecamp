<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seasonal Food Plan - Tool Basecamp</title>
  <meta name="description" content="Weekly produce / meat plan by season. Requires sign-in.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/media/image-tools.css?v=13" />
  <link rel="stylesheet" href="../../css/life/life-plans.css?v=1" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.seasonalFoodPlan.title">Seasonal Food Plan</h1>
        <p data-i18n="tools.seasonalFoodPlan.desc">Weekly veggies, fruit or meat ideas for the current season. Requires sign-in.</p>
      </div>
      <div class="tool-card img-cloud-gate" id="login-gate" hidden>
        <p data-i18n="tools.imageCloud.loginRequired">Please sign in.</p>
        <div class="action-row" style="justify-content:center">
          <a class="tb-btn" id="login-link" href="../auth/login.html" data-i18n="auth.login">Log in</a>
        </div>
      </div>
      <div id="app" hidden>
        <div class="tool-card">
          <p class="img-cloud-quota" id="quota-line"></p>
          <form id="plan-form" class="life-plan-form">
            <div class="field-row">
              <label class="field-label" for="season" data-i18n="tools.seasonalFoodPlan.season">Season</label>
              <select id="season" name="season">
                <option value="" data-i18n="tools.seasonalFoodPlan.seasonAuto">Auto (current)</option>
                <option value="spring" data-i18n="tools.seasonalFoodPlan.spring">Spring</option>
                <option value="summer" data-i18n="tools.seasonalFoodPlan.summer">Summer</option>
                <option value="autumn" data-i18n="tools.seasonalFoodPlan.autumn">Autumn</option>
                <option value="winter" data-i18n="tools.seasonalFoodPlan.winter">Winter</option>
              </select>
            </div>
            <div class="field-row">
              <label class="field-label" for="region" data-i18n="tools.seasonalFoodPlan.region">Region (optional)</label>
              <input id="region" name="region" type="text" data-i18n-placeholder="tools.seasonalFoodPlan.regionPh" placeholder="e.g. East China" />
            </div>
            <div class="field-row">
              <label class="field-label" for="focus" data-i18n="tools.seasonalFoodPlan.focus">Focus</label>
              <select id="focus" name="focus">
                <option value="all" data-i18n="tools.seasonalFoodPlan.focusAll">All</option>
                <option value="vegetables" data-i18n="tools.seasonalFoodPlan.focusVeg">Vegetables</option>
                <option value="fruit" data-i18n="tools.seasonalFoodPlan.focusFruit">Fruit</option>
                <option value="meat" data-i18n="tools.seasonalFoodPlan.focusMeat">Meat</option>
              </select>
            </div>
            <div class="action-row">
              <button type="submit" class="tb-btn" id="run-btn" data-i18n="tools.lifePlans.generate">Generate</button>
              <button type="button" class="tb-btn" id="clear-btn" data-i18n="tools.lifePlans.clear">Clear</button>
              <button type="button" class="tb-btn" id="copy-btn" data-i18n="tools.lifePlans.copy">Copy</button>
              <button type="button" class="tb-btn" id="download-btn" data-i18n="tools.lifePlans.download">Download</button>
            </div>
          </form>
          <div class="life-plan-busy" id="busy" hidden>
            <span class="img-cloud-spinner" aria-hidden="true"></span>
            <span data-i18n="tools.imageCloud.processing">Processing...</span>
          </div>
          <div class="error-box" id="error-box" role="alert"></div>
        </div>
        <div class="tool-card life-plan-result" id="result-card" hidden>
          <div id="result-mount"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/media/image-cloud-client.js?v=8"></script>
  <script src="../../js/life/life-plans.js?v=3"></script>
  <script>TBLifePlans.initPlanPage({ kind: 'seasonal_food' });</script>
</body>
</html>
