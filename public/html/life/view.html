<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content - Tool Basecamp</title>
  <meta name="description" content="Content tools powered by TianAPI.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/life/life.css?v=1" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 id="life-title">Life</h1>
        <p id="life-desc" data-i18n="life.desc">Fetch a random piece or look up by keyword. Content from TianAPI.</p>
      </div>

      <div class="tool-card">
        <div id="life-input-wrap" class="life-input-wrap" hidden>
          <input type="text" id="life-input" class="life-input" autocomplete="off" />
        </div>
        <div class="action-row">
          <button type="button" class="tb-btn" id="life-run" data-i18n="life.query">Query</button>
          <button type="button" class="tb-btn" id="life-copy" data-i18n="life.copy" disabled>Copy</button>
        </div>
        <div class="life-busy" id="life-busy" hidden>
          <span class="life-spinner" aria-hidden="true"></span>
          <span data-i18n="life.loading">Loading…</span>
        </div>
        <div class="error-box" id="life-error" role="alert"></div>
        <div id="life-result" class="life-result"></div>
      </div>
    </main>
  </div>

  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/life/life-catalog.js?v=2"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/life/life-viewer.js?v=2"></script>
</body>
</html>
