<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weight Loss Plan - Tool Basecamp</title>
  <meta name="description" content="Generate a practical weight-loss plan from your stats. Requires sign-in.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/media/image-tools.css?v=13" />
  <link rel="stylesheet" href="../../css/life/life-plans.css?v=1" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.weightLossPlan.title">Weight Loss Plan</h1>
        <p data-i18n="tools.weightLossPlan.desc">Enter height, weight and goal — get a weekly outline. Not medical advice. Requires sign-in.</p>
      </div>
      <div class="tool-card img-cloud-gate" id="login-gate" hidden>
        <p data-i18n="tools.imageCloud.loginRequired">Please sign in.</p>
        <div class="action-row" style="justify-content:center">
          <a class="tb-btn" id="login-link" href="../auth/login.html" data-i18n="auth.login">Log in</a>
        </div>
      </div>
      <div id="app" hidden>
        <div class="tool-card">
          <p class="img-cloud-quota" id="quota-line"></p>
          <form id="plan-form" class="life-plan-form">
            <div class="field-row">
              <label class="field-label" for="height_cm" data-i18n="tools.weightLossPlan.height">Height (cm)</label>
              <input id="height_cm" name="height_cm" type="number" min="100" max="250" step="1" required />
            </div>
            <div class="field-row">
              <label class="field-label" for="weight_kg" data-i18n="tools.weightLossPlan.weight">Current weight (kg)</label>
              <input id="weight_kg" name="weight_kg" type="number" min="30" max="300" step="0.1" required />
            </div>
            <div class="field-row">
              <label class="field-label" for="target_kg" data-i18n="tools.weightLossPlan.target">Target weight (kg)</label>
              <input id="target_kg" name="target_kg" type="number" min="30" max="300" step="0.1" required />
            </div>
            <div class="field-row">
              <label class="field-label" for="weeks" data-i18n="tools.weightLossPlan.weeks">Weeks</label>
              <input id="weeks" name="weeks" type="number" min="2" max="52" value="8" required />
            </div>
            <div class="field-row">
              <label class="field-label" for="notes" data-i18n="tools.weightLossPlan.notes">Notes (optional)</label>
              <textarea id="notes" name="notes" rows="2" data-i18n-placeholder="tools.weightLossPlan.notesPh" placeholder="Diet preference, injuries…"></textarea>
            </div>
            <p class="life-plan-disclaimer" data-i18n="tools.weightLossPlan.disclaimer">Not medical advice. Consult a doctor before major diet or exercise changes.</p>
            <div class="action-row">
              <button type="submit" class="tb-btn" id="run-btn" data-i18n="tools.lifePlans.generate">Generate</button>
              <button type="button" class="tb-btn" id="clear-btn" data-i18n="tools.lifePlans.clear">Clear</button>
              <button type="button" class="tb-btn" id="copy-btn" data-i18n="tools.lifePlans.copy">Copy</button>
              <button type="button" class="tb-btn" id="download-btn" data-i18n="tools.lifePlans.download">Download</button>
            </div>
          </form>
          <div class="life-plan-busy" id="busy" hidden>
            <span class="img-cloud-spinner" aria-hidden="true"></span>
            <span data-i18n="tools.imageCloud.processing">Processing...</span>
          </div>
          <div class="error-box" id="error-box" role="alert"></div>
        </div>
        <div class="tool-card life-plan-result" id="result-card" hidden>
          <div id="result-mount"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/media/image-cloud-client.js?v=8"></script>
  <script src="../../js/life/life-plans.js?v=1"></script>
  <script>TBLifePlans.initPlanPage({ kind: 'weight_loss' });</script>
</body>
</html>
