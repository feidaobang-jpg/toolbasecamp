<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video to Images - Tool Basecamp</title>
  <meta name="description" content="Extract frames from video files in your browser. Preview, dedupe, and download as ZIP. No upload required.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/media/video-to-images.css" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.videoToImages.title">Video to Images</h1>
        <p data-i18n="tools.videoToImages.desc">Extract frames from video in your browser.</p>
      </div>

      <div class="tool-card media-tool-card">
        <div class="drop-zone" id="drop-zone">
          <div class="drop-icon">??</div>
          <div class="drop-title" data-i18n="tools.videoToImages.dropTitle">Drop a video here</div>
          <div class="drop-hint" data-i18n="tools.videoToImages.dropOr">or</div>
          <button type="button" class="tb-btn" id="browse-btn" data-i18n="tools.videoToImages.chooseVideo">Choose video</button>
          <input type="file" id="video-input" accept="video/*" hidden />
        </div>

        <div class="tip-box">
          <b data-i18n="tools.videoToImages.privacy">Privacy:</b> <span data-i18n="tools.videoToImages.privacyBody">Your video never leaves this device.</span>
        </div>

        <section class="media-section hidden" id="video-preview-section">
          <h3 class="section-title">Video preview</h3>
          <div class="video-container" id="video-container"></div>

          <h3 class="section-title">Extraction settings</h3>
          <div class="settings-row">
            <label>Frame interval (ms)
              <input type="number" id="frame-interval" value="100" min="100" step="50" />
            </label>
            <label>Clip length (s)
              <input type="range" id="extract-duration" min="1" max="10" value="3" step="0.5" />
              <span id="extract-duration-value">3s</span>
            </label>
            <label>Start at (s)
              <input type="range" id="start-time" min="0" max="100" value="0" step="0.1" />
              <span id="start-time-value">0s</span>
            </label>
          </div>

          <details class="advanced-block" id="watermark-removal-settings">
            <summary>Watermark / background (optional)</summary>
            <div class="settings-row">
              <span class="settings-label">Corner to clear</span>
              <div class="radio-group">
                <label><input type="radio" name="watermark-position" value="top-left" checked /> Top left</label>
                <label><input type="radio" name="watermark-position" value="top-right" /> Top right</label>
                <label><input type="radio" name="watermark-position" value="bottom-left" /> Bottom left</label>
                <label><input type="radio" name="watermark-position" value="bottom-right" /> Bottom right</label>
              </div>
              <label>Region size
                <input type="range" id="watermark-size" min="10" max="30" value="20" />
                <span id="watermark-size-value">20%</span>
              </label>
              <label>Background sensitivity
                <input type="range" id="watermark-threshold" min="10" max="50" value="25" />
                <span id="watermark-threshold-value">25</span>
              </label>
            </div>
          </details>

          <div class="action-row">
            <button type="button" class="tb-btn" id="extract-frames-btn" data-i18n="tools.videoToImages.extractFrames">Extract frames</button>
            <button type="button" class="tb-btn" id="remove-watermark-btn" data-i18n="tools.videoToImages.clearCorner">Clear corner + background</button>
            <button type="button" class="tb-btn" id="clear-btn" data-i18n="tools.videoToImages.clearAll">Clear all</button>
          </div>
        </section>

        <section class="media-section hidden" id="frames-preview-section">
          <h3 class="section-title">Extracted frames (<span id="frame-count">0</span>)</h3>
          <div class="frames-container" id="frames-container"></div>

          <h3 class="section-title">Similar frames</h3>
          <div class="settings-row">
            <label>Similarity threshold
              <input type="range" id="similarity-threshold" min="80" max="100" value="90" />
              <span id="threshold-value">90%</span>
            </label>
            <button type="button" class="tb-btn" id="keep-different-btn" data-i18n="tools.videoToImages.dedupe">Keep distinct frames only</button>
          </div>

          <div class="action-row">
            <button type="button" class="tb-btn" id="select-all-btn" data-i18n="tools.videoToImages.selectAll">Select all</button>
            <button type="button" class="tb-btn" id="preview-animation-btn" data-i18n="tools.videoToImages.animationPreview">Preview animation</button>
            <button type="button" class="tb-btn" id="save-selected-btn" data-i18n="tools.videoToImages.saveZip">Download selected (ZIP)</button>
          </div>
        </section>

        <section class="media-section hidden" id="animation-preview-section">
          <h3 class="section-title">Animation preview</h3>
          <div class="animation-container" id="animation-container"></div>
          <div class="animation-controls">
            <button type="button" class="tb-btn" id="play-pause-btn" data-i18n="tools.videoToImages.pause">Pause</button>
            <label>FPS: <span id="speed-value">5</span>
              <input type="range" id="speed-control" min="1" max="10" value="5" />
            </label>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/common_ui.js"></script>
  <script src="../../js/media/video-to-images.js"></script>
</body>
</html>
