<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watermark Removal - Tool Basecamp</title>
  <meta name="description" content="Mark watermark regions and clear them locally in your browser.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/media/image-tools.css?v=1" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.watermarkRemoval.title">Remove Watermark</h1>
        <p data-i18n="tools.watermarkRemoval.desc">Draw boxes over watermarks and clear them locally. No upload.</p>
      </div>

      <div class="tool-card">
        <div class="drop-zone" id="drop-zone">
          <div class="drop-icon">＋</div>
          <div class="drop-title" data-i18n="tools.watermarkRemoval.dropTitle">Click or drop an image</div>
          <div class="drop-hint" data-i18n="tools.watermarkRemoval.dropHint">Then drag on the image to mark regions</div>
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none" />

        <div class="img-wm-canvas-wrap" id="canvas-wrap" hidden>
          <canvas id="wm-canvas"></canvas>
        </div>

        <div class="tip-box">
          <b data-i18n="tools.watermarkRemoval.tip">Tip:</b>
          <span data-i18n="tools.watermarkRemoval.tipBody">Drag to draw boxes. Clear fills the region (best for solid watermark stamps). Complex logos may need AI tools later.</span>
        </div>

        <div class="action-row">
          <button type="button" class="tb-btn" id="process-btn" disabled data-i18n="tools.watermarkRemoval.process">Remove watermark</button>
          <button type="button" class="tb-btn" id="undo-btn" disabled data-i18n="tools.watermarkRemoval.undo">Delete box</button>
          <button type="button" class="tb-btn" id="download-btn" disabled data-i18n="tools.watermarkRemoval.download">Download</button>
          <button type="button" class="tb-btn" id="clear-btn" data-i18n="tools.watermarkRemoval.clear">Clear</button>
        </div>
        <div class="error-box" id="error-box" role="alert"></div>
      </div>
    </main>
  </div>

  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/media/watermark-removal.js?v=1"></script>
</body>
</html>
