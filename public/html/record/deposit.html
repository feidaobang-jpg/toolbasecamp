<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deposits - Tool Basecamp</title>
  <meta name="description" content="Track personal deposit balances and transactions. Requires sign-in.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/record/records-common.css?v=4" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.deposit.title">Deposits</h1>
        <p data-i18n="tools.deposit.desc">Track balances and deposit/withdraw history per person. Requires sign-in.</p>
      </div>

      <div class="tool-card rec-gate" id="login-gate" hidden>
        <p data-i18n="tools.records.loginRequired">Please sign in to use this tool. Your data is saved to your account.</p>
        <div class="action-row" style="justify-content:center">
          <a class="tb-btn" id="login-link" href="../auth/login.html" data-i18n="auth.login">Log in</a>
        </div>
      </div>

      <div id="app" hidden>
        <div class="tool-card" id="list-view">
          <p class="rec-note" data-i18n="tools.records.cloudNote">Data is stored on the server for your signed-in account only.</p>
          <div class="rec-toolbar">
            <button type="button" class="tb-btn" id="add-btn" data-i18n="tools.deposit.add">Add person</button>
            <button type="button" class="tb-btn" id="refresh-btn" data-i18n="tools.records.refresh">Refresh</button>
          </div>
          <div class="rec-field" id="add-form" hidden>
            <label class="field-label" for="name-input" data-i18n="tools.deposit.nameLabel">Name</label>
            <input type="text" id="name-input" class="rec-input" maxlength="80" autocomplete="off" />
            <div class="action-row" style="margin-top:12px">
              <button type="button" class="tb-btn" id="create-btn" data-i18n="tools.records.save">Save</button>
              <button type="button" class="tb-btn" id="cancel-add-btn" data-i18n="tools.records.cancel">Cancel</button>
            </div>
          </div>
          <div class="error-box" id="error-box" role="alert"></div>
          <div class="rec-list" id="list"></div>
          <p class="rec-empty" id="empty" hidden data-i18n="tools.deposit.empty">No deposit records yet.</p>
        </div>

        <div class="tool-card" id="detail-view" hidden>
          <div class="rec-toolbar">
            <button type="button" class="tb-btn" id="back-btn" data-i18n="tools.records.back">Back</button>
            <button type="button" class="tb-btn" id="delete-btn" data-i18n="tools.records.delete">Delete</button>
          </div>
          <h2 class="rec-section-title" id="detail-name"></h2>
          <p class="rec-item-meta" id="detail-balance"></p>

          <div class="rec-chip-row" style="margin-top:16px">
            <button type="button" class="rec-chip is-active" data-type="deposit" id="type-deposit" data-i18n="tools.deposit.deposit">Deposit</button>
            <button type="button" class="rec-chip" data-type="withdraw" id="type-withdraw" data-i18n="tools.deposit.withdraw">Withdraw</button>
          </div>
          <div class="rec-field">
            <label class="field-label" for="amount-input" data-i18n="tools.deposit.amountLabel">Amount</label>
            <input type="text" inputmode="decimal" id="amount-input" class="rec-input" autocomplete="off" />
          </div>
          <div class="action-row">
            <button type="button" class="tb-btn" id="submit-txn-btn" data-i18n="tools.deposit.submit">Submit</button>
          </div>
          <div class="error-box" id="detail-error" role="alert"></div>

          <h3 class="rec-section-title" style="margin-top:20px" data-i18n="tools.deposit.history">History</h3>
          <div class="rec-txn-list" id="txn-list"></div>
          <p class="rec-empty" id="txn-empty" hidden data-i18n="tools.deposit.noHistory">No transactions yet.</p>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js"></script>
  <script src="../../js/record/records-client.js?v=1"></script>
  <script src="../../js/record/deposit.js?v=1"></script>
</body>
</html>
