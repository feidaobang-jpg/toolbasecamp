<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Task List - Tool Basecamp</title>
  <meta name="description" content="Typed task checklists with open and done. Requires sign-in.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/record/records-common.css?v=4" />
  <link rel="stylesheet" href="../../css/record/todo-list.css?v=3" />
  <link rel="stylesheet" href="../../css/record/task-list.css?v=1" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.taskList.title">Task List</h1>
        <p data-i18n="tools.taskList.desc">Typed checklists with open / done only. Requires sign-in.</p>
      </div>

      <div class="tool-card rec-gate" id="login-gate" hidden>
        <p data-i18n="tools.records.loginRequired">Please sign in to use this tool. Your data is saved to your account.</p>
        <div class="action-row" style="justify-content:center">
          <a class="tb-btn" id="login-link" href="../auth/login.html" data-i18n="auth.login">Log in</a>
        </div>
      </div>

      <div id="app" hidden>
        <div class="tool-card">
          <p class="rec-note" data-i18n="tools.records.cloudNote">Data is stored on the server for your signed-in account only.</p>

          <form class="todo-add-row task-add-row" id="add-form" autocomplete="off">
            <label class="task-type-label" for="category-select" data-i18n="tools.taskList.type">Type</label>
            <select id="category-select" class="rec-input task-type-select" aria-label="Type"></select>
            <input type="text" id="task-input" class="rec-input todo-input" maxlength="200" data-i18n-placeholder="tools.taskList.placeholder" placeholder="Add an item…" />
            <button type="submit" class="tb-btn" data-i18n="tools.taskList.add">Add</button>
            <button type="button" class="tb-btn" id="refresh-btn" data-i18n="tools.records.refresh">Refresh</button>
          </form>

          <div class="rec-chip-row" id="category-filter-row" role="tablist" aria-label="Category"></div>
          <div class="rec-chip-row" id="status-filter-row" role="tablist">
            <button type="button" class="rec-chip is-active" data-status="all" data-i18n="tools.taskList.filterStatusAll">All</button>
            <button type="button" class="rec-chip" data-status="pending" data-i18n="tools.taskList.filterPending">Open</button>
            <button type="button" class="rec-chip" data-status="done" data-i18n="tools.taskList.filterDone">Done</button>
          </div>

          <p class="todo-stats" id="stats"></p>
          <div class="error-box" id="error-box" role="alert"></div>
          <div class="todo-list" id="list"></div>
          <p class="rec-empty" id="empty" hidden data-i18n="tools.taskList.empty">No items yet.</p>

          <div class="action-row todo-footer" id="footer-actions" hidden>
            <button type="button" class="tb-btn" id="clear-done-btn" data-i18n="tools.taskList.clearDone">Clear completed</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js?v=6"></script>
  <script src="../../js/record/records-client.js?v=4"></script>
  <script src="../../js/record/task-list.js?v=1"></script>
</body>
</html>
