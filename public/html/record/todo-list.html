<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>To-Do (Task List) - Tool Basecamp</title>
  <meta name="description" content="To-do / task list with open and done. Requires sign-in; data synced to your account.">
  <link rel="stylesheet" href="../../css/base.css?v=5" />
  <link rel="stylesheet" href="../../css/docs/docs-common.css?v=7" />
  <link rel="stylesheet" href="../../css/record/records-common.css?v=4" />
  <link rel="stylesheet" href="../../css/record/todo-list.css?v=6" />
</head>
<body>
  <div class="container">
    <aside class="sidebar"></aside>
    <main class="content">
      <div class="tool-header">
        <h1 data-i18n="tools.todoList.title">To-Do (Task List)</h1>
        <p data-i18n="tools.todoList.desc">Add and check off tasks. Open or done only. Requires sign-in.</p>
      </div>

      <div class="tool-card rec-gate" id="login-gate" hidden>
        <p data-i18n="tools.records.loginRequired">Please sign in to use this tool. Your data is saved to your account.</p>
        <div class="action-row" style="justify-content:center">
          <a class="tb-btn" id="login-link" href="../auth/login.html" data-i18n="auth.login">Log in</a>
        </div>
      </div>

      <div id="app" hidden>
        <div class="tool-card">
          <p class="rec-note" data-i18n="tools.records.cloudNote">Data is stored on the server for your signed-in account only.</p>

          <form class="todo-add-row" id="add-form" autocomplete="off">
            <input type="text" id="todo-input" class="rec-input todo-input" maxlength="200" data-i18n-placeholder="tools.todoList.placeholder" placeholder="What needs to be done?" />
            <button type="submit" class="tb-btn" data-i18n="tools.todoList.add">Add</button>
            <button type="button" class="tb-btn" id="refresh-btn" data-i18n="tools.records.refresh">Refresh</button>
          </form>

          <div class="rec-chip-row" id="filter-row" role="tablist">
            <button type="button" class="rec-chip is-active" data-filter="all" data-i18n="tools.todoList.filterAll">All</button>
            <button type="button" class="rec-chip" data-filter="pending" data-i18n="tools.todoList.filterPending">Open</button>
            <button type="button" class="rec-chip" data-filter="done" data-i18n="tools.todoList.filterDone">Done</button>
          </div>

          <p class="todo-stats" id="stats"></p>

          <div class="error-box" id="error-box" role="alert"></div>
          <div class="todo-list" id="list"></div>
          <p class="rec-empty" id="empty" hidden data-i18n="tools.todoList.empty">No tasks yet. Add one above.</p>

          <div class="action-row todo-footer" id="footer-actions" hidden>
            <button type="button" class="tb-btn" id="clear-done-btn" data-i18n="tools.todoList.clearDone">Clear completed</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/locales/en.js"></script>
  <script src="../../js/locales/zh-CN.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/base.js?v=6"></script>
  <script src="../../js/record/records-client.js?v=3"></script>
  <script src="../../js/record/todo-list.js?v=6"></script>
</body>
</html>
