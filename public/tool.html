<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools - Tool Basecamp</title>
    <meta name="description" content="Document conversion and developer tools — PDF to Word, Word to PDF, Images to PDF, JSON to Java.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/site-mobile-nav.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#2563eb' } } } };
    </script>
</head>
<body id="top" class="bg-gray-50 text-gray-800 h-screen flex flex-col overflow-hidden">
    <header class="bg-white border-b border-gray-100 flex-shrink-0 z-40 relative">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center gap-3 md:gap-8 min-w-0">
            <a href="index.html" class="flex items-center gap-2 flex-shrink-0 min-w-0 max-w-[58vw] sm:max-w-none group">
                <div class="logo-text w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-md group-hover:bg-blue-700 transition-colors">TB</div>
                <h1 class="site-name text-base sm:text-xl font-bold text-gray-900 tracking-tight truncate">Tool Basecamp</h1>
            </a>
            <nav data-nav="main" data-base-path="" class="hidden md:flex items-center gap-8 text-[15px] font-medium text-gray-600"></nav>
            <div id="site-header-mobile-slot" class="flex items-center gap-1 flex-shrink-0 md:hidden ml-auto">
                <a href="index.html" class="text-sm text-gray-600 whitespace-nowrap">Home</a>
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden relative">
        <main class="flex-1 flex flex-col w-0 overflow-hidden bg-gray-50">
            <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 scroll-smooth" id="main-content"></div>
            <footer class="bg-white border-t border-gray-200 mt-auto">
                <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
                    <div class="text-center text-sm text-gray-500">
                        <p>&copy; 2026 <span class="site-name">Tool Basecamp</span></p>
                    </div>
                </div>
            </footer>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/common_ui.js"></script>
    <script>
        function render() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';

            if (typeof toolsConfig === 'undefined' || !Array.isArray(toolsConfig.groups) || toolsConfig.groups.length === 0) {
                mainContent.innerHTML = '<div class="text-center text-gray-500 py-12">No tools configured.</div>';
                return;
            }

            const containerEl = document.createElement('div');
            containerEl.className = 'max-w-7xl mx-auto';

            toolsConfig.groups.forEach((group, index) => {
                if (!group || !group.title || !Array.isArray(group.items) || group.items.length === 0) return;

                const sectionEl = document.createElement('section');
                sectionEl.id = 'section-' + index;
                sectionEl.className = index === 0 ? '' : 'mt-10';

                const headerEl = document.createElement('div');
                headerEl.className = 'flex items-center gap-4';
                headerEl.innerHTML = `<h2 class="text-xl sm:text-2xl font-bold text-gray-900 tracking-tight">${group.title}</h2>`;

                const gridEl = document.createElement('div');
                gridEl.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-6';

                group.items.forEach(item => {
                    const card = document.createElement('a');
                    card.href = item.url || '#';
                    card.className = 'group bg-white rounded-xl p-4 border border-gray-200 hover:border-blue-400 hover:shadow-lg transition-all duration-300 flex items-center h-full';
                    card.innerHTML = `<h3 class="font-bold text-gray-900 truncate group-hover:text-blue-600 transition-colors">${item.title || ''}</h3>`;
                    gridEl.appendChild(card);
                });

                sectionEl.appendChild(headerEl);
                sectionEl.appendChild(gridEl);
                containerEl.appendChild(sectionEl);
            });

            mainContent.appendChild(containerEl);
        }

        window.onload = render;
    </script>
</body>
</html>
